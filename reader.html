<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">Manga 4 All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    
    .reader-nav { 
        display: flex; justify-content: center; align-items: center; gap: 15px; 
        padding: 15px; background: rgba(17, 17, 17, 0.95); position: sticky; 
        top: 75px; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #1f1f1f; 
    }

    .btn-nav { 
        background: #ff0055; color: white; padding: 10px 25px; border-radius: 25px; 
        text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; 
    }
    .btn-nav:hover { transform: scale(1.05); background: #ff2b72; }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }

    #chapterLabelTop, #chapterLabelBottom { font-weight: 600; min-width: 150px; text-align: center; font-size: 1rem; }

    .manga-pages-container { 
        max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; 
        min-height: 100vh; background: #000;
    }
    .manga-pages-container img { 
        width: 100%; height: auto; display: block; background: #000; margin-bottom: 2px; 
    }

    .list-btn { 
        background: #1a1a1a; color: #ccc; padding: 10px 20px; border-radius: 25px; 
        text-decoration: none; font-size: 0.85rem; border: 1px solid #333; transition: 0.3s; 
    }
    .list-btn:hover { border-color: #ff0055; color: white; }

    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    .nav-bottom { position: static; border-top: 1px solid #1f1f1f; margin-top: 20px; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav nav-bottom">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">Anterior</a>
    <span id="chapterLabelBottom">Cargando...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">Siguiente</a>
  </div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const auth = getAuth();
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;
    const shouldScroll = params.get("scroll") === "true";

    let currentUser = null;
    let canSave = false;

    function limpiarNum(n) { const p = parseFloat(n); return isNaN(p) ? n : p.toString(); }
    const numLimpio = limpiarNum(rawNumber);

    // 1. Manejo de Título de Pestaña
    document.title = `M4A | Cap. ${numLimpio}`;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if(user) iniciarFlujo();
    });

    async function iniciarFlujo() {
        await loadReader();
        if (shouldScroll) {
            await ejecutarSalto();
        } else {
            canSave = true;
        }
    }

    async function loadReader() {
      if (!mangaId || !rawNumber) return;

      document.getElementById("chapterLabelTop").textContent = `Capítulo ${numLimpio}`;
      document.getElementById("chapterLabelBottom").textContent = `Capítulo ${numLimpio}`;
      document.querySelectorAll(".list-btn").forEach(b => b.href = `manga.html?id=${mangaId}`);

      try {
        const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
        const snap = await getDocs(q);
        let caps = [];
        snap.forEach(d => { let data = d.data(); data.norm = String(data.number).trim(); caps.push(data); });
        caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
        
        const idx = caps.findIndex(c => c.norm === rawNumber);
        const tomo = caps[idx];

        if (tomo && tomo.images) {
          const cont = document.getElementById("mangaPages");
          cont.innerHTML = "";
          tomo.images.forEach((url, i) => {
            const img = document.createElement("img");
            img.src = url;
            // Quitamos lazy para asegurar que el navegador calcule la altura rápido
            cont.appendChild(img);
          });
        }

        // Nav Logic
        if (idx > 0) {
            const p = caps[idx-1].number;
            document.getElementById("prevBtnTop").href = document.getElementById("prevBtnBottom").href = `reader.html?manga=${mangaId}&number=${p}`;
        } else {
            document.getElementById("prevBtnTop").classList.add("disabled");
            document.getElementById("prevBtnBottom").classList.add("disabled");
        }

        if (idx < caps.length - 1) {
            const n = caps[idx+1].number;
            document.getElementById("nextBtnTop").href = document.getElementById("nextBtnBottom").href = `reader.html?manga=${mangaId}&number=${n}`;
        } else {
            document.getElementById("nextBtnTop").textContent = document.getElementById("nextBtnBottom").textContent = "FIN";
            document.getElementById("nextBtnTop").classList.add("disabled");
        }

      } catch (e) { console.error(e); }
    }

    async function ejecutarSalto() {
        const userDoc = await getDoc(doc(db, "users", currentUser.uid));
        if (userDoc.exists()) {
            const history = userDoc.data().readingHistory;
            const prog = history ? history[mangaId] : null;
            if (prog && prog.chapter === numLimpio) {
                const todas = document.querySelectorAll("#mangaPages img");
                const targetIndex = prog.imageIndex || 0;
                if (todas[targetIndex]) {
                    setTimeout(() => {
                        const pos = todas[targetIndex].getBoundingClientRect().top + window.scrollY - 80;
                        window.scrollTo({ top: pos, behavior: 'instant' });
                        canSave = true;
                    }, 800); // Espera a que el navegador asiente las imágenes
                    return;
                }
            }
        }
        canSave = true;
    }

    function getVisibleIndex() {
        const imgs = document.querySelectorAll("#mangaPages img");
        let found = 0;
        for (let i = 0; i < imgs.length; i++) {
            if (imgs[i].getBoundingClientRect().bottom > 100) {
                found = i;
                break;
            }
        }
        return found;
    }

    async function guardar() {
        if (!canSave || !currentUser) return;
        const index = getVisibleIndex();
        const mangaSnap = await getDoc(doc(db, "mangas", mangaId));
        const d = mangaSnap.data();
        const info = {
            id: mangaId, title: d.title, chapter: numLimpio,
            image: d.cover || d.image, imageIndex: index, time: Date.now()
        };
        await updateDoc(doc(db, "users", currentUser.uid), { [`readingHistory.${mangaId}`]: info });
    }

    window.addEventListener('scroll', () => {
        clearTimeout(window.saveT);
        window.saveTimer = setTimeout(guardar, 1500);
    });

  </script>
  <script type="module" src="js/navbar.js"></script>
</body>
</html>
