<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector - Manga 4 All</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #070707; color: white; min-height: 100vh; }

        header { 
            background: #111; padding: 15px 20px; border-bottom: 1px solid #1f1f1f;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { color: #ff0055; font-weight: bold; font-size: 1.5rem; text-decoration: none; }

        /* NAVEGACIÓN */
        .nav-controls {
            background: #111; padding: 15px; display: flex; justify-content: center;
            align-items: center; gap: 10px; border-bottom: 1px solid #1f1f1f;
        }
        .btn {
            background: #ff0055; color: white; border: none; padding: 10px 18px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center;
        }
        .btn:hover { background: #ff2b72; transform: translateY(-2px); }
        .btn:disabled, .btn.disabled { background: #333; cursor: not-allowed; opacity: 0.5; pointer-events: none; }
        .btn-list { background: #222; }
        
        #chapter-title { font-size: 1.1rem; font-weight: bold; color: #eee; margin: 0 10px; min-width: 120px; text-align: center; }

        .manga-container {
            max-width: 800px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .manga-container img { width: 100%; height: auto; display: block; margin: 0; }

        .status-msg { text-align: center; padding: 100px 20px; color: #888; }
        .loader { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Manga 4 All</a>
    </header>

    <div class="nav-controls">
        <a id="btn-back-manga" href="#" class="btn btn-list">☰ Lista</a>
        <a id="prev-btn" href="#" class="btn">←</a>
        <span id="chapter-title">Cargando...</span>
        <a id="next-btn" href="#" class="btn">→</a>
    </div>

    <div id="reader-content" class="manga-container">
        <div id="loader" class="status-msg">
            <span class="loader">Cargando páginas...</span>
        </div>
    </div>

    <div class="nav-controls" style="border-top: 1px solid #1f1f1f; padding: 50px;">
        <a id="prev-btn-bottom" href="#" class="btn">Anterior</a>
        <a id="next-btn-bottom" href="#" class="btn">Siguiente</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { 
            getFirestore, collection, query, where, getDocs, orderBy 
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
            authDomain: "manga4all-f520f.firebaseapp.com",
            projectId: "manga4all-f520f",
            databaseURL: "https://manga4all-f520f-default-rtdb.firebaseio.com",
            storageBucket: "manga4all-f520f.firebasestorage.app",
            messagingSenderId: "372561836700",
            appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadChapter() {
            const urlParams = new URLSearchParams(window.location.search);
            const mangaId = urlParams.get('manga');
            const chapterParam = urlParams.get('number'); // Ej: "001" o "1"

            if (!mangaId || !chapterParam) return;

            // Configurar botón volver al listado del manga
            document.getElementById('btn-back-manga').href = `manga.html?id=${mangaId}`;

            const readerContent = document.getElementById('reader-content');
            const titleElement = document.getElementById('chapter-title');

            try {
                // --- SOPORTE HÍBRIDO (STRING O INT) ---
                // 1. Intentamos buscar como String
                let q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", String(chapterParam)));
                let querySnapshot = await getDocs(q);

                // 2. Si no hay resultados, intentamos como Número (int)
                if (querySnapshot.empty && !isNaN(chapterParam)) {
                    q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", Number(chapterParam)));
                    querySnapshot = await getDocs(q);
                }

                if (querySnapshot.empty) {
                    readerContent.innerHTML = '<div class="status-msg">El capítulo no existe.</div>';
                    return;
                }

                const docData = querySnapshot.docs[0].data();
                titleElement.innerText = "Cap. " + parseFloat(docData.number);

                // Renderizar imágenes
                readerContent.innerHTML = "";
                docData.images.forEach((imgUrl, i) => {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.loading = "lazy";
                    readerContent.appendChild(img);
                });

                // --- LÓGICA DE NAVEGACIÓN ---
                setupNavigation(mangaId, chapterParam);

            } catch (error) {
                console.error(error);
                readerContent.innerHTML = '<div class="status-msg">Error de conexión.</div>';
            }
        }

        async function setupNavigation(mangaId, currentNum) {
            // Obtenemos todos los capítulos del manga para saber cuál es el anterior y siguiente
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const navSnapshot = await getDocs(q);
            
            let chapters = [];
            navSnapshot.forEach(doc => {
                chapters.push(doc.data().number);
            });

            // Ordenar capítulos matemáticamente
            chapters.sort((a, b) => parseFloat(a) - parseFloat(b));

            // Encontrar el índice del capítulo actual
            // Buscamos coincidencia ya sea como número o como string
            const currentIndex = chapters.findIndex(c => String(c) === String(currentNum) || Number(c) === Number(currentNum));

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const prevBtnB = document.getElementById('prev-btn-bottom');
            const nextBtnB = document.getElementById('next-btn-bottom');

            if (currentIndex > 0) {
                const prevUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex - 1]}`;
                prevBtn.href = prevBtnB.href = prevUrl;
            } else {
                prevBtn.classList.add('disabled');
                prevBtnB.classList.add('disabled');
            }

            if (currentIndex < chapters.length - 1) {
                const nextUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex + 1]}`;
                nextBtn.href = nextBtnB.href = nextUrl;
            } else {
                nextBtn.classList.add('disabled');
                nextBtnB.classList.add('disabled');
            }
        }

        loadChapter();
    </script>
</body>
</html>
