<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">Manga 4 All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    
    .reader-nav { 
        display: flex; justify-content: center; align-items: center; gap: 15px; 
        padding: 15px; background: rgba(17, 17, 17, 0.95); position: sticky; 
        top: 75px; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #1f1f1f; 
    }

    .btn-nav { 
        background: #ff0055; color: white; padding: 10px 25px; border-radius: 25px; 
        text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; 
    }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }

    #chapterLabelTop, #chapterLabelBottom { font-weight: 600; min-width: 150px; text-align: center; }

    #resumeNotice { 
        display: none; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; 
        color: #ff0055; padding: 15px; text-align: center; border-radius: 10px; 
        margin: 10px auto; max-width: 850px; font-weight: 600; font-size: 0.9rem; 
        animation: pulse 2s infinite; 
    }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

    .manga-pages-container { 
        max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; 
        min-height: 100vh; background: #000;
    }
    .manga-pages-container img { 
        width: 100%; height: auto; display: block; background: #000; margin-bottom: 2px; 
        min-height: 400px; 
    }

    .list-btn { background: #1a1a1a; color: #ccc; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; }
    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    .nav-bottom { position: static; border-top: 1px solid #1f1f1f; margin-top: 20px; padding-bottom: 50px; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div id="resumeNotice">Sincronizando tu progreso... En unos segundos te llevaremos a donde te quedaste.</div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav nav-bottom">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">Anterior</a>
    <span id="chapterLabelBottom">Capítulo...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">Siguiente</a>
  </div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const auth = getAuth();
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;
    const shouldScroll = params.get("scroll") === "true";

    let currentUser = null;
    let canSave = false;
    let imagesLoaded = 0;
    let mangaTipo = "1";

    const numLimpio = (n) => { const p = parseFloat(n); return isNaN(p) ? n : p.toString(); }(rawNumber);
    document.title = `M4A | Cap. ${numLimpio}`;

    // 1. CARGA INICIAL (SIN ESPERAR A FIREBASE AUTH)
    async function init() {
        if (!mangaId || !rawNumber) return;

        document.getElementById("chapterLabelTop").textContent = `Capítulo ${numLimpio}`;
        document.getElementById("chapterLabelBottom").textContent = `Capítulo ${numLimpio}`;
        document.querySelectorAll(".list-btn").forEach(b => b.href = `manga.html?id=${mangaId}`);

        try {
            // Obtener tipo y capítulos
            const [mangaSnap, tomoSnap] = await Promise.all([
                getDoc(doc(db, "mangas", mangaId)),
                getDocs(query(collection(db, "tomos"), where("mangaId", "==", mangaId)))
            ]);

            if (mangaSnap.exists()) mangaTipo = String(mangaSnap.data().tipo || "1");

            let caps = [];
            tomoSnap.forEach(d => { let data = d.data(); data.norm = String(data.number).trim(); caps.push(data); });
            caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
            
            const idx = caps.findIndex(c => c.norm === rawNumber);
            const tomo = caps[idx];

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                const total = tomo.images.length;
                if (shouldScroll) document.getElementById("resumeNotice").style.display = "block";

                // MOTOR DE CARGA (Tipo 1: Lotes para Drive / Tipo 2: Directo para imgBB)
                if (mangaTipo === "2") {
                    tomo.images.forEach(url => {
                        const img = document.createElement("img");
                        img.src = url;
                        cont.appendChild(img);
                    });
                    // En Tipo 2 el salto es por tiempo, no bloquea
                    finishLoading(caps, idx);
                } else {
                    const injectBatch = (start) => {
                        const batch = 8;
                        for (let i = start; i < start + batch && i < total; i++) {
                            const img = document.createElement("img");
                            img.src = tomo.images[i];
                            img.onload = img.onerror = () => {
                                imagesLoaded++;
                                if (imagesLoaded === total && shouldScroll) ejecutarSalto();
                            };
                            cont.appendChild(img);
                        }
                        if (start + batch < total) setTimeout(() => injectBatch(start + batch), 400);
                        else if (!shouldScroll) finishLoading(caps, idx);
                    };
                    injectBatch(0);
                }
                
                if (mangaTipo === "2" || !shouldScroll) setupNav(caps, idx);
            }
        } catch (e) { console.error(e); }
    }

    function setupNav(caps, idx) {
        if (idx > 0) document.getElementById("prevBtnTop").href = document.getElementById("prevBtnBottom").href = `reader.html?manga=${mangaId}&number=${caps[idx-1].number}`;
        else { document.getElementById("prevBtnTop").classList.add("disabled"); document.getElementById("prevBtnBottom").classList.add("disabled"); }
        if (idx < caps.length - 1) document.getElementById("nextBtnTop").href = document.getElementById("nextBtnBottom").href = `reader.html?manga=${mangaId}&number=${caps[idx+1].number}`;
        else { document.getElementById("nextBtnTop").textContent = "FIN"; document.getElementById("nextBtnTop").classList.add("disabled"); }
    }

    function finishLoading(caps, idx) {
        setupNav(caps, idx);
        if (shouldScroll) setTimeout(ejecutarSalto, 1000);
        else canSave = true;
    }

    async function ejecutarSalto() {
        if (!currentUser) return;
        try {
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (userSnap.exists()) {
                const history = userSnap.data().readingHistory;
                const prog = history ? history[mangaId] : null;

                if (prog && prog.chapter === numLimpio) {
                    const todas = document.querySelectorAll("#mangaPages img");
                    const targetIndex = prog.imageIndex || 0;
                    if (todas[targetIndex]) {
                        const pos = todas[targetIndex].getBoundingClientRect().top + window.pageYOffset - 85;
                        window.scrollTo({ top: pos, behavior: 'instant' });
                    }
                }
            }
        } catch(e) {}
        document.getElementById("resumeNotice").style.display = "none";
        setTimeout(() => { canSave = true; }, 1000);
    }

    onAuthStateChanged(auth, (user) => { currentUser = user; });

    function getVisibleIndex() {
        const imgs = document.querySelectorAll("#mangaPages img");
        for (let i = 0; i < imgs.length; i++) {
            if (imgs[i].getBoundingClientRect().bottom > 150) return i;
        }
        return 0;
    }

    async function guardar() {
        if (!canSave || !currentUser) return;
        const index = getVisibleIndex();
        try {
            const mangaSnap = await getDoc(doc(db, "mangas", mangaId));
            const info = { id: mangaId, title: mangaSnap.data().title, chapter: numLimpio, image: mangaSnap.data().cover || mangaSnap.data().image, imageIndex: index, time: Date.now() };
            localStorage.setItem("manga_last_seen", JSON.stringify(info));
            await updateDoc(doc(db, "users", currentUser.uid), { [`readingHistory.${mangaId}`]: info });
        } catch(e) {}
    }

    window.addEventListener('scroll', () => {
        if (!canSave) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(guardar, 2000);
    });

    init();
  </script>
</body>
</html>
