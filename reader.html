<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">Manga 4 All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    
    /* 🟢 MODIFICADO: Añadida transición suave para ocultar/mostrar la barra */
    .reader-nav { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 15px; 
      padding: 15px; 
      background: rgba(17, 17, 17, 0.95); 
      position: sticky; 
      top: 75px; 
      z-index: 1000; 
      backdrop-filter: blur(10px); 
      border-bottom: 1px solid #1f1f1f; 
      transition: transform 0.3s ease; 
    }
    
    /* 🟢 CLASE NUEVA: Desplaza la barra hacia arriba fuera de la pantalla */
    .reader-nav.nav-hide {
      transform: translateY(-180px);
    }
    
    .btn-nav { background: #ff0055; color: white; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }
    #chapterLabelTop, #chapterLabelBottom { font-weight: 600; min-width: 150px; text-align: center; }
    #resumeNotice { display: none; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #ff0055; padding: 15px; text-align: center; border-radius: 10px; margin: 10px auto; max-width: 850px; font-weight: 600; font-size: 0.9rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    
    /* 🟢 MODIFICADO: Ajustado el max-width de 850px a 700px para el efecto de alejamiento */
    .manga-pages-container { max-width: 700px; margin: 20px auto; display: flex; flex-direction: column; min-height: 100vh; background: #000; }
    .manga-pages-container img { width: 100%; height: auto; display: block; background: #000; margin-bottom: 2px; min-height: 400px; }
    
    .list-btn { background: #1a1a1a; color: #ccc; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; }
    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    
    /* 🟢 MODIFICADO: Se fuerza a que la barra inferior mantenga siempre su posición y no se oculte */
    .nav-bottom { position: static !important; transform: none !important; border-top: 1px solid #1f1f1f; margin-top: 20px; padding-bottom: 50px; transition: none !important; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div id="resumeNotice">Sincronizando tu progreso... En unos segundos te llevaremos a donde te quedaste.</div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav nav-bottom">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">Anterior</a>
    <span id="chapterLabelBottom">Capítulo...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">Siguiente</a>
  </div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs, doc, getDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const auth = getAuth();
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;
    const shouldScroll = params.get("scroll") === "true";

    let currentUser = null;
    let canSave = false;
    let imagesTotalCount = 0;
    let imagesLoadedCount = 0;
    let hasJumped = false;
    let mangaTipo = "1";
    let esUltimoCapitulo = false;

    // Control de desplazamiento para ocultar barra superior
    let lastScrollTop = 0;
    const topNavbarElement = document.querySelector(".reader-nav:not(.nav-bottom)");

    function limpiarNumero(n) {
        if (!n) return "";
        const p = parseFloat(n);
        return isNaN(p) ? n : p.toString();
    }
    const numLimpio = limpiarNumero(rawNumber);
    document.title = "M4A | Cap. " + numLimpio;

    async function loadReader() {
        if (!mangaId || !rawNumber) return;

        document.getElementById("chapterLabelTop").textContent = "Capítulo " + numLimpio;
        document.getElementById("chapterLabelBottom").textContent = "Capítulo " + numLimpio;
        document.querySelectorAll(".list-btn").forEach(b => b.href = "manga.html?id=" + mangaId);

        try {
            const mSnap = await getDoc(doc(db, "mangas", mangaId));
            if (mSnap.exists()) mangaTipo = String(mSnap.data().tipo || "1");

            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const snap = await getDocs(q);
            let caps = [];
            snap.forEach(d => { 
                let data = d.data(); 
                data.norm = String(data.number).trim(); 
                caps.push(data); 
            });
            caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
            
            const idx = caps.findIndex(c => c.norm === numLimpio);
            const tomo = caps[idx];

            if (idx === caps.length - 1) esUltimoCapitulo = true;

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                imagesTotalCount = tomo.images.length;
                
                if (mangaTipo === "2") {
                    tomo.images.forEach((url) => {
                        const img = document.createElement("img");
                        img.referrerPolicy = "no-referrer";
                        
                        // 🟢 Lógica selectiva inversa: Si no contiene dominios de Google, activa CORS para R2
                        if (!url.includes("drive.google.com") && !url.includes("googleusercontent.com")) {
                            img.crossOrigin = "anonymous";
                        }
                        
                        img.src = url;
                        cont.appendChild(img);
                    });
                    
                    if (!shouldScroll) {
                        canSave = true;
                    } else {
                        document.getElementById("resumeNotice").style.display = "block";
                        if (currentUser) ejecutarSalto();
                    }
                } else {
                    if (shouldScroll) document.getElementById("resumeNotice").style.display = "block";
                    
                    // Renderizado directo unificado para evitar bloqueos asíncronos y pantallas negras
                    tomo.images.forEach((url) => {
                        const img = document.createElement("img");
                        img.referrerPolicy = "no-referrer";
                        
                        // 🟢 Lógica selectiva inversa: Si no contiene dominios de Google, activa CORS para R2
                        if (!url.includes("drive.google.com") && !url.includes("googleusercontent.com")) {
                            img.crossOrigin = "anonymous";
                        }
                        
                        img.src = url;
                        
                        img.onload = img.onerror = () => {
                            imagesLoadedCount++;
                            if (imagesLoadedCount === imagesTotalCount && shouldScroll) {
                                ejecutarSalto();
                            }
                        };
                        cont.appendChild(img);
                    });

                    if (!shouldScroll) {
                        setTimeout(() => { canSave = true; }, 1000);
                    }
                }
            }
            setupNav(caps, idx);
        } catch (e) { console.error(e); }
    }

    function setupNav(caps, idx) {
        const prevBtns = [document.getElementById("prevBtnTop"), document.getElementById("prevBtnBottom")];
        const nextBtns = [document.getElementById("nextBtnTop"), document.getElementById("nextBtnBottom")];

        if (idx > 0) {
            prevBtns.forEach(btn => btn.href = "reader.html?manga=" + mangaId + "&number=" + caps[idx-1].number);
        } else {
            prevBtns.forEach(btn => btn.classList.add("disabled"));
        }

        if (idx < caps.length - 1) {
            nextBtns.forEach(btn => btn.href = "reader.html?manga=" + mangaId + "&number=" + caps[idx+1].number);
        } else {
            nextBtns.forEach(btn => {
                btn.textContent = "FIN";
                btn.classList.add("disabled");
                btn.href = "#";
            });
        }
    }

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (shouldScroll && mangaTipo === "2" && imagesTotalCount > 0) {
            ejecutarSalto();
        }
    });

    async function ejecutarSalto() {
        if (hasJumped || !currentUser) return;
        try {
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (userSnap.exists()) {
                const history = userSnap.data().readingHistory;
                const prog = history ? history[mangaId] : null;

                if (prog && prog.chapter === numLimpio) {
                    const todas = document.querySelectorAll("#mangaPages img");
                    const targetIndex = prog.imageIndex || 0;
                    if (todas[targetIndex]) {
                        hasJumped = true;
                        setTimeout(() => {
                            const rect = todas[targetIndex].getBoundingClientRect();
                            const pos = rect.top + window.pageYOffset - 85;
                            window.scrollTo({ top: pos, behavior: 'instant' });
                            document.getElementById("resumeNotice").style.display = "none";
                            setTimeout(() => { canSave = true; }, 1000);
                        }, 500);
                        return;
                    }
                }
            }
        } catch(e) {}
        document.getElementById("resumeNotice").style.display = "none";
        canSave = true;
    }

    function getVisibleIndex() {
        const imgs = document.querySelectorAll("#mangaPages img");
        for (let i = 0; i < imgs.length; i++) {
            if (imgs[i].getBoundingClientRect().bottom > 200) return i;
        }
        return imgs.length - 1;
    }

    async function guardar() {
        if (!canSave || !currentUser) return;
        const index = getVisibleIndex();
        
        try {
            const userRef = doc(db, "users", currentUser.uid);
            if (esUltimoCapitulo && index >= (imagesTotalCount - 1)) {
                await updateDoc(userRef, {
                    ["readingHistory." + mangaId]: deleteField()
                });
                const local = JSON.parse(localStorage.getItem("manga_last_seen"));
                if (local && local.id === mangaId) {
                    localStorage.removeItem("manga_last_seen");
                }
            } else {
                const mSnap = await getDoc(doc(db, "mangas", mangaId));
                const d = mSnap.data();
                const info = { id: mangaId, title: d.title, chapter: numLimpio, image: (d.cover || d.image), imageIndex: index, time: Date.now() };
                localStorage.setItem("manga_last_seen", JSON.stringify(info));
                await updateDoc(userRef, { ["readingHistory." + mangaId]: info });
            }
        } catch(e) {}
    }

    // Evento Scroll unificado con detección de dirección para ocultar/mostrar la barra
    window.addEventListener('scroll', () => {
        let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
        
        if (currentScroll > 120) {
            if (currentScroll > lastScrollTop) {
                // Scrolling DOWN -> Ocultar barra superior
                if (topNavbarElement) topNavbarElement.classList.add("nav-hide");
            } else {
                // Scrolling UP -> Mostrar barra superior
                if (topNavbarElement) topNavbarElement.classList.remove("nav-hide");
            }
        } else {
            // Cerca del tope superior -> Mostrar siempre
            if (topNavbarElement) topNavbarElement.classList.remove("nav-hide");
        }
        lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;

        // Mantener la ejecución del temporizador de guardado original
        if (!canSave) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(guardar, 2000);
    });

    loadReader();
  </script>
  <script type="module" src="js/navbar.js"></script>
</body>
</html>
