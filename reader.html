<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector - Manga 4 All</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #070707; color: white; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        header { 
            background: #111; padding: 15px 20px; border-bottom: 1px solid #1f1f1f;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { color: #ff0055; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .nav-link { color: white; text-decoration: none; font-size: 0.9rem; }

        /* CONTROLES SUPERIORES */
        .controls {
            background: #111; padding: 15px; display: flex; justify-content: center;
            align-items: center; gap: 15px; border-bottom: 1px solid #1f1f1f;
        }
        .btn {
            background: #ff0055; color: white; border: none; padding: 8px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-decoration: none; font-size: 0.9rem;
        }
        .btn:hover { background: #ff2b72; transform: translateY(-2px); }
        .btn-secondary { background: #222; }
        
        #chapter-title { font-size: 1.1rem; font-weight: bold; color: #eee; }

        /* CONTENEDOR DE IMÁGENES */
        .manga-container {
            max-width: 800px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .manga-container img {
            width: 100%; height: auto; display: block; background: #000;
            /* Evita espacios en blanco entre imágenes de Manhwa */
            margin: 0; padding: 0; 
        }

        /* MENSAJES DE ESTADO */
        .status-msg {
            text-align: center; padding: 100px 20px; color: #888; font-size: 1.2rem;
        }
        .loader { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Manga 4 All</a>
        <a href="index.html" class="nav-link">Inicio</a>
    </header>

    <div class="controls">
        <a href="index.html" class="btn btn-secondary">Volver</a>
        <span id="chapter-title">Cargando...</span>
    </div>

    <div id="reader-content" class="manga-container">
        <div id="loader" class="status-msg">
            <span class="loader">Cargando capítulo...</span>
            <br><small>Espera a que las imágenes se preparen</small>
        </div>
    </div>

    <div class="controls" style="border-top: 1px solid #1f1f1f; border-bottom: none; padding: 40px;">
        <a href="index.html" class="btn btn-secondary">Volver al Inicio</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { 
            getFirestore, collection, query, where, getDocs 
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
            authDomain: "manga4all-f520f.firebaseapp.com",
            projectId: "manga4all-f520f",
            storageBucket: "manga4all-f520f.firebasestorage.app",
            messagingSenderId: "372561836700",
            appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadChapter() {
            const urlParams = new URLSearchParams(window.location.search);
            const mangaId = urlParams.get('manga');
            const chapterNumberStr = urlParams.get('number'); // Viene como "001" o "000.5"

            const readerContent = document.getElementById('reader-content');
            const titleElement = document.getElementById('chapter-title');

            if (!mangaId || !chapterNumberStr) {
                readerContent.innerHTML = '<div class="status-msg">URL inválida. Falta ID o número de capítulo.</div>';
                return;
            }

            try {
                // CONSULTA: Buscamos comparando Strings para evitar el error de Int vs String
                const q = query(
                    collection(db, "tomos"),
                    where("mangaId", "==", mangaId),
                    where("number", "==", String(chapterNumberStr))
                );

                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    readerContent.innerHTML = '<div class="status-msg">El capítulo solicitado no existe en la base de datos.</div>';
                    titleElement.innerText = "Error";
                    return;
                }

                // Si lo encuentra, extraemos la data
                const docData = querySnapshot.docs[0].data();
                
                // LIMPIEZA VISUAL DEL TÍTULO: 
                // parseFloat("001") -> 1 | parseFloat("000.5") -> 0.5
                titleElement.innerText = "Capítulo " + parseFloat(docData.number);

                // RENDERIZAR IMÁGENES
                readerContent.innerHTML = ""; // Limpiar loader
                docData.images.forEach((imgUrl, index) => {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.alt = `Página ${index + 1}`;
                    img.loading = "lazy"; // Optimización de carga
                    
                    // Manejo de error si una imagen falla
                    img.onerror = () => { img.style.display = 'none'; };
                    
                    readerContent.appendChild(img);
                });

            } catch (error) {
                console.error("Error al cargar capítulo:", error);
                readerContent.innerHTML = '<div class="status-msg">Ocurrió un error al conectar con Firebase.</div>';
            }
        }

        // Ejecutar carga al iniciar
        loadChapter();
    </script>
</body>
</html>
