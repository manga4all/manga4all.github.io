<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-browser-title">Cargando... | M4A</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #070707; color: white; min-height: 100vh; }

        header { 
            background: #111; padding: 15px 20px; border-bottom: 1px solid #1f1f1f;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { color: #ff0055; font-weight: bold; font-size: 1.5rem; text-decoration: none; }

        .nav-controls {
            background: #111; padding: 15px; display: flex; justify-content: center;
            align-items: center; gap: 10px; border-bottom: 1px solid #1f1f1f;
        }
        .btn {
            background: #ff0055; color: white; border: none; padding: 10px 18px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center;
        }
        .btn:hover { background: #ff2b72; transform: translateY(-2px); }
        .btn.disabled { background: #333 !important; cursor: not-allowed; opacity: 0.3; pointer-events: none; }
        .btn-list { background: #1a1a1a; border: 1px solid #333; }
        
        .chapter-label { font-size: 1.1rem; font-weight: bold; color: #eee; margin: 0 10px; min-width: 140px; text-align: center; }

        .manga-container {
            max-width: 800px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .manga-container img { width: 100%; height: auto; display: block; margin: 0; }

        .status-msg { text-align: center; padding: 100px 20px; color: #888; }
        .loader { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Manga 4 All</a>
    </header>

    <div class="nav-controls">
        <a id="btn-back-manga-top" href="#" class="btn btn-list">☰ Lista</a>
        <a id="prev-btn-top" href="#" class="btn">←</a>
        <span id="chapter-title-top" class="chapter-label">Cargando...</span>
        <a id="next-btn-top" href="#" class="btn">→</a>
    </div>

    <div id="reader-content" class="manga-container">
        <div id="loader" class="status-msg">
            <span class="loader">Cargando páginas...</span>
        </div>
    </div>

    <div class="nav-controls" style="border-top: 1px solid #1f1f1f; border-bottom: none; padding: 40px 15px 60px 15px;">
        <a id="btn-back-manga-bottom" href="#" class="btn btn-list">☰ Lista</a>
        <a id="prev-btn-bottom" href="#" class="btn">←</a>
        <span id="chapter-title-bottom" class="chapter-label">Cargando...</span>
        <a id="next-btn-bottom" href="#" class="btn">→</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { 
            getFirestore, collection, query, where, getDocs, doc, getDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
            authDomain: "manga4all-f520f.firebaseapp.com",
            projectId: "manga4all-f520f",
            storageBucket: "manga4all-f520f.firebasestorage.app",
            messagingSenderId: "372561836700",
            appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadChapter() {
            const urlParams = new URLSearchParams(window.location.search);
            const mangaId = urlParams.get('manga');
            const chapterParam = urlParams.get('number');

            if (!mangaId || !chapterParam) return;

            // Links volver al manga
            const listUrl = `manga.html?id=${mangaId}`;
            document.getElementById('btn-back-manga-top').href = listUrl;
            document.getElementById('btn-back-manga-bottom').href = listUrl;

            const readerContent = document.getElementById('reader-content');
            const titleTop = document.getElementById('chapter-title-top');
            const titleBottom = document.getElementById('chapter-title-bottom');

            try {
                // 1. Obtener datos del MANGA para el título de la pestaña
                const mangaRef = doc(db, "mangas", mangaId);
                const mangaSnap = await getDoc(mangaRef);
                let mangaName = "Manga";
                if (mangaSnap.exists()) {
                    mangaName = mangaSnap.data().title;
                }

                // 2. Búsqueda híbrida del capítulo
                let q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", String(chapterParam)));
                let querySnapshot = await getDocs(q);

                if (querySnapshot.empty && !isNaN(chapterParam)) {
                    q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", Number(chapterParam)));
                    querySnapshot = await getDocs(q);
                }

                if (querySnapshot.empty) {
                    readerContent.innerHTML = '<div class="status-msg">El capítulo no existe.</div>';
                    return;
                }

                const docData = querySnapshot.docs[0].data();
                const cleanNumber = parseFloat(docData.number);
                
                // ACTUALIZACIÓN DE TÍTULOS
                const fullTitle = `Capítulo ${cleanNumber}`;
                titleTop.innerText = titleBottom.innerText = fullTitle;
                
                // ACTUALIZACIÓN DE LA PESTAÑA (Browser Tab)
                document.title = `${mangaName} Capítulo ${cleanNumber} | M4A`;

                // Render imágenes
                readerContent.innerHTML = "";
                docData.images.forEach((imgUrl) => {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.loading = "lazy";
                    readerContent.appendChild(img);
                });

                setupNavigation(mangaId, chapterParam);

            } catch (error) {
                console.error(error);
                readerContent.innerHTML = '<div class="status-msg">Error de conexión.</div>';
            }
        }

        async function setupNavigation(mangaId, currentNum) {
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const navSnapshot = await getDocs(q);
            
            let chapters = [];
            navSnapshot.forEach(doc => {
                chapters.push(doc.data().number);
            });

            chapters.sort((a, b) => parseFloat(a) - parseFloat(b));

            const currentIndex = chapters.findIndex(c => 
                String(c) === String(currentNum) || parseFloat(c) === parseFloat(currentNum)
            );

            const prevBtns = [document.getElementById('prev-btn-top'), document.getElementById('prev-btn-bottom')];
            const nextBtns = [document.getElementById('next-btn-top'), document.getElementById('next-btn-bottom')];

            if (currentIndex > 0) {
                const prevUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex - 1]}`;
                prevBtns.forEach(btn => { btn.href = prevUrl; btn.classList.remove('disabled'); });
            } else {
                prevBtns.forEach(btn => { btn.classList.add('disabled'); btn.href = "#"; });
            }

            if (currentIndex !== -1 && currentIndex < chapters.length - 1) {
                const nextUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex + 1]}`;
                nextBtns.forEach(btn => { btn.href = nextUrl; btn.classList.remove('disabled'); });
            } else {
                nextBtns.forEach(btn => { btn.classList.add('disabled'); btn.href = "#"; });
            }
        }

        loadChapter();
    </script>
</body>
</html>
