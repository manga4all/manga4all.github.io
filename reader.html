<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">Manga 4 All</title>
  <link rel="stylesheet" href="css/style.css?v=21">
  <style>
    .reader-nav { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: #111; position: sticky; top: 70px; z-index: 1000; }
    .btn-nav { background: #ff0055; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
    .btn-nav.disabled { background: #333 !important; color: #777 !important; pointer-events: none !important; opacity: 0.6; cursor: default; }
    #chapterLabelTop, #chapterLabelBottom { font-weight: bold; color: white; text-align: center; min-width: 140px; font-size: 1.1rem; }
    .manga-pages-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; min-height: 50vh; }
    .manga-pages-container img { width: 100%; height: auto; display: block; background: #111; }
    .list-btn { background: #333; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
  </nav>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">←</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">→</a>
  </div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav" style="margin-bottom: 50px;">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">←</a>
    <span id="chapterLabelBottom">Cargando...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">→</a>
  </div>

  <footer>Manga 4 All © 2026</footer>

  <script src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;

    function limpiarNum(n) {
        const parsed = parseFloat(n);
        return isNaN(parsed) ? n : parsed.toString();
    }

    const numLimpio = limpiarNum(rawNumber);

    async function loadReader() {
      if (!mangaId || !rawNumber) return;

      // 1. UI INICIAL
      document.title = `Cap. ${numLimpio} | M4A`;
      document.getElementById("chapterLabelTop").textContent = `Capítulo ${numLimpio}`;
      document.getElementById("chapterLabelBottom").textContent = `Capítulo ${numLimpio}`;
      document.querySelectorAll(".list-btn").forEach(b => b.href = `manga.html?id=${mangaId}`);

      try {
        // 2. GUARDAR HISTORIAL INMEDIATAMENTE
        const mangaDoc = await getDoc(doc(db, "mangas", mangaId));
        if (mangaDoc.exists()) {
            const d = mangaDoc.data();
            const historial = {
                id: mangaId,
                title: d.title,
                chapter: numLimpio,
                image: d.cover || d.image,
                time: Date.now()
            };
            localStorage.setItem("manga_last_seen", JSON.stringify(historial));
        }

        // 3. CARGAR IMÁGENES
        const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
        const snap = await getDocs(q);
        let caps = [];
        snap.forEach(doc => {
            let data = doc.data();
            data.normNum = String(data.number).trim();
            caps.push(data);
        });

        caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
        const idx = caps.findIndex(c => c.normNum === rawNumber);
        const tomo = caps[idx];

        if (tomo && tomo.images) {
          const cont = document.getElementById("mangaPages");
          cont.innerHTML = "";
          tomo.images.forEach(url => {
            const img = document.createElement("img");
            img.src = url;
            cont.appendChild(img);
          });
        }

        // 4. BOTONES NAVEGACIÓN
        if (idx > 0) {
            const p = caps[idx-1].number;
            document.getElementById("prevBtnTop").href = `reader.html?manga=${mangaId}&number=${p}`;
            document.getElementById("prevBtnBottom").href = `reader.html?manga=${mangaId}&number=${p}`;
        } else {
            document.getElementById("prevBtnTop").classList.add("disabled");
            document.getElementById("prevBtnBottom").classList.add("disabled");
        }

        if (idx !== -1 && idx < caps.length - 1) {
            const n = caps[idx+1].number;
            document.getElementById("nextBtnTop").href = `reader.html?manga=${mangaId}&number=${n}`;
            document.getElementById("nextBtnBottom").href = `reader.html?manga=${mangaId}&number=${n}`;
        } else {
            const nt = document.getElementById("nextBtnTop");
            const nb = document.getElementById("nextBtnBottom");
            nt.classList.add("disabled"); nb.classList.add("disabled");
            nt.textContent = nb.textContent = "FIN";
        }

      } catch (e) { console.error(e); }
    }
    loadReader();
  </script>
</body>
</html>
