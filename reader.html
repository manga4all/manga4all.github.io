<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Lector
  </title>

  <link
    rel="stylesheet"
    href="css/style.css?v=5"
  >

  <style>

    body{
      background:#050505;
    }

    .reader-container{
      width:100%;
      max-width:1200px;
      margin:auto;
      padding-top:90px;
      padding-bottom:40px;
      padding-left:20px;
      padding-right:20px;
    }

    .reader-top{
      background:#111;
      border:1px solid #1f1f1f;
      border-radius:16px;
      padding:18px 25px;
      margin-bottom:25px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .reader-title{
      font-size:1.4rem;
    }

    .reader-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .reader-btn{
      background:#ff0055;
      color:white;
      text-decoration:none;
      padding:10px 18px;
      border-radius:10px;
      transition:0.3s;
      font-weight:bold;
      font-size:0.95rem;
    }

    .reader-btn:hover{
      background:#ff2b72;
    }

    .pdf-viewer{
      width:100%;
      height:85vh;
      border:none;
      border-radius:20px;
      background:#111;
      margin-bottom:25px;
    }

    .reader-bottom{
      background:#111;
      border:1px solid #1f1f1f;
      border-radius:16px;
      padding:18px 25px;

      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    @media(max-width:768px){

      .reader-top{
        padding:15px;
      }

      .reader-title{
        font-size:1.2rem;
      }

      .pdf-viewer{
        height:75vh;
      }

      .reader-bottom{
        padding:15px;
      }

    }

  </style>

</head>

<body>

  <nav>

    <div class="logo">
      Manga 4 All
    </div>

    <div class="nav-links">

      <a href="index.html">
        Inicio
      </a>

    </div>

  </nav>

  <div class="reader-container">

    <!-- TOP -->

    <div class="reader-top">

      <h1
        class="reader-title"
        id="readerTitle"
      >
        Cargando...
      </h1>

      <div class="reader-actions">

        <a
          class="reader-btn"
          id="backBtnTop"
          href="#"
        >
          Volver
        </a>

        <a
          class="reader-btn"
          id="prevBtnTop"
          href="#"
        >
          ← Anterior
        </a>

        <a
          class="reader-btn"
          id="nextBtnTop"
          href="#"
        >
          Siguiente →
        </a>

      </div>

    </div>

    <!-- PDF -->

    <iframe
      class="pdf-viewer"
      id="pdfViewer"
      src=""
    ></iframe>

    <!-- BOTTOM -->

    <div class="reader-bottom">

      <a
        class="reader-btn"
        id="backBtnBottom"
        href="#"
      >
        Volver
      </a>

      <a
        class="reader-btn"
        id="prevBtnBottom"
        href="#"
      >
        ← Anterior
      </a>

      <a
        class="reader-btn"
        id="nextBtnBottom"
        href="#"
      >
        Siguiente →
      </a>

    </div>

  </div>

  <script type="module">

    import {
      db
    } from "./js/firebase.js";

    import {
      collection,
      query,
      where,
      getDocs,
      doc,
      getDoc
    }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const params =
    new URLSearchParams(window.location.search);

    const mangaId =
    params.get("manga");

    const currentNumber =
    parseInt(
      params.get("number")
    );

    const pdfViewer =
    document.getElementById("pdfViewer");

    const readerTitle =
    document.getElementById("readerTitle");

    const prevBtnTop =
    document.getElementById("prevBtnTop");

    const nextBtnTop =
    document.getElementById("nextBtnTop");

    const backBtnTop =
    document.getElementById("backBtnTop");

    const prevBtnBottom =
    document.getElementById("prevBtnBottom");

    const nextBtnBottom =
    document.getElementById("nextBtnBottom");

    const backBtnBottom =
    document.getElementById("backBtnBottom");

    async function loadReader(){

      // MANGA

      const mangaRef =
      doc(db, "mangas", mangaId);

      const mangaSnap =
      await getDoc(mangaRef);

      let mangaTitle = "";

      if(mangaSnap.exists()){

        mangaTitle =
        mangaSnap.data().title;

      }

      // TOMOS

      const q = query(

        collection(db, "tomos"),

        where("mangaId", "==", mangaId)

      );

      const querySnapshot =
      await getDocs(q);

      let tomos = [];

      querySnapshot.forEach((doc) => {

        tomos.push(doc.data());

      });

      tomos.sort(
        (a,b) => a.number - b.number
      );

      const currentTomo =
      tomos.find(
        t => t.number === currentNumber
      );

      if(!currentTomo){
        return;
      }

      // TITULO

      readerTitle.innerHTML =
      `${mangaTitle} | Tomo ${currentTomo.number}`;

      document.title =
      `${mangaTitle} | Tomo ${currentTomo.number}`;

      // PDF

      pdfViewer.src =
      currentTomo.pdf;

      // VOLVER

      const backLink =
      `manga.html?id=${mangaId}`;

      backBtnTop.href =
      backLink;

      backBtnBottom.href =
      backLink;

      // ANTERIOR

      const prevTomo =
      tomos.find(
        t => t.number === currentNumber - 1
      );

      if(prevTomo){

        const prevLink =
        `reader.html?manga=${mangaId}&number=${prevTomo.number}`;

        prevBtnTop.href =
        prevLink;

        prevBtnBottom.href =
        prevLink;

      }
      else{

        prevBtnTop.style.display =
        "none";

        prevBtnBottom.style.display =
        "none";

      }

      // SIGUIENTE

      const nextTomo =
      tomos.find(
        t => t.number === currentNumber + 1
      );

      if(nextTomo){

        const nextLink =
        `reader.html?manga=${mangaId}&number=${nextTomo.number}`;

        nextBtnTop.href =
        nextLink;

        nextBtnBottom.href =
        nextLink;

      }
      else{

        nextBtnTop.style.display =
        "none";

        nextBtnBottom.style.display =
        "none";

      }

    }

    loadReader();

  </script>

</body>

</html>
