<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">Manga 4 All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    .reader-nav { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; background: rgba(17,17,17,0.95); position: sticky; top: 75px; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #1f1f1f; }
    .btn-nav { background: #ff0055; color: white; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }
    #chapterLabelTop { font-weight: 600; min-width: 150px; text-align: center; }
    .manga-pages-container { max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; }
    .manga-pages-container img { width: 100%; display: block; background: #000; margin-bottom: 2px; min-height: 300px; }
    .list-btn { background: #1a1a1a; color: #ccc; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; }
    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module" src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const auth = getAuth();
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;
    const shouldScroll = params.get("scroll") === "true";
    
    let currentUser = null;
    let isReadyToSave = false;
    let imagesLoadedCount = 0;
    let totalImagesInChapter = 0;
    let hasJumped = false;

    function limpiarNum(n) { const p = parseFloat(n); return isNaN(p) ? n : p.toString(); }
    const numLimpio = limpiarNum(rawNumber);

    // 1. Detectar Usuario
    onAuthStateChanged(auth, (user) => { 
        currentUser = user; 
        intentarInicializarLector();
    });

    // 2. Función que determina qué imagen estás viendo realmente
    function obtenerIndiceImagenVisible() {
        const imagenes = document.querySelectorAll("#mangaPages img");
        let indiceVisible = 0;
        // Buscamos la imagen que esté cruzando la línea de los 100px desde arriba
        imagenes.forEach((img, index) => {
            const rect = img.getBoundingClientRect();
            if (rect.top < 150 && rect.bottom > 0) {
                indiceVisible = index;
            }
        });
        return indiceVisible;
    }

    // 3. Guardar progreso en la nube
    async function guardarProgreso() {
        if (!mangaId || !numLimpio || !isReadyToSave || !currentUser) return;
        
        const imgIndex = obtenerIndiceImagenVisible();
        
        try {
            const mangaSnap = await getDoc(doc(db, "mangas", mangaId));
            if (!mangaSnap.exists()) return;
            const d = mangaSnap.data();

            const datos = {
                id: mangaId, 
                title: d.title, 
                chapter: numLimpio,
                image: d.cover || d.image, 
                imageIndex: imgIndex,
                time: Date.now()
            };

            // Guardar en local y en Firebase
            localStorage.setItem("manga_last_seen", JSON.stringify(datos));
            await updateDoc(doc(db, "users", currentUser.uid), {
                [`readingHistory.${mangaId}`]: datos
            });
        } catch(e) { console.error("Error al guardar progreso:", e); }
    }

    // Escuchar el scroll para guardar
    window.addEventListener('scroll', () => {
        if (!isReadyToSave) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => guardarProgreso(), 1500);
    });

    // 4. El Cerebro: Solo actúa cuando TODO está listo
    function intentarInicializarLector() {
        if (currentUser && imagesLoadedCount === totalImagesInChapter && totalImagesInChapter > 0 && !hasJumped) {
            hasJumped = true; // Solo saltamos una vez por carga
            ejecutarSaltoAImagen();
        }
    }

    async function ejecutarSaltoAImagen() {
        // Si entramos directo (sin click en 'continuar'), no saltamos pero activamos el guardado
        if (!shouldScroll) { 
            setTimeout(() => { isReadyToSave = true; }, 1000);
            return; 
        }

        try {
            // Pedimos a Firebase la "verdad" de dónde nos quedamos
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            let targetIndex = 0;

            if (userSnap.exists()) {
                const history = userSnap.data().readingHistory;
                const miProgreso = history ? history[mangaId] : null;
                
                // IMPORTANTE: Solo saltar si el progreso es del capítulo que tengo abierto
                if (miProgreso && miProgreso.chapter === numLimpio) {
                    targetIndex = miProgreso.imageIndex || 0;
                }
            }

            const todasLasImgs = document.querySelectorAll("#mangaPages img");
            const targetImg = todasLasImgs[targetIndex];

            if (targetImg) {
                // SALTO NATUVO: Mucho más confiable que los píxeles
                targetImg.scrollIntoView();
                // Ajuste fino por la navbar (75px)
                window.scrollBy(0, -80);
                
                // Re-confirmación para asegurar que el navegador no nos movió
                setTimeout(() => {
                    targetImg.scrollIntoView();
                    window.scrollBy(0, -80);
                    isReadyToSave = true; // A partir de aquí, ya puedes guardar nuevos movimientos
                }, 500);
            } else {
                isReadyToSave = true;
            }
        } catch (e) {
            console.error("Fallo al recuperar progreso:", e);
            isReadyToSave = true;
        }
    }

    async function loadReader() {
      if (!mangaId || !rawNumber) return;
      document.title = `M4A | Capítulo ${numLimpio}`;
      document.getElementById("chapterLabelTop").textContent = `Capítulo ${numLimpio}`;
      document.getElementById("listBtnTop").href = `manga.html?id=${mangaId}`;

      try {
        const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
        const snap = await getDocs(q);
        let caps = [];
        snap.forEach(d => { let data = d.data(); data.norm = String(data.number).trim(); caps.push(data); });
        caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
        
        const idx = caps.findIndex(c => c.norm === rawNumber);
        const tomo = caps[idx];

        if (tomo && tomo.images) {
          const cont = document.getElementById("mangaPages");
          totalImagesInChapter = tomo.images.length;

          tomo.images.forEach((url, i) => {
            const img = document.createElement("img");
            img.src = url;
            img.dataset.index = i;
            img.onload = () => {
                imagesLoadedCount++;
                intentarInicializarLector();
            };
            cont.appendChild(img);
          });
        }

        // Botones navegación
        if (idx > 0) document.getElementById("prevBtnTop").href = `reader.html?manga=${mangaId}&number=${caps[idx-1].number}`;
        else document.getElementById("prevBtnTop").classList.add("disabled");

        if (idx < caps.length - 1) document.getElementById("nextBtnTop").href = `reader.html?manga=${mangaId}&number=${caps[idx+1].number}`;
        else document.getElementById("nextBtnTop").textContent = "FIN";

      } catch (e) { console.error(e); }
    }
    loadReader();
  </script>
</body>
</html>
