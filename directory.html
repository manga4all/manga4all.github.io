<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio | Manga 4 All</title>
  <link rel="stylesheet" href="css/style.css?v=15">
  <style>
    /* Estilos específicos para los filtros del directorio */
    .filter-section {
      background: #111;
      padding: 25px;
      border-radius: 15px;
      border: 1px solid #222;
      margin-bottom: 40px;
    }
    .filter-group {
      margin-bottom: 20px;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      display: block;
      color: #ff0055;
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filter-btn {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #ff0055;
      color: white;
      border-color: #ff0055;
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
    }

    /* 🟢 GARANTÍA DE RENDERIZADO: Estilos para proteger las tarjetas, el Botón de Leer y el Tooltip */
    .manga-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }
    .manga-card {
      position: relative;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: 0.3s;
    }
    .manga-card:hover {
      border-color: #ff0055;
      transform: translateY(-5px);
    }
    .manga-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }
    .manga-card h3 {
      color: white;
      font-size: 0.85rem;
      padding: 12px 12px 6px 12px;
      margin: 0;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Botón de Leer Dedicado */
    .read-btn {
      display: block;
      background: #ff0055;
      color: white;
      text-align: center;
      padding: 8px;
      margin: 0 12px 12px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: bold;
      transition: 0.3s;
    }
    .read-btn:hover {
      background: #cc0044;
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
    }

    /* Tooltip Flotante para la Descripción */
    .manga-tooltip {
      position: absolute;
      bottom: 105%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 240px;
      background: #161616;
      border: 1px solid #333;
      border-left: 3px solid #ff0055;
      color: #bbb;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      line-height: 1.4;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    }
    .manga-tooltip h4 {
      color: white;
      margin-bottom: 5px;
      font-size: 0.85rem;
    }
    .manga-card:hover .manga-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Controles de la Paginación Inferior */
    .pagination-layout {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 40px 0;
      flex-wrap: wrap;
    }
    .page-nav-btn {
      background: #111;
      color: #fff;
      border: 1px solid #222;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .page-nav-btn:hover:not(:disabled) {
      border-color: #ff0055;
      color: #ff0055;
    }
    .page-nav-btn.active {
      background: #ff0055;
      border-color: #ff0055;
      color: white;
    }
    .page-nav-btn:disabled {
      background: #070707;
      color: #444;
      border-color: #111;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="css/navbar.css">

<div id="main-navbar"></div>

<script type="module" src="js/navbar.js"></script>

  <main class="container">
    <h1 class="section-title">Directorio de Mangas</h1>

    <aside class="filter-section">
        <div class="filter-group">
            <span class="filter-label">Ordenar Alfabéticamente</span>
            <div class="filter-options">
                <button class="filter-btn active" onclick="sortAlphabetical('asc')">A - Z</button>
                <button class="filter-btn" onclick="sortAlphabetical('desc')">Z - A</button>
            </div>
        </div>

        <div class="filter-group">
            <span class="filter-label">Filtrar por Género</span>
            <div id="genre-container" class="filter-options">
                <button class="filter-btn active" onclick="filterByGenre('Todos')">Todos</button>
            </div>
        </div>
    </aside>

    <div id="directory-grid" class="manga-grid">
        </div>

    <div id="pagination-container" class="pagination-layout"></div>
  </main>

  <footer>Manga 4 All © 2026</footer>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);

    let masterMangasArray = [];
    let processedMangasArray = [];
    let currentPage = 1;
    const itemsPerPage = 50;
    let currentGenreFilter = "Todos";
    let currentSortOrder = "asc";

    async function loadDirectoryData() {
        const grid = document.getElementById("directory-grid");
        grid.innerHTML = "<p style='color: #777; grid-column: 1/-1; text-align: center; padding: 20px;'>Cargando biblioteca...</p>";
        
        try {
            const snap = await getDocs(collection(db, "mangas"));
            masterMangasArray = [];
            let genresSet = new Set();

            snap.forEach(doc => {
                const data = doc.data();
                masterMangasArray.push({ id: doc.id, ...data });
                
                if (data.genres) {
                    if (Array.isArray(data.genres)) {
                        data.genres.forEach(g => genresSet.add(g.trim()));
                    } else if (typeof data.genres === 'string') {
                        data.genres.split(',').forEach(g => genresSet.add(g.trim()));
                    }
                }
            });

            buildDynamicGenreFilters(Array.from(genresSet).sort());
            processAndRenderEcosystem();

        } catch (error) {
            console.error("Error al cargar el directorio:", error);
            grid.innerHTML = "<p style='color: #ff0055; grid-column: 1/-1; text-align: center;'>Error al conectar con la base de datos.</p>";
        }
    }

    function buildDynamicGenreFilters(genres) {
        const container = document.getElementById("genre-container");
        container.innerHTML = `<button class="filter-btn active" onclick="filterByGenre('Todos')">Todos</button>`;
        genres.forEach(g => {
            if (g) {
                container.innerHTML += `<button class="filter-btn" onclick="filterByGenre('${g}')">${g}</button>`;
            }
        });
    }

    function processAndRenderEcosystem() {
        if (currentGenreFilter === "Todos") {
            processedMangasArray = [...masterMangasArray];
        } else {
            processedMangasArray = masterMangasArray.filter(m => {
                if (!m.genres) return false;
                if (Array.isArray(m.genres)) return m.genres.includes(currentGenreFilter);
                return m.genres.toLowerCase().includes(currentGenreFilter.toLowerCase());
            });
        }

        processedMangasArray.sort((a, b) => {
            const titleA = (a.title || "").trim().toLowerCase();
            const titleB = (b.title || "").trim().toLowerCase();
            return currentSortOrder === "asc" ? titleA.localeCompare(titleB) : titleB.localeCompare(titleA);
        });

        renderSegmentedPage();
    }

    function renderSegmentedPage() {
        const grid = document.getElementById("directory-grid");
        grid.innerHTML = "";

        if (processedMangasArray.length === 0) {
            grid.innerHTML = "<p style='color: #777; grid-column: 1/-1; text-align: center; padding: 20px;'>No se encontraron mangas.</p>";
            renderPaginationControls(0);
            return;
        }

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = processedMangasArray.slice(start, end);

        pageItems.forEach(manga => {
            const card = document.createElement("div");
            card.className = "manga-card";
            
            const linkUrl = `manga.html?id=${manga.id}`;
            const coverImg = manga.cover || manga.image || 'img/no-cover.png';
            const synopsis = manga.description || manga.synopsis || 'Sin descripción disponible por el momento.';

            card.innerHTML = `
                <a href="${linkUrl}">
                    <img src="${coverImg}" alt="${manga.title}" loading="lazy">
                </a>
                <h3>${manga.title || "Manga Sin Título"}</h3>
                
                <a href="${linkUrl}" class="read-btn">Leer</a>
                
                <div class="manga-tooltip">
                    <h4>${manga.title || "Sin título"}</h4>
                    <p>${synopsis}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        renderPaginationControls(processedMangasArray.length);
    }

    function renderPaginationControls(totalItems) {
        const container = document.getElementById("pagination-container");
        container.innerHTML = "";
        
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement("button");
        prevBtn.className = "page-nav-btn";
        prevBtn.textContent = "« Anterior";
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; renderSegmentedPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        container.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
            if (totalPages > 6 && Math.abs(currentPage - i) > 1 && i !== 1 && i !== totalPages) {
                if (i === 2 || i === totalPages - 1) {
                    const dots = document.createElement("span");
                    dots.style.color = "#444";
                    dots.style.padding = "0 4px";
                    dots.textContent = "...";
                    container.appendChild(dots);
                }
                continue;
            }

            const btn = document.createElement("button");
            btn.className = `page-nav-btn ${i === currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { currentPage = i; renderSegmentedPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            container.appendChild(btn);
        }

        const nextBtn = document.createElement("button");
        nextBtn.className = "page-nav-btn";
        nextBtn.textContent = "Siguiente »";
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; renderSegmentedPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        container.appendChild(nextBtn);
    }

    // Vinculación segura de los eventos onclick nativos del archivo HTML
    window.sortAlphabetical = function(order) {
        currentSortOrder = order;
        currentPage = 1; 
        
        const btns = document.querySelectorAll(".filter-section .filter-group:first-child .filter-btn");
        btns.forEach(b => b.classList.remove("active"));
        if (order === 'asc' && btns[0]) btns[0].classList.add("active");
        if (order === 'desc' && btns[1]) btns[1].classList.add("active");
        
        processAndRenderEcosystem();
    };

    window.filterByGenre = function(genre) {
        currentGenreFilter = genre;
        currentPage = 1; 

        const btns = document.querySelectorAll("#genre-container .filter-btn");
        btns.forEach(b => {
            if (b.textContent.trim().toLowerCase() === genre.toLowerCase()) b.classList.add("active");
            else b.classList.remove("active");
        });
        processAndRenderEcosystem();
    };

    loadDirectoryData();
  </script>
</body>
</html>
