<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lector M4A</title>
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    .manga-pages-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; background: #000; min-height: 100vh; }
    .manga-pages-container img { width: 100%; height: auto; display: block; margin-bottom: 2px; }
    .reader-nav { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; background: #111; position: sticky; top: 75px; z-index: 1000; }
    .btn-nav { background: #ff0055; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
    .btn-nav.disabled { opacity: 0.3; pointer-events: none; }
    #statusMsg { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>
  <div id="main-navbar"></div>
  <div class="reader-nav">
    <a href="#" id="prevBtn" class="btn-nav">Anterior</a>
    <span id="chapLabel">Cargando...</span>
    <a href="#" id="nextBtn" class="btn-nav">Siguiente</a>
  </div>
  <div class="manga-pages-container" id="mangaPages">
      <div id="statusMsg">Cargando páginas...</div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const chapterNum = params.get("number");

    async function loadChapter() {
        if (!mangaId || !chapterNum) return;
        document.getElementById("chapLabel").textContent = "Capítulo " + chapterNum;

        try {
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const snap = await getDocs(q);
            let caps = [];
            snap.forEach(d => caps.push(d.data()));

            // Orden numérico
            caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));

            // CORRECCIÓN CLAVE: Comparamos como NÚMEROS (parseFloat)
            // Así "1" de la URL es igual a "001" de la base de datos
            const target = parseFloat(chapterNum);
            const idx = caps.findIndex(c => parseFloat(c.number) === target);
            const tomo = caps[idx];

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                cont.innerHTML = "";
                tomo.images.forEach(url => {
                    const img = document.createElement("img");
                    img.src = url;
                    cont.appendChild(img);
                });

                // Botones Nav
                if (idx > 0) document.getElementById("prevBtn").href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx-1].number}`;
                else document.getElementById("prevBtn").classList.add("disabled");

                if (idx < caps.length - 1) document.getElementById("nextBtn").href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx+1].number}`;
                else document.getElementById("nextBtn").textContent = "FIN";
            } else {
                document.getElementById("statusMsg").textContent = "No se encontraron las imágenes.";
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById("statusMsg").textContent = "Error de conexión.";
        }
    }
    loadChapter();
  </script>
  <script type="module" src="js/navbar.js"></script>
</body>
</html>
