<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">M4A | Lector BB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    body { background: #070707; color: white; margin: 0; padding-top: 75px; }
    .reader-nav { 
        display: flex; justify-content: center; align-items: center; gap: 15px; 
        padding: 15px; background: rgba(17, 17, 17, 0.95); position: sticky; 
        top: 75px; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #1f1f1f; 
    }
    .btn-nav { 
        background: #ff0055; color: white; padding: 10px 25px; border-radius: 25px; 
        text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; 
    }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }
    #chapterLabelTop, #chapterLabelBottom { font-weight: 600; min-width: 150px; text-align: center; }
    .manga-pages-container { max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; min-height: 100vh; background: #000; }
    .manga-pages-container img { width: 100%; height: auto; display: block; background: #000; margin-bottom: 2px; }
    .list-btn { background: #1a1a1a; color: #ccc; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; }
    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    .nav-bottom { position: static; border-top: 1px solid #1f1f1f; margin-top: 20px; padding-bottom: 50px; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div class="manga-pages-container" id="mangaPages">
      <p id="loadingMsg" style="text-align:center; padding: 50px; color: #444;">Cargando páginas...</p>
  </div>

  <div class="reader-nav nav-bottom">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">Anterior</a>
    <span id="chapterLabelBottom">Capítulo...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">Siguiente</a>
  </div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    // TU CONFIGURACIÓN OFICIAL (La que sí sirve)
    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const rawNumber = params.get("number") ? params.get("number").trim() : null;

    let currentUser = null;
    let canSave = false;

    // Título de pestaña
    document.title = "M4A | Cap. " + rawNumber;

    onAuthStateChanged(auth, (user) => { currentUser = user; });

    async function loadImages() {
        if (!mangaId || !rawNumber) return;

        document.getElementById("chapterLabelTop").textContent = "Capítulo " + rawNumber;
        document.getElementById("chapterLabelBottom").textContent = "Capítulo " + rawNumber;
        document.querySelectorAll(".list-btn").forEach(b => b.href = "manga.html?id=" + mangaId);

        try {
            // Buscamos los tomos igual que en manga.html
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const querySnapshot = await getDocs(q);
            
            let allCaps = [];
            querySnapshot.forEach((docItem) => {
                let data = docItem.data();
                // Normalizamos para comparar
                data.norm = String(data.number).trim();
                allCaps.push(data);
            });

            // Ordenar
            allCaps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
            
            // Encontrar el capítulo actual
            const idx = allCaps.findIndex(c => c.norm === rawNumber);
            const tomo = allCaps[idx];

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                cont.innerHTML = ""; // Limpiar mensaje de carga

                tomo.images.forEach((url) => {
                    const img = document.createElement("img");
                    img.src = url;
                    cont.appendChild(img);
                });
                
                setupNav(allCaps, idx);
                setTimeout(() => { canSave = true; }, 2000);
            } else {
                document.getElementById("loadingMsg").textContent = "No se encontraron imágenes para este capítulo.";
            }
        } catch (error) { 
            console.error(error); 
            document.getElementById("loadingMsg").textContent = "Error al conectar con la base de datos.";
        }
    }

    function setupNav(caps, idx) {
        if (idx > 0) document.getElementById("prevBtnTop").href = document.getElementById("prevBtnBottom").href = "ReaderBB.html?manga=" + mangaId + "&number=" + caps[idx-1].number;
        else { document.getElementById("prevBtnTop").classList.add("disabled"); document.getElementById("prevBtnBottom").classList.add("disabled"); }
        
        if (idx < caps.length - 1) document.getElementById("nextBtnTop").href = document.getElementById("nextBtnBottom").href = "ReaderBB.html?manga=" + mangaId + "&number=" + caps[idx+1].number;
        else { document.getElementById("nextBtnTop").textContent = "FIN"; document.getElementById("nextBtnTop").classList.add("disabled"); }
    }

    function getVisibleIndex() {
        const imgs = document.querySelectorAll("#mangaPages img");
        for (let i = 0; i < imgs.length; i++) {
            if (imgs[i].getBoundingClientRect().bottom > 150) return i;
        }
        return 0;
    }

    window.addEventListener('scroll', () => {
        if (!canSave || !currentUser) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(async () => {
            const index = getVisibleIndex();
            try {
                const mSnap = await getDoc(doc(db, "mangas", mangaId));
                const d = mSnap.data();
                const info = { id: mangaId, title: d.title, chapter: rawNumber, image: (d.cover || d.image), imageIndex: index, time: Date.now() };
                localStorage.setItem("manga_last_seen", JSON.stringify(info));
                await updateDoc(doc(db, "users", currentUser.uid), { ["readingHistory." + mangaId]: info });
            } catch(e) {}
        }, 2000);
    });

    loadImages();
  </script>
  <script type="module" src="js/navbar.js"></script>
</body>
</html>
