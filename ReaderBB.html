<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">M4A | Capitulo ...</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/navbar.css">
  
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    
    body { 
        background: #070707; 
        color: white; 
        margin: 0; 
        padding-top: 75px; 
    }
    
    .reader-nav { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        gap: 25px; 
        padding: 15px; 
        background: rgba(17, 17, 17, 0.95); 
        position: sticky; 
        top: 75px; 
        z-index: 1000; 
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #1f1f1f;
    }

    /* Navegación inferior estática */
    .nav-bottom { 
        position: static; 
        border-top: 1px solid #1f1f1f; 
        margin-top: 20px; 
        padding-bottom: 50px; 
    }

    .btn-nav { 
        background: #ff0055; 
        color: white !important; 
        padding: 10px 25px; 
        border-radius: 25px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.9rem; 
        transition: 0.3s;
    }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }

    .list-btn {
        background: #1a1a1a;
        color: #ccc;
        padding: 10px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 1.1rem;
        border: 1px solid #333;
    }

    .chap-label { font-weight: 700; font-size: 1rem; min-width: 120px; text-align: center; }

    .manga-pages-container { 
        max-width: 850px; 
        margin: 0 auto; 
        display: flex; 
        flex-direction: column; 
        background: #000; 
    }
    .manga-pages-container img { width: 100%; height: auto; display: block; margin-bottom: 2px; }

    #resumeNotice { display: none; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #ff0055; padding: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; }

    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰</a>
    <a href="#" id="prevBtnTop" class="btn-nav">Anterior</a>
    <span id="chapLabelTop" class="chap-label">Capitulo ...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">Siguiente</a>
  </div>

  <div id="resumeNotice">Sincronizando progreso...</div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav nav-bottom">
    <a href="#" id="listBtnBottom" class="list-btn">☰</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">Anterior</a>
    <span id="chapLabelBottom" class="chap-label">Capitulo ...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">Siguiente</a>
  </div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module" src="js/navbar.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    // Agregamos deleteField para la limpieza del historial
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const chapterNum = params.get("number");
    const shouldScroll = params.get("scroll") === "true";

    let currentUser = null;
    let canSave = false;
    let hasJumped = false;
    let imagesTotalCount = 0;
    let esUltimoCapitulo = false;

    document.title = `M4A | Capitulo ${chapterNum}`;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (shouldScroll && !hasJumped && document.querySelectorAll("#mangaPages img").length > 0) {
            ejecutarSalto();
        }
    });

    async function loadChapter() {
        if (!mangaId || !chapterNum) return;
        
        // Setup labels y links de lista
        const labels = [document.getElementById("chapLabelTop"), document.getElementById("chapLabelBottom")];
        labels.forEach(l => l.textContent = "Capitulo " + chapterNum);
        
        const listBtns = [document.getElementById("listBtnTop"), document.getElementById("listBtnBottom")];
        listBtns.forEach(b => b.href = "manga.html?id=" + mangaId);

        try {
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const snap = await getDocs(q);
            let caps = [];
            snap.forEach(d => {
                let data = d.data();
                data.norm = String(data.number).trim();
                caps.push(data);
            });

            caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
            const target = parseFloat(chapterNum);
            const idx = caps.findIndex(c => parseFloat(c.number) === target);
            const tomo = caps[idx];

            // Detectar si es el último capítulo
            esUltimoCapitulo = (idx === caps.length - 1);

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                cont.innerHTML = "";
                imagesTotalCount = tomo.images.length;

                tomo.images.forEach(url => {
                    const img = document.createElement("img");
                    img.src = url;
                    cont.appendChild(img);
                });

                // Configurar Navegación sincronizada
                setupNav(caps, idx);

                if (shouldScroll) {
                    document.getElementById("resumeNotice").style.display = "block";
                    setTimeout(ejecutarSalto, 600);
                } else {
                    setTimeout(() => { canSave = true; }, 1500);
                }
            }
        } catch (e) { console.error(e); }
    }

    function setupNav(caps, idx) {
        const prevs = [document.getElementById("prevBtnTop"), document.getElementById("prevBtnBottom")];
        const nexts = [document.getElementById("nextBtnTop"), document.getElementById("nextBtnBottom")];

        if (idx > 0) {
            prevs.forEach(p => p.href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx-1].number}`);
        } else {
            prevs.forEach(p => p.classList.add("disabled"));
        }

        if (idx < caps.length - 1) {
            nexts.forEach(n => n.href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx+1].number}`);
        } else {
            nexts.forEach(n => {
                n.textContent = "FIN";
                n.classList.add("disabled");
                n.href = "#";
            });
        }
    }

    async function ejecutarSalto() {
        if (hasJumped || !currentUser) return;
        try {
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (userSnap.exists()) {
                const history = userSnap.data().readingHistory;
                const prog = history ? history[mangaId] : null;

                if (prog && parseFloat(prog.chapter) === parseFloat(chapterNum)) {
                    const todas = document.querySelectorAll("#mangaPages img");
                    const targetIndex = prog.imageIndex || 0;
                    if (todas[targetIndex]) {
                        hasJumped = true;
                        const rect = todas[targetIndex].getBoundingClientRect();
                        const pos = rect.top + window.pageYOffset - 140;
                        window.scrollTo({ top: pos, behavior: 'instant' });
                    }
                }
            }
        } catch(e) {}
        document.getElementById("resumeNotice").style.display = "none";
        setTimeout(() => { canSave = true; }, 1000);
        hasJumped = true;
    }

    function getVisibleIndex() {
        const imgs = document.querySelectorAll("#mangaPages img");
        for (let i = 0; i < imgs.length; i++) {
            if (imgs[i].getBoundingClientRect().bottom > 160) return i;
        }
        return imgs.length - 1;
    }

    window.addEventListener('scroll', () => {
        if (!canSave || !currentUser) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(async () => {
            const index = getVisibleIndex();
            try {
                const userRef = doc(db, "users", currentUser.uid);

                // LÓGICA DE LIMPIEZA: Si es el último cap y última imagen
                if (esUltimoCapitulo && index >= (imagesTotalCount - 1)) {
                    await updateDoc(userRef, {
                        ["readingHistory." + mangaId]: deleteField()
                    });
                    const local = JSON.parse(localStorage.getItem("manga_last_seen"));
                    if (local && local.id === mangaId) localStorage.removeItem("manga_last_seen");
                } else {
                    // Guardado normal
                    const mSnap = await getDoc(doc(db, "mangas", mangaId));
                    const d = mSnap.data();
                    const info = { 
                        id: mangaId, title: d.title, chapter: chapterNum, 
                        image: (d.cover || d.image), imageIndex: index, time: Date.now() 
                    };
                    localStorage.setItem("manga_last_seen", JSON.stringify(info));
                    await updateDoc(userRef, { ["readingHistory." + mangaId]: info });
                }
            } catch(e) {}
        }, 2000);
    });

    loadChapter();
  </script>
</body>
</html>
