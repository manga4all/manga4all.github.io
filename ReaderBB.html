<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tabTitle">M4A | Capitulo ...</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/navbar.css">
  
  <style>
    * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }
    
    /* 1. BODY IDÉNTICO AL ORIGINAL (75px) */
    body { 
        background: #070707; 
        color: white; 
        margin: 0; 
        padding-top: 75px; 
    }
    
    /* 2. READER NAV FIJO A 75px (Como el original) */
    .reader-nav { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        gap: 25px; /* El espacio que pediste en verde */
        padding: 15px; 
        background: rgba(17, 17, 17, 0.95); 
        position: sticky; 
        top: 75px; /* Pegado justo donde termina la navbar original */
        z-index: 1000; 
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #1f1f1f;
    }

    /* Botones con texto blanco y legible */
    .btn-nav { 
        background: #ff0055; 
        color: white !important; 
        padding: 10px 25px; 
        border-radius: 25px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.9rem; 
        transition: 0.3s;
    }
    .btn-nav.disabled { background: #222 !important; color: #555 !important; pointer-events: none; opacity: 0.6; }

    /* Estilo botón lista */
    .list-btn {
        background: #1a1a1a;
        color: #ccc;
        padding: 10px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 1.1rem;
        border: 1px solid #333;
    }

    #chapLabel { font-weight: 700; font-size: 1rem; min-width: 120px; text-align: center; }

    .manga-pages-container { 
        max-width: 850px; 
        margin: 0 auto; 
        display: flex; 
        flex-direction: column; 
        background: #000; 
    }
    .manga-pages-container img { width: 100%; height: auto; display: block; margin-bottom: 2px; }

    footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <div class="reader-nav">
    <a href="#" id="listBtn" class="list-btn">☰</a>
    <a href="#" id="prevBtn" class="btn-nav">Anterior</a>
    <span id="chapLabel">Capitulo ...</span>
    <a href="#" id="nextBtn" class="btn-nav">Siguiente</a>
  </div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module" src="js/navbar.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const chapterNum = params.get("number");

    // Título de pestaña: M4A | Capitulo [N]
    document.title = `M4A | Capitulo ${chapterNum}`;

    async function loadChapter() {
        if (!mangaId || !chapterNum) return;
        document.getElementById("chapLabel").textContent = "Capitulo " + chapterNum;
        document.getElementById("listBtn").href = "manga.html?id=" + mangaId;

        try {
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const snap = await getDocs(q);
            let caps = [];
            snap.forEach(d => {
                let data = d.data();
                data.norm = String(data.number).trim();
                caps.push(data);
            });

            caps.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
            const target = parseFloat(chapterNum);
            const idx = caps.findIndex(c => parseFloat(c.number) === target);
            const tomo = caps[idx];

            if (tomo && tomo.images) {
                const cont = document.getElementById("mangaPages");
                cont.innerHTML = "";
                tomo.images.forEach(url => {
                    const img = document.createElement("img");
                    img.src = url;
                    cont.appendChild(img);
                });

                // Navegación
                if (idx > 0) document.getElementById("prevBtn").href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx-1].number}`;
                else document.getElementById("prevBtn").classList.add("disabled");

                if (idx < caps.length - 1) document.getElementById("nextBtn").href = `ReaderBB.html?manga=${mangaId}&number=${caps[idx+1].number}`;
                else document.getElementById("nextBtn").textContent = "FIN";
            }
        } catch (e) { console.error(e); }
    }
    loadChapter();
  </script>
</body>
</html>
