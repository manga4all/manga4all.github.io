<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Manga 4 All</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

    <div id="main-navbar"></div>

    <div class="profile-layout">
        <aside class="profile-sidebar">
            <div class="avatar-edit-container">
                <img src="img/default-user.png" id="profileAvatar" alt="Avatar">
                <label for="avatarUpload" class="edit-overlay">
                    <span>Cambiar</span>
                </label>
                <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
            </div>
            <h2 id="userNameDisplay">Cargando...</h2>
            <p id="userEmailDisplay">---</p>
            
            <nav class="profile-menu">
                <button class="menu-btn active" id="btn-info" onclick="switchTab('info')">👤 Mis Datos</button>
                <button class="menu-btn" id="btn-favs" onclick="switchTab('favs')">❤️ Favoritos</button>
                <button class="menu-btn" id="btn-history" onclick="switchTab('history')">📖 Continuar Leyendo</button>
            </nav>
        </aside>

        <main class="profile-content">
            <section id="tab-info" class="tab-pane active">
                <h3>Información Personal</h3>
                <div class="info-form">
                    <div class="input-group">
                        <label>Nombre de Usuario</label>
                        <input type="text" id="editName" placeholder="Tu nombre">
                    </div>
                    <div class="input-group">
                        <label>País / Ubicación</label>
                        <select id="editCountry">
                            <option value="">Seleccionar...</option>
                            <option value="GT">Guatemala</option>
                            <option value="MX">México</option>
                            <option value="ES">España</option>
                            <option value="AR">Argentina</option>
                            <option value="CL">Chile</option>
                            <option value="CO">Colombia</option>
                            <option value="PE">Perú</option>
                            <option value="US">Estados Unidos</option>
                        </select>
                    </div>
                    <button class="save-btn" id="saveProfileBtn">Guardar Cambios</button>
                </div>

                <hr style="margin: 40px 0; border: 0; border-top: 1px solid #222;">

                <h3>Seguridad</h3>
                <div class="info-form">
                    <div class="input-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres">
                    </div>
                    <button class="save-btn" id="updatePassBtn" style="background: #333; border: 1px solid #444;">Actualizar Contraseña</button>
                </div>
            </section>

            <section id="tab-favs" class="tab-pane">
                <div class="tab-header">
                    <h3>Mis Mangas Favoritos</h3>
                    <span class="count" id="favCount">0 Mangas</span>
                </div>
                <div class="manga-grid-perfil" id="favsGrid">
                    <p class="empty-msg">Cargando favoritos...</p>
                </div>
            </section>

            <section id="tab-history" class="tab-pane">
                <div class="tab-header">
                    <h3>Continuar Leyendo</h3>
                </div>
                <div class="manga-grid-perfil" id="historyGrid">
                    <p class="empty-msg">Cargando historial...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/navbar.js"></script>
    <script type="module" src="js/perfil.js"></script>
</body>
</html>
