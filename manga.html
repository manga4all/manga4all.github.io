<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Cargando... | Manga 4 All</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/style.css?v=21">

  <style>
    /* APLICAR FUENTE GLOBAL */
    * { 
        font-family: 'Poppins', sans-serif !important; 
        box-sizing: border-box;
    }

    body {
        background: #070707;
        color: white;
        margin: 0;
        /* ESPACIO PARA QUE LA NAVBAR FIJA NO TAPE EL CONTENIDO */
        padding-top: 100px; 
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .manga-page {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 40px;
        margin-bottom: 50px;
    }

    #mangaCover {
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid #1f1f1f;
    }

    #mangaTitle {
        font-size: 2.5rem;
        margin-top: 0;
        margin-bottom: 10px;
        font-weight: 700;
    }

    #mangaGenres {
        margin-bottom: 20px;
        color: #ff0055;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 0.8rem;
    }

    #mangaDescription {
        line-height: 1.8;
        color: #bbb;
        font-size: 1rem;
        margin-bottom: 30px;
    }

    /* ESTILO DE LA LISTA DE CAPÍTULOS */
    .chapter-row-item {
        background: #111;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 25px;
        border-radius: 12px;
        text-decoration: none;
        color: white;
        margin-bottom: 12px;
        border: 1px solid #1a1a1a;
        transition: 0.3s;
    }

    .chapter-row-item:hover {
        background: #1a1a1a;
        border-color: #ff0055;
        transform: translateX(5px);
    }

    .chapter-row-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .chapter-row-img {
        width: 50px;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
    }

    .section-title {
        border-left: 4px solid #ff0055;
        padding-left: 15px;
        font-size: 1.4rem;
        font-weight: 600;
    }

    footer {
        text-align: center;
        padding: 50px;
        color: #444;
        border-top: 1px solid #111;
        margin-top: 50px;
    }

    @media (max-width: 850px) {
        .manga-page { grid-template-columns: 1fr; }
        .manga-cover-side { text-align: center; }
        #mangaCover { max-width: 280px; }
    }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <section class="container">
    <div class="manga-page">
      
      <div class="manga-cover-side">
        <img id="mangaCover" src="" alt="Portada">
      </div>

      <div class="manga-content-side">
        <h1 id="mangaTitle">Cargando...</h1>
        <div id="mangaGenres"></div>
        <p id="mangaDescription">Esperando datos ...</p>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 25px;">
            <h2 class="section-title" style="margin: 0;">Capítulos Disponibles</h2>
            <button id="toggleOrderBtn" style="background: transparent; border: 1px solid #ff0055; color: #ff0055; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem;">
                Invertir Orden
            </button>
        </div>
        
        <div class="chapters-grid-list" id="chaptersGrid"></div>

        <div id="loadMoreContainer" style="text-align: center; margin-top: 30px; display: none;">
            <button id="loadMoreBtn" style="background: #111; border: 1px solid #333; color: white; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                Ver más capítulos
            </button>
        </div>
      </div>

    </div>
  </section>

  <footer>MANGA 4 ALL © 2026</footer>

  <script type="module" src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import {
      doc, getDoc, collection, query, where, getDocs
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("id");

    const mangaTitle = document.getElementById("mangaTitle");
    const mangaDescription = document.getElementById("mangaDescription");
    const mangaCover = document.getElementById("mangaCover");
    const mangaGenres = document.getElementById("mangaGenres");
    const chaptersGrid = document.getElementById("chaptersGrid");
    
    let allChapters = [];
    let itemsToShow = 20;
    let isDescending = true;

    async function loadMangaData() {
      if(!mangaId) return;

      try {
        const mangaRef = doc(db, "mangas", mangaId);
        const mangaSnap = await getDoc(mangaRef);

        if (mangaSnap.exists()) {
          const manga = mangaSnap.data();
          document.title = manga.title + " | Manga 4 All";
          mangaTitle.textContent = manga.title;
          mangaDescription.textContent = manga.description;
          mangaCover.src = manga.cover;

          if (manga.genres && manga.genres.length > 0) {
            mangaGenres.textContent = manga.genres.join(" • ");
          }
        }

        const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
        const querySnapshot = await getDocs(q);
        
        allChapters = [];
        querySnapshot.forEach((docItem) => {
          allChapters.push(docItem.data());
        });

        renderChapters();

      } catch (error) {
        console.error("Error cargando manga.html:", error);
      }
    }

    function renderChapters() {
      if (isDescending) {
        allChapters.sort((a, b) => parseFloat(b.number) - parseFloat(a.number));
      } else {
        allChapters.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));
      }

      const visibleChapters = allChapters.slice(0, itemsToShow);

      chaptersGrid.innerHTML = "";
      visibleChapters.forEach((tomo) => {
        const numeroLimpio = parseFloat(tomo.number);
        chaptersGrid.innerHTML += `
          <a class="chapter-row-item" href="reader.html?manga=${mangaId}&number=${tomo.number}">
            <div class="chapter-row-left">
              <img src="${tomo.cover}" class="chapter-row-img" alt="Cap ${numeroLimpio}">
              <div style="display: flex; flex-direction: column;">
                 <span style="font-size: 0.65rem; color: #ff0055; font-weight: bold; letter-spacing: 1px;">CAPÍTULO</span>
                 <span style="font-size: 1.1rem; font-weight: bold;">${numeroLimpio}</span>
              </div>
            </div>
            <div style="background: #ff0055; color: white; padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 0.75rem;">
              LEER
            </div>
          </a>
        `;
      });

      const loadMoreContainer = document.getElementById("loadMoreContainer");
      if (itemsToShow < allChapters.length) {
        loadMoreContainer.style.display = "block";
      } else {
        loadMoreContainer.style.display = "none";
      }
    }

    document.getElementById("loadMoreBtn").addEventListener("click", () => {
      itemsToShow += 20;
      renderChapters();
    });

    document.getElementById("toggleOrderBtn").addEventListener("click", () => {
      isDescending = !isDescending;
      itemsToShow = 20;
      renderChapters();
    });

    loadMangaData();
  </script>
</body>
</html>
