<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Cargando... | M4A</title>
  <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Buscar manga...">
    </div>
  </nav>

  <section class="container">
    <div class="manga-page">
      <div class="manga-cover-side">
        <img id="mangaCover" src="" alt="">
      </div>
      <div class="manga-content-side">
        <h1 id="mangaTitle">Cargando...</h1>
        <p id="mangaDescription">Esperando datos...</p>
        <h2 class="section-title">Capítulos</h2>
        <div class="chapters-grid"></div>
      </div>
    </div>
  </section>

  <footer>Manga 4 All © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("id");
    async function loadManga() {
      if(!mangaId) return;
      const mangaRef = doc(db, "mangas", mangaId);
      const mangaSnap = await getDoc(mangaRef);
      if (mangaSnap.exists()) {
        const manga = mangaSnap.data();
        document.getElementById("mangaTitle").textContent = manga.title;
        document.getElementById("mangaDescription").textContent = manga.description;
        document.getElementById("mangaCover").src = manga.cover;
        document.title = manga.title + " | M4A";
      }
      const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), orderBy("number"));
      const querySnapshot = await getDocs(q);
      const grid = document.querySelector(".chapters-grid");
      grid.innerHTML = "";
      querySnapshot.forEach((docItem) => {
        const tomo = docItem.data();
        grid.innerHTML += `<a class="chapter-card" href="reader.html?manga=${mangaId}&number=${tomo.number}"><img src="${tomo.cover}"><div class="chapter-info"><h3>Capítulo ${parseFloat(tomo.number)}</h3><span class="btn">Leer ahora</span></div></a>`;
      });
    }
    loadManga();
  </script>
  <script src="js/navbar.js"></script>
</body>
</html>
