<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Cargando...</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

  <nav>
    <div class="logo">Manga 4 All</div>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
    </div>
  </nav>

  <section class="container">
    <div class="manga-page">
      <div class="manga-cover-side">
        <img id="mangaCover" src="" alt="">
      </div>

      <div class="manga-content-side">
        <h1 id="mangaTitle"></h1>
        <p id="mangaDescription"></p>
        <h2 class="section-title">Capítulos</h2>
        <div class="chapters-grid"></div>
      </div>
    </div>
  </section>

  <script type="module">
    import { db } from "./js/firebase.js";
    import {
      doc,
      getDoc,
      collection,
      query,
      where,
      getDocs,
      orderBy
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("id");

    const mangaTitle = document.getElementById("mangaTitle");
    const mangaDescription = document.getElementById("mangaDescription");
    const mangaCover = document.getElementById("mangaCover");
    const chaptersGrid = document.querySelector(".chapters-grid");

    async function loadManga() {
      // DATOS DEL MANGA
      const mangaRef = doc(db, "mangas", mangaId);
      const mangaSnap = await getDoc(mangaRef);

      if (mangaSnap.exists()) {
        const manga = mangaSnap.data();
        document.title = manga.title + " | Manga 4 All";
        mangaTitle.textContent = manga.title;
        mangaDescription.textContent = manga.description;
        mangaCover.src = manga.cover;
      }

      // LISTADO DE CAPÍTULOS (TOMOS)
      const q = query(
        collection(db, "tomos"),
        where("mangaId", "==", mangaId),
        orderBy("number")
      );

      const querySnapshot = await getDocs(q);
      chaptersGrid.innerHTML = "";

      querySnapshot.forEach((docItem) => {
        const tomo = docItem.data();

        // --- CORRECCIÓN DE VISUALIZACIÓN ---
        // Usamos parseFloat para quitar los ceros a la izquierda (001 -> 1, 000.5 -> 0.5)
        const numeroParaMostrar = parseFloat(tomo.number);

        chaptersGrid.innerHTML += `
          <a class="chapter-card" href="reader.html?manga=${mangaId}&number=${tomo.number}">
            <img src="${tomo.cover}" alt="Capítulo ${numeroParaMostrar}">
            <div class="chapter-info">
              <h3>Capítulo ${numeroParaMostrar}</h3>
              <span class="btn">Leer</span>
            </div>
          </a>
        `;
      });
    }

    loadManga();
  </script>

</body>
</html>
