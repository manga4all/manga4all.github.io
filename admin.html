<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 20px; padding-bottom: 100px; }
    .admin-container { max-width: 900px; margin: auto; }
    h1 { margin-bottom: 20px; color: #ff0055; font-size: 1.8rem; }
    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #1f1f1f; padding-bottom: 10px; overflow-x: auto; }
    .tab-btn { background: #1a1a1a; color: #888; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; white-space: nowrap; }
    .tab-btn.active { background: #ff0055; color: white; }
    .tab-content { display: none; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #1f1f1f; }
    .tab-content.active { display: block; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 15px; }
    .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }
    .file-input-wrapper { background: #1a1a1a; padding: 20px; border: 2px dashed #333; border-radius: 10px; text-align: center; margin-bottom: 18px; cursor: pointer; }
    .result-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .genres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .genre-item input { width: auto; cursor: pointer; accent-color: #ff0055; }
  </style>
</head>
<body>

  <script>
    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
      if(tabName === 'editTab') window.dispatchEvent(new CustomEvent('refreshSelector'));
    }
  </script>

  <div class="admin-container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
      <button class="tab-btn" onclick="openTab('fullTab')">🚀 Todo en Uno</button>
      <button class="tab-btn" onclick="openTab('bulkTab')">📦 Carga Industrial</button>
      <button class="tab-btn" onclick="openTab('nukeTab')">🧨 Limpieza</button>
      <button class="tab-btn" onclick="openTab('editTab')">✏️ Gestionar</button>
      <button class="tab-btn" onclick="openTab('settingsTab')">⚙️ Géneros</button>
    </div>

    <div id="bulkTab" class="tab-content">
      <h1>📦 Carga Industrial (Excel + Carpeta)</h1>
      <div class="input-group"><label>1. Archivo Excel</label><input type="file" id="bulkExcelInput" accept=".xlsx, .xls, .csv"></div>
      <div class="input-group">
        <label>2. Carpeta de JSONs</label>
        <div class="file-input-wrapper" style="border-color: #ff0055;" onclick="document.getElementById('bulkFolderInput').click()">
            <input type="file" id="bulkFolderInput" webkitdirectory directory multiple style="display:none;">
            <p id="folderStatus">Seleccionar Carpeta</p>
        </div>
      </div>
      <button class="primary-btn" id="startBulkBtn">🔥 Iniciar Carga Masiva</button>
      <div id="bulkStatus" class="result-msg" style="text-align:left; background:#000; padding:15px; border-radius:10px; font-family:monospace; font-size:0.8rem; max-height:250px; overflow-y:auto; margin-top:20px; display:none;"></div>
    </div>

    <div id="nukeTab" class="tab-content">
        <h1 style="color: #ff3333;">🧨 Limpieza de Emergencia</h1>
        <p style="margin-bottom: 20px; color: #bbb;">Esta herramienta borrará <b>exactamente los últimos 30 mangas</b> registrados y todos los capítulos que pertenezcan a ellos.</p>
        <div style="background: #222; padding: 20px; border-radius: 10px; border: 1px solid #ff3333;">
            <p style="color: #ff3333; font-weight: bold; margin-bottom: 15px;">⚠️ ACCIÓN IRREVERSIBLE</p>
            <button class="primary-btn" id="nuke30Btn" style="background: #900;">BORRAR ÚLTIMOS 30 MANGAS Y SUS CAPÍTULOS</button>
        </div>
        <div id="nukeStatus" class="result-msg"></div>
    </div>

    <div id="mangaTab" class="tab-content active">
      <h1>Registrar Nueva Serie</h1>
      <div class="input-group"><label>Título</label><input type="text" id="mangaTitle"></div>
      <div class="input-group"><label>Descripción</label><textarea id="mangaDesc"></textarea></div>
      <div class="input-group"><label>Portada (Link Drive)</label><input type="text" id="mangaCover"></div>
      <div class="input-group"><label>Géneros</label><div class="genres-grid" id="genresGrid"></div></div>
      <button class="primary-btn" id="createMangaBtn">🚀 Crear Manga</button>
      <div id="mangaResult" style="display:none; margin-top:20px; text-align:center; color:#00ff88;">✅ Creado. ID: <span id="newMangaId"></span></div>
    </div>

    <div id="fullTab" class="tab-content"><h1>Todo en Uno</h1><div id="fullGenresGrid" class="genres-grid"></div><input type="file" id="fullJsonInput"><button id="fullProcessBtn" class="primary-btn">Procesar</button><div id="fullStatus"></div></div>
    <div id="editTab" class="tab-content"><h1>Gestionar</h1><select id="editMangaSelector"></select><div id="editForm" style="display:none;"><div id="editGenresGrid" class="genres-grid"></div><button id="updateMangaBtn" class="primary-btn">Actualizar</button></div></div>
    <div id="settingsTab" class="tab-content"><h1>Ajustes</h1><input type="text" id="newGenreName"><button id="addGenreBtn">Añadir</button><div id="genreListDisplay"></div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, Timestamp, getDocs, doc, getDoc, updateDoc, onSnapshot, deleteDoc, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- UTILIDADES DRIVE (RESPETANDO TU LÓGICA) ---
    function extractDriveId(url) {
      if(!url) return null;
      const match = String(url).match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      return match ? (match[1] || match[2]) : url;
    }
    function formatDriveThumbnail(url, size = "w1600") {
      const id = extractDriveId(url);
      if(!id) return null;
      return String(id).startsWith('http') ? id : `https://drive.google.com/thumbnail?id=${id}&sz=${size}`;
    }

    // --- LÓGICA DE LIMPIEZA (SOLO ÚLTIMOS 30) ---
    document.getElementById('nuke30Btn').onclick = async () => {
        if (!confirm("¿Seguro? Se borrarán los últimos 30 mangas subidos y todos sus capítulos.")) return;
        const status = document.getElementById('nukeStatus');
        status.innerHTML = "⏳ Iniciando limpieza profunda...";
        
        try {
            // 1. Obtener los últimos 30 mangas
            const q = query(collection(db, "mangas"), orderBy("createdAt", "desc"), limit(30));
            const snap = await getDocs(q);
            
            let mCount = 0;
            let tCount = 0;

            for (const mDoc of snap.docs) {
                const mId = mDoc.id;
                // 2. Buscar todos los tomos de este manga
                const qTomos = query(collection(db, "tomos"), where("mangaId", "==", mId));
                const snapTomos = await getDocs(qTomos);
                
                for (const tDoc of snapTomos.docs) {
                    await deleteDoc(doc(db, "tomos", tDoc.id));
                    tCount++;
                }
                // 3. Borrar el manga
                await deleteDoc(doc(db, "mangas", mId));
                mCount++;
                status.innerHTML = `⏳ Borrando: ${mCount} mangas y ${tCount} capítulos...`;
            }
            status.innerHTML = `✅ Limpieza exitosa: ${mCount} mangas y ${tCount} tomos eliminados.`;
            status.className = "result-msg success";
        } catch (e) {
            status.innerHTML = "❌ Error: " + e.message;
            status.className = "result-msg error";
        }
    };

    // --- CARGA INDUSTRIAL ---
    let jsonMap = {};
    document.getElementById('bulkFolderInput').onchange = (e) => {
        jsonMap = {};
        for(let file of e.target.files) if(file.name.toLowerCase().endsWith('.json')) jsonMap[file.name.toLowerCase()] = file;
        document.getElementById('folderStatus').innerText = `✅ ${Object.keys(jsonMap).length} JSONs listos`;
    };

    document.getElementById('startBulkBtn').onclick = async () => {
        const exc = document.getElementById('bulkExcelInput').files[0];
        const stat = document.getElementById('bulkStatus');
        if(!exc) return alert("Sube el Excel");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const sheet = XLSX.utils.sheet_to_json(XLSX.read(data, {type:'array'}).Sheets[XLSX.read(data, {type:'array'}).SheetNames[0]]);
            stat.style.display = "block";
            
            for(let row of sheet) {
                const name = row.Nombre || row.nombre;
                const cover = row.Portada || row.portada;
                const desc = row.Sinopsis || row.sinopsis || "";
                const gens = (row.Generos || row.generos || "").split(',').map(x => x.trim()).filter(x => x);
                const jName = String(row.JSON || row.json || "").toLowerCase().trim();

                stat.innerHTML += `<div style="color:#00ccff">> Procesando ${name}...</div>`;
                const finalCover = formatDriveThumbnail(cover, "w1000"); // Lógica de portada original
                
                const mRef = await addDoc(collection(db, "mangas"), { 
                    title: name, description: desc, cover: finalCover, genres: gens, createdAt: Timestamp.now() 
                });
                
                if(jName && jsonMap[jName]) {
                    const jData = JSON.parse(await jsonMap[jName].text());
                    for(let cap of jData) {
                        const imgs = cap.links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u); // Lógica de páginas original
                        await addDoc(collection(db, "tomos"), { 
                            mangaId: mRef.id, number: String(cap.capitulo), cover: finalCover, images: imgs, createdAt: Timestamp.now() 
                        });
                    }
                    stat.innerHTML += `<div style="color:#00ff88">   ✅ ${name} subido con éxito</div>`;
                }
            }
            stat.innerHTML += `<div style="color:yellow; font-weight:bold;">¡PROCESO FINALIZADO!</div>`;
        };
        reader.readAsArrayBuffer(exc);
    };

    // --- EL RESTO DE TUS FUNCIONES ORIGINALES ---
    // (Géneros dinámicos, Crear manga individual, Limpieza al subir, etc.)
    // ...
  </script>
</body>
</html>
