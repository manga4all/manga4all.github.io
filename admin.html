<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin (JSON Edition)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 20px; }
    
    .admin-container { max-width: 900px; margin: auto; }
    
    .tabs-header { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #1f1f1f; padding-bottom: 10px; }
    .tab-btn { 
      background: #1a1a1a; color: #888; border: none; padding: 12px 25px; 
      border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .tab-btn.active { background: #ff0055; color: white; }
    .tab-content { display: none; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #1f1f1f; }
    .tab-content.active { display: block; }

    h1 { margin-bottom: 25px; font-size: 1.6rem; color: #ff0055; }
    .input-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 8px; color: #bbb; font-size: 0.9rem; }
    input, textarea { 
      width: 100%; padding: 14px; border: none; border-radius: 10px; 
      background: #1a1a1a; color: white; font-size: 15px; border: 1px solid transparent;
    }
    input:focus, textarea:focus { border-color: #ff0055; outline: none; background: #222; }
    
    .file-input-wrapper {
      background: #1a1a1a; padding: 20px; border: 2px dashed #333; border-radius: 10px; text-align: center; margin-bottom: 18px;
    }

    button.primary-btn { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; 
      background: #ff0055; color: white; font-size: 16px; cursor: pointer; 
      transition: 0.3s; font-weight: bold;
    }
    button.primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }

    .id-display { 
      background: #000; border: 1px dashed #00ff88; padding: 15px; 
      border-radius: 10px; margin-top: 20px; display: none; text-align: center;
    }
    .id-value { color: #00ff88; font-family: monospace; font-size: 1.2rem; display: block; margin: 10px 0; }
    
    .result-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .success { color: #00ff88; }
    .error { color: #ff3333; }
    .info { color: #00ccff; font-size: 0.9rem; }
  </style>
</head>

<body>

  <div class="admin-container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
      <button class="tab-btn" onclick="openTab('chapterTab')">📂 Subir Capítulos (JSON)</button>
    </div>

    <div id="mangaTab" class="tab-content active">
      <h1>Registrar Nueva Serie</h1>
      <div class="input-group">
        <label>Título del Manga</label>
        <input type="text" id="mangaTitle" placeholder="Ej: Dungeon Meshi">
      </div>
      <div class="input-group">
        <label>Descripción</label>
        <textarea id="mangaDesc" placeholder="De qué trata la historia..."></textarea>
      </div>
      <div class="input-group">
        <label>Link de Portada Principal (Google Drive)</label>
        <input type="text" id="mangaCover" placeholder="Pega el link de la portada">
      </div>
      <button class="primary-btn" id="createMangaBtn">Guardar Manga</button>
      
      <div id="mangaIdResult" class="id-display">
        <span style="color: #bbb; font-size: 0.9rem;">Manga creado con éxito. ID para capítulos:</span>
        <strong id="newMangaId" class="id-value">---</strong>
        <button onclick="copyId()" style="background: #333; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Copiar ID</button>
      </div>
      <div id="mangaStatus" class="result-msg"></div>
    </div>

    <div id="chapterTab" class="tab-content">
      <h1>Publicar Capítulos Masivos</h1>
      <div class="input-group">
        <label>ID del Manga (Donde se subirán los capítulos)</label>
        <input type="text" id="targetMangaId" placeholder="ID obtenido de la pestaña anterior">
      </div>

      <div class="input-group">
        <label>Portada Predeterminada para los capítulos (Link Drive)</label>
        <input type="text" id="chapterCoverBase" placeholder="Opcional: Portada para los tomos">
        <small style="color: #666;">Nota: Se aplicará la misma portada a todo el lote del JSON.</small>
      </div>

      <div class="file-input-wrapper">
        <label style="color: #ff0055; cursor: pointer;">
          📁 Seleccionar archivo JSON del Script
          <input type="file" id="jsonFileInput" accept=".json" style="display: none;">
        </label>
        <div id="fileNameDisplay" style="margin-top: 10px; font-size: 0.8rem; color: #888;">Ningún archivo seleccionado</div>
      </div>

      <button class="primary-btn" id="uploadJsonBtn">🚀 Iniciar Carga Masiva</button>
      
      <div id="chapterStatus" class="result-msg"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, Timestamp 
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
      authDomain: "manga4all-f520f.firebaseapp.com",
      projectId: "manga4all-f520f",
      storageBucket: "manga4all-f520f.firebasestorage.app",
      messagingSenderId: "372561836700",
      appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- UTILIDADES ---
    function extractDriveId(url) {
      if(!url) return null;
      const match = url.match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      return match ? (match[1] || match[2]) : null;
    }

    function formatDriveThumbnail(url, size = "w1600") {
      const id = extractDriveId(url);
      return id ? `https://drive.google.com/thumbnail?id=${id}&sz=${size}` : null;
    }

    // --- UI TABS ---
    window.openTab = (tabName) => {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    };

    // Mostrar nombre del archivo seleccionado
    document.getElementById('jsonFileInput').addEventListener('change', function(e) {
      const fileName = e.target.files[0] ? e.target.files[0].name : "Ningún archivo seleccionado";
      document.getElementById('fileNameDisplay').innerText = fileName;
    });

    // --- ACCIÓN: CREAR MANGA ---
    document.getElementById('createMangaBtn').addEventListener('click', async () => {
      const title = document.getElementById('mangaTitle').value.trim();
      const description = document.getElementById('mangaDesc').value.trim();
      const coverUrl = document.getElementById('mangaCover').value.trim();
      const status = document.getElementById('mangaStatus');

      if (!title || !description || !coverUrl) {
        status.innerHTML = "❌ Completa todos los campos";
        status.className = "result-msg error";
        return;
      }

      try {
        const finalCover = formatDriveThumbnail(coverUrl, "w1000");
        const docRef = await addDoc(collection(db, "mangas"), {
          title,
          description,
          cover: finalCover,
          createdAt: Timestamp.now()
        });

        document.getElementById('mangaIdResult').style.display = "block";
        document.getElementById('newMangaId').innerText = docRef.id;
        status.innerHTML = "✅ Manga guardado correctamente";
        status.className = "result-msg success";
      } catch (e) {
        status.innerHTML = "❌ Error al guardar";
        console.error(e);
      }
    });

    // --- ACCIÓN: SUBIR JSON (CARGA MASIVA) ---
    document.getElementById('uploadJsonBtn').addEventListener('click', async () => {
      const mangaId = document.getElementById('targetMangaId').value.trim();
      const coverUrlBase = document.getElementById('chapterCoverBase').value.trim();
      const fileInput = document.getElementById('jsonFileInput');
      const status = document.getElementById('chapterStatus');

      if (!mangaId || !fileInput.files[0]) {
        status.innerHTML = "❌ Indica el ID del Manga y selecciona el JSON";
        status.className = "result-msg error";
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = async (e) => {
        try {
          const chaptersData = JSON.parse(e.target.result);
          const finalChapterCover = formatDriveThumbnail(coverUrlBase, "w1000") || "";
          
          status.innerHTML = "⏳ Iniciando carga masiva...";
          status.className = "result-msg info";

          let count = 0;

          for (const item of chaptersData) {
            // item.capitulo es el string (ej: "000.01")
            // item.links es el array de links de Drive
            
            const transformedImages = item.links.map(link => formatDriveThumbnail(link, "w1600")).filter(u => u !== null);

            await addDoc(collection(db, "tomos"), {
              mangaId,
              number: String(item.capitulo), // Se guarda como String
              cover: finalChapterCover,
              images: transformedImages,
              createdAt: Timestamp.now()
            });

            count++;
            status.innerHTML = `⏳ Cargando: ${count} / ${chaptersData.length} (Cap. ${item.capitulo})`;
          }

          status.innerHTML = `✅ ¡Éxito! Se subieron ${count} capítulos correctamente.`;
          status.className = "result-msg success";
        } catch (err) {
          status.innerHTML = "❌ Error al procesar el archivo JSON";
          console.error(err);
        }
      };

      reader.readAsText(file);
    });

    window.copyId = () => {
      const id = document.getElementById('newMangaId').innerText;
      navigator.clipboard.writeText(id);
      alert("ID Copiado");
    };
  </script>
</body>
</html>
