<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }

    #login-overlay { position: fixed; inset: 0; background: #070707; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #ff0055; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 85, 0.2); }
    .login-box h2 { color: #ff0055; margin-bottom: 25px; }

    #admin-ui { display: none; width: 100%; }
    .sidebar { width: 260px; background: #111; border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
    .sidebar h2 { color: #ff0055; font-size: 1.4rem; margin-bottom: 30px; text-align: center; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 900px; }
    
    .tabs-header { display: flex; flex-direction: column; gap: 12px; }
    .tab-btn { background: #1a1a1a; color: #aaa; border: none; padding: 14px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: left; }
    .tab-btn:hover { background: #252525; color: white; transform: translateX(5px); }
    .tab-btn.active { background: #ff0055; color: white; }

    .tab-content { display: none; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #1f1f1f; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 15px; }
    
    .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }

    .genres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .file-input-wrapper { background: #1a1a1a; padding: 25px; border: 2px dashed #333; border-radius: 12px; text-align: center; cursor: pointer; }
    
    #bulkStatus, #nukeStatus { background:#000; padding:15px; border-radius:10px; font-family:monospace; font-size:0.8rem; margin-top:20px; display:none; max-height:350px; overflow-y:auto; border: 1px solid #333; color: #0f0; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
        <h2>Acceso Restringido</h2>
        <div class="input-group"><input type="email" id="adminEmail" placeholder="Admin Email"></div>
        <div class="input-group"><input type="password" id="adminPassword" placeholder="Contraseña"></div>
        <button class="primary-btn" id="loginBtn">Entrar</button>
        <p id="loginError" style="color: #ff3333; margin-top: 15px; font-size: 0.9rem;"></p>
    </div>
  </div>

  <div id="admin-ui">
    <aside class="sidebar">
      <h2>Manga 4 All</h2>
      <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab('bulkTab')">📦 Carga Industrial</button>
        <button class="tab-btn" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
        <button class="tab-btn" onclick="openTab('editTab')">✏️ Gestionar</button>
        <button class="tab-btn" onclick="openTab('nukeTab')" style="color:#ff3333; margin-top: 20px; border: 1px solid #300;">🧨 Limpieza Total</button>
        <button id="logoutBtn" style="margin-top: 15px; background: none; border: none; color: #555; cursor: pointer; font-size: 0.8rem; text-decoration: underline;">Cerrar Sesión</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="admin-container">

        <div id="bulkTab" class="tab-content active">
            <h1>📦 Carga Industrial</h1>
            <div class="input-group"><label>1. Excel</label><input type="file" id="bulkExcelInput" accept=".xlsx, .csv"></div>
            <div class="input-group">
                <label>2. Carpeta de JSONs</label>
                <div class="file-input-wrapper" onclick="document.getElementById('bulkFolderInput').click()">
                    📁 Seleccionar Carpeta
                    <input type="file" id="bulkFolderInput" webkitdirectory directory multiple style="display:none;">
                    <p id="folderStatus">No seleccionada</p>
                </div>
            </div>
            <button class="primary-btn" id="startBulkBtn">🔥 Iniciar Carga Masiva</button>
            <div id="bulkStatus"></div>
        </div>

        <div id="nukeTab" class="tab-content">
            <h1 style="color:#ff3333;">🧨 Limpieza Total de Hoy</h1>
            <p style="margin-bottom: 20px; color: #888;">Esta acción borrará ABSOLUTAMENTE TODO lo que se haya subido hoy (mangas y capítulos). Úsalo para reiniciar el proceso.</p>
            <button class="primary-btn" id="nukeBtn" style="background:#900;">BORRAR TODO LO DE HOY</button>
            <div id="nukeStatus"></div>
        </div>

        <div id="mangaTab" class="tab-content">
            <h1>Registrar Nueva Serie</h1>
            <div class="input-group"><label>Título</label><input type="text" id="mangaTitle"></div>
            <div class="input-group"><label>Géneros</label><div class="genres-grid" id="genresGrid"></div></div>
            <button class="primary-btn" id="createMangaBtn">Crear</button>
        </div>

        <div id="editTab" class="tab-content">
            <h1>✏️ Gestionar</h1>
            <select id="editMangaSelector"><option value="">Cargando...</option></select>
        </div>

      </div>
    </main>
  </div>

  <script>
    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      if (event) event.currentTarget.classList.add('active');
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, Timestamp, getDocs, doc, getDoc, updateDoc, onSnapshot, deleteDoc, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "brian.ag.cd2@gmail.com";
    let listenersReady = false;

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('admin-ui').style.display = "block";
            if (!listenersReady) {
                initAdminListeners();
                listenersReady = true;
            }
        } else {
            document.getElementById('login-overlay').style.display = "flex";
            document.getElementById('admin-ui').style.display = "none";
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('adminEmail').value.trim();
        const pass = document.getElementById('adminPassword').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { document.getElementById('loginError').innerText = "Acceso denegado"; }
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    function initAdminListeners() {
        const formatDriveThumbnail = (url, size = "w1600") => {
          if(!url) return null;
          const match = String(url).match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
          const id = match ? (match[1] || match[2]) : url;
          return String(id).startsWith('http') ? id : `https://drive.google.com/thumbnail?id=${id}&sz=${size}`;
        };

        // --- CARGA INDUSTRIAL ---
        let jsonFilesMap = {};
        document.getElementById('bulkFolderInput').onchange = (e) => {
            jsonFilesMap = {};
            for(let f of e.target.files) {
                const n = f.name.toLowerCase().trim();
                jsonFilesMap[n] = f;
                jsonFilesMap[n.replace('.json', '')] = f;
            }
            document.getElementById('folderStatus').innerText = "✅ Carpeta de JSONs lista";
        };

        document.getElementById('startBulkBtn').onclick = async function() {
            const btn = this;
            const excelInput = document.getElementById('bulkExcelInput');
            const status = document.getElementById('bulkStatus');
            if(!excelInput.files[0]) return alert("Sube el Excel");

            btn.disabled = true;
            btn.innerText = "⏳ TRABAJANDO...";
            status.style.display = "block";
            status.innerHTML = "=== INICIANDO PROCESO ===<br>";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});

                for(let i = 1; i < data.length; i++) {
                    const row = data[i]; if(!row || !row[0]) continue;
                    const nombre = String(row[0]).trim();
                    const jName = String(row[4] || "").toLowerCase().trim();

                    status.innerHTML += `> [${i}] Subiendo: ${nombre}...<br>`;
                    status.scrollTop = status.scrollHeight;

                    try {
                        const mRef = await addDoc(collection(db, "mangas"), {
                            title: nombre,
                            description: String(row[2] || "").trim(),
                            cover: formatDriveThumbnail(row[1], "w1000"),
                            genres: String(row[3] || "").split(',').map(x => x.trim()).filter(x => x),
                            createdAt: Timestamp.now()
                        });

                        if(jsonFilesMap[jName]) {
                            const jData = JSON.parse(await jsonFilesMap[jName].text());
                            for(let cap of jData) {
                                const links = cap.links || cap.images || [];
                                const imgs = links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u);
                                await addDoc(collection(db, "tomos"), {
                                    mangaId: mRef.id,
                                    number: String(cap.capitulo || cap.number || 0),
                                    images: imgs,
                                    createdAt: Timestamp.now()
                                });
                            }
                            status.innerHTML += `<span style="color:#0f0">   ✅ ÉXITO</span><br>`;
                        }
                    } catch (err) { status.innerHTML += `<span style="color:#f00">   ❌ ERROR: ${err.message}</span><br>`; }
                }
                status.innerHTML += "<br>⭐⭐ PROCESO TERMINADO ⭐⭐";
                btn.disabled = false;
                btn.innerText = "🔥 Iniciar Carga Masiva";
            };
            reader.readAsArrayBuffer(excelInput.files[0]);
        };

        // --- LIMPIEZA TOTAL DE HOY ---
        document.getElementById('nukeBtn').onclick = async () => {
            if(!confirm("¿Borrar ABSOLUTAMENTE TODO lo subido hoy? Esta acción limpiará la base de datos para empezar de cero.")) return;
            const stat = document.getElementById('nukeStatus');
            stat.style.display = "block";
            stat.innerHTML = "⏳ Calculando registros de hoy...";

            try {
                const hoy = new Date();
                hoy.setHours(0, 0, 0, 0);
                const inicioHoy = Timestamp.fromDate(hoy);

                // 1. Buscamos mangas
                const q = query(collection(db, "mangas"), where("createdAt", ">=", inicioHoy));
                const snap = await getDocs(q);

                if (snap.empty) {
                    stat.innerHTML = "ℹ️ No hay nada que borrar de hoy.";
                    return;
                }

                stat.innerHTML = `⏳ Borrando ${snap.size} mangas y sus capítulos...`;

                for(let mDoc of snap.docs) {
                    // Borrar capítulos
                    const ts = await getDocs(query(collection(db, "tomos"), where("mangaId", "==", mDoc.id)));
                    for(let tDoc of ts.docs) await deleteDoc(doc(db, "tomos", tDoc.id));
                    // Borrar manga
                    await deleteDoc(doc(db, "mangas", mDoc.id));
                }

                stat.innerHTML = `✅ Limpieza completa. Se eliminaron ${snap.size} mangas y todos sus capítulos.`;
            } catch (e) { stat.innerHTML = "❌ Error: " + e.message; }
        };

        // Géneros
        onSnapshot(collection(db, "generos"), (snap) => {
            const gens = snap.docs.map(d => d.data().nombre).sort();
            const c = document.getElementById('genresGrid');
            if(c) c.innerHTML = gens.map(g => `<label class="genre-item"><input type="checkbox" class="genre-checkbox-genresGrid" value="${g}"> ${g}</label>`).join('');
        });
    }
  </script>
</body>
</html>
