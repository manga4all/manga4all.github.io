<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 20px; padding-bottom: 100px; }
    .admin-container { max-width: 900px; margin: auto; }

    h1 { margin-bottom: 20px; color: #ff0055; font-size: 1.8rem; }

    /* TABS */
    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #1f1f1f; padding-bottom: 10px; overflow-x: auto; }
    .tab-btn { 
      background: #1a1a1a; color: #888; border: none; padding: 12px 20px; 
      border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; white-space: nowrap;
    }
    .tab-btn.active { background: #ff0055; color: white; }
    .tab-content { display: none; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #1f1f1f; }
    .tab-content.active { display: block; }

    /* FORMULARIOS */
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { 
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
      background: #1a1a1a; color: white; font-size: 15px;
    }
    input:focus, textarea:focus, select:focus { border-color: #ff0055; outline: none; background: #222; }
    textarea { height: 100px; resize: vertical; }

    /* GÉNEROS CHECKBOX GRID */
    .genres-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
      gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222;
    }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .genre-item input { width: auto; cursor: pointer; accent-color: #ff0055; }

    .primary-btn { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; 
      background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }

    .file-input-wrapper {
      background: #1a1a1a; padding: 20px; border: 2px dashed #333; border-radius: 10px; 
      text-align: center; margin-bottom: 18px; cursor: pointer;
    }

    /* RESULTADOS */
    .id-display { 
      background: #000; border: 1px dashed #00ff88; padding: 15px; 
      border-radius: 10px; margin-top: 20px; display: none; text-align: center;
    }
    .id-display span { color: #00ff88; font-weight: bold; font-family: monospace; }
    .result-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .success { color: #00ff88; }
    .error { color: #ff3333; }
    .info { color: #00ccff; }
  </style>
</head>
<body>

  <script>
    function openTab(tabName) {
      const contents = document.querySelectorAll('.tab-content');
      const buttons = document.querySelectorAll('.tab-btn');
      contents.forEach(t => t.classList.remove('active'));
      buttons.forEach(b => b.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
      
      // Si la pestaña es la de editar, lanzamos el evento para cargar mangas
      if(tabName === 'editTab') {
          window.dispatchEvent(new CustomEvent('refreshSelector'));
      }
    }
  </script>

  <div class="admin-container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
      <button class="tab-btn" onclick="openTab('fullTab')">🚀 Todo en Uno</button>
      <button class="tab-btn" onclick="openTab('bulkTab')">📦 Carga Industrial</button>
      <button class="tab-btn" onclick="openTab('editTab')">✏️ Gestionar</button>
      <button class="tab-btn" onclick="openTab('singleTab')">📄 Capítulo</button>
      <button class="tab-btn" onclick="openTab('jsonTab')">📂 JSON Masivo</button>
      <button class="tab-btn" onclick="openTab('settingsTab')">⚙️ Géneros</button>
    </div>

    <div id="mangaTab" class="tab-content active">
      <h1>Registrar Nueva Serie</h1>
      <div class="input-group"><label>Título</label><input type="text" id="mangaTitle"></div>
      <div class="input-group"><label>Descripción</label><textarea id="mangaDesc"></textarea></div>
      <div class="input-group"><label>Portada (Link Drive)</label><input type="text" id="mangaCover"></div>
      <div class="input-group"><label>Géneros</label><div class="genres-grid" id="genresGrid"></div></div>
      <button class="primary-btn" id="createMangaBtn">🚀 Crear Manga</button>
      <div id="mangaResult" class="id-display">
        <p>✅ ID único: <span id="newMangaId">---</span></p>
        <button onclick="window.copyId('newMangaId')" style="padding:5px 10px; margin-top:10px;">Copiar ID</button>
      </div>
    </div>

    <div id="fullTab" class="tab-content">
      <h1>🚀 Crear Manga y Subir Capítulos</h1>
      <div class="input-group"><label>Título</label><input type="text" id="fullMangaTitle"></div>
      <div class="input-group"><label>Descripción</label><textarea id="fullMangaDesc"></textarea></div>
      <div class="input-group"><label>Portada</label><input type="text" id="fullMangaCover"></div>
      <div class="input-group"><label>Géneros</label><div class="genres-grid" id="fullGenresGrid"></div></div>
      <div class="file-input-wrapper" onclick="document.getElementById('fullJsonInput').click()">
        📁 Seleccionar JSON <input type="file" id="fullJsonInput" accept=".json" style="display: none;">
        <div id="fullFileNameDisplay" style="font-size: 0.8rem; color: #888;">Ninguno</div>
      </div>
      <button class="primary-btn" id="fullProcessBtn">🚀 Iniciar Proceso</button>
      <div id="fullStatus" class="result-msg"></div>
    </div>

    <div id="bulkTab" class="tab-content">
      <h1>📦 Carga Industrial (Excel + Carpeta)</h1>
      <div class="input-group"><label>1. Archivo Excel</label><input type="file" id="bulkExcelInput" accept=".xlsx, .xls, .csv"></div>
      <div class="input-group">
        <label>2. Carpeta de JSONs</label>
        <div class="file-input-wrapper" style="border-color: #ff0055;" onclick="document.getElementById('bulkFolderInput').click()">
            <input type="file" id="bulkFolderInput" webkitdirectory directory multiple style="display:none;">
            <p id="folderStatus">Seleccionar Carpeta</p>
        </div>
      </div>
      <button class="primary-btn" id="startBulkBtn">🔥 Iniciar Carga Masiva</button>
      <div id="bulkStatus" class="result-msg" style="text-align:left; background:#000; padding:15px; border-radius:10px; font-family:monospace; font-size:0.8rem; max-height:250px; overflow-y:auto; margin-top:20px; display:none;"></div>
    </div>

    <div id="editTab" class="tab-content">
      <h1>✏️ Editar Manga</h1>
      <div class="input-group"><label>Seleccionar Manga</label><select id="editMangaSelector"><option value="">Cargando...</option></select></div>
      <div id="editForm" style="display:none; border-top:1px solid #333; padding-top:20px;">
          <div class="input-group"><label>Título</label><input type="text" id="editTitle"></div>
          <div class="input-group"><label>Descripción</label><textarea id="editDesc"></textarea></div>
          <div class="input-group"><label>Portada</label><input type="text" id="editCover"></div>
          <div class="input-group"><label>Géneros</label><div class="genres-grid" id="editGenresGrid"></div></div>
          <button class="primary-btn" id="updateMangaBtn">💾 Guardar Cambios</button>
          <div id="editStatus" class="result-msg"></div>
      </div>
    </div>

    <div id="settingsTab" class="tab-content">
        <h1>⚙️ Ajustes de Géneros</h1>
        <div class="input-group"><input type="text" id="newGenreName" placeholder="Nuevo Género"><button class="primary-btn" id="addGenreBtn" style="margin-top:10px;">➕ Añadir</button></div>
        <div id="genreListDisplay" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;"></div>
    </div>

    <div id="singleTab" class="tab-content">
      <h1>Capítulo Individual</h1>
      <input type="text" id="singleMangaId" placeholder="ID Manga"><br><br>
      <input type="number" id="singleNum" placeholder="N° Cap"><br><br>
      <input type="text" id="singleCover" placeholder="Cover Cap"><br><br>
      <textarea id="singleImages" style="height:100px;" placeholder="Links..."></textarea>
      <button class="primary-btn" id="uploadSingleBtn" style="margin-top:20px;">Publicar</button>
      <div id="singleStatus" class="result-msg"></div>
    </div>

    <div id="jsonTab" class="tab-content">
      <h1>JSON Masivo</h1>
      <input type="text" id="targetMangaId" placeholder="ID Manga"><br><br>
      <input type="file" id="jsonFileInput" accept=".json">
      <button class="primary-btn" id="uploadJsonBtn" style="margin-top:20px;">Subir</button>
      <div id="jsonStatus" class="result-msg"></div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, Timestamp, getDocs, doc, getDoc, updateDoc, onSnapshot, deleteDoc
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- UTILIDADES ---
    function extractDriveId(url) {
      if(!url) return null;
      const match = url.match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      return match ? (match[1] || match[2]) : url;
    }
    function formatDriveThumbnail(url, size = "w1600") {
      const id = extractDriveId(url);
      if(!id) return null;
      return id.startsWith('http') ? id : `https://drive.google.com/thumbnail?id=${id}&sz=${size}`;
    }
    window.copyId = (id) => {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        alert("ID Copiado");
    };

    // --- GÉNEROS DINÁMICOS ---
    onSnapshot(collection(db, "generos"), (snap) => {
        const gens = snap.docs.map(d => ({id: d.id, n: d.data().nombre})).sort((a,b) => a.n.localeCompare(b.n));
        ['genresGrid', 'fullGenresGrid', 'editGenresGrid'].forEach(id => {
            const container = document.getElementById(id);
            if(!container) return;
            container.innerHTML = gens.map(g => `<label class="genre-item"><input type="checkbox" class="genre-checkbox-${id}" value="${g.n}"> ${g.n}</label>`).join('');
        });
        document.getElementById('genreListDisplay').innerHTML = gens.map(g => `<span style="background:#222; padding:5px 10px; border-radius:15px; border:1px solid #ff0055;">${g.n} <b onclick="window.delGen('${g.id}')" style="cursor:pointer; color:red; margin-left:5px;">×</b></span>`).join('');
    });
    document.getElementById('addGenreBtn').onclick = async () => {
        const n = document.getElementById('newGenreName').value.trim();
        if(n) await addDoc(collection(db, "generos"), { nombre: n });
        document.getElementById('newGenreName').value = "";
    };
    window.delGen = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "generos", id)); };

    // --- EDITAR ---
    async function refreshSel() {
        const snap = await getDocs(collection(db, "mangas"));
        const sel = document.getElementById('editMangaSelector');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>' + snap.docs.map(d => `<option value="${d.id}">${d.data().title}</option>`).join('');
    }
    window.addEventListener('refreshSelector', refreshSel);
    document.getElementById('editMangaSelector').onchange = async (e) => {
        const id = e.target.value;
        if(!id) return;
        const d = (await getDoc(doc(db, "mangas", id))).data();
        document.getElementById('editForm').style.display = "block";
        document.getElementById('editTitle').value = d.title;
        document.getElementById('editDesc').value = d.description || "";
        document.getElementById('editCover').value = d.cover;
        document.querySelectorAll('.genre-checkbox-editGenresGrid').forEach(cb => cb.checked = d.genres?.includes(cb.value));
    };
    document.getElementById('updateMangaBtn').onclick = async () => {
        const id = document.getElementById('editMangaSelector').value;
        await updateDoc(doc(db, "mangas", id), {
            title: document.getElementById('editTitle').value,
            description: document.getElementById('editDesc').value,
            cover: document.getElementById('editCover').value,
            genres: Array.from(document.querySelectorAll('.genre-checkbox-editGenresGrid:checked')).map(cb => cb.value)
        });
        alert("Actualizado");
        refreshSel();
    };

    // --- TODO EN UNO (CON LIMPIEZA) ---
    document.getElementById('fullProcessBtn').onclick = async () => {
        const t = document.getElementById('fullMangaTitle').value;
        const d = document.getElementById('fullMangaDesc').value;
        const c = document.getElementById('fullMangaCover').value;
        const f = document.getElementById('fullJsonInput').files[0];
        const g = Array.from(document.querySelectorAll('.genre-checkbox-fullGenresGrid:checked')).map(cb => cb.value);
        const s = document.getElementById('fullStatus');

        if(!t || !f) return alert("Faltan datos");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const json = JSON.parse(e.target.result);
            s.innerHTML = "⏳ Subiendo...";
            const mRef = await addDoc(collection(db, "mangas"), { title: t, description: d, cover: formatDriveThumbnail(c, "w1000"), genres: g, createdAt: Timestamp.now() });
            for(const item of json) {
                const imgs = item.links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u);
                await addDoc(collection(db, "tomos"), { mangaId: mRef.id, number: String(item.capitulo), cover: formatDriveThumbnail(c, "w1000"), images: imgs, createdAt: Timestamp.now() });
            }
            s.innerHTML = "✅ Éxito";
            document.getElementById('fullMangaTitle').value = ""; document.getElementById('fullMangaDesc').value = ""; document.getElementById('fullMangaCover').value = "";
            document.querySelectorAll('.genre-checkbox-fullGenresGrid').forEach(cb => cb.checked = false);
        };
        reader.readAsText(f);
    };

    // --- CARGA INDUSTRIAL (EXCEL) ---
    let jsonMap = {};
    document.getElementById('bulkFolderInput').onchange = (e) => {
        jsonMap = {};
        for(let file of e.target.files) if(file.name.endsWith('.json')) jsonMap[file.name] = file;
        document.getElementById('folderStatus').innerText = `✅ ${Object.keys(jsonMap).length} JSONs listos`;
    };

    document.getElementById('startBulkBtn').onclick = async () => {
        const exc = document.getElementById('bulkExcelInput').files[0];
        const stat = document.getElementById('bulkStatus');
        if(!exc) return alert("Sube el Excel");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const sheet = XLSX.utils.sheet_to_json(XLSX.read(data, {type:'array'}).Sheets[XLSX.read(data, {type:'array'}).SheetNames[0]]);
            stat.style.display = "block";
            
            for(let row of sheet) {
                const name = row.Nombre || row.nombre;
                const cover = row.Portada || row.portada;
                const desc = row.Sinopsis || row.sinopsis || "";
                const gens = (row.Generos || row.generos || "").split(',').map(x => x.trim()).filter(x => x);
                const jName = row.JSON || row.json;

                stat.innerHTML += `<div style="color:#00ccff">> Procesando ${name}...</div>`;
                const mRef = await addDoc(collection(db, "mangas"), { title: name, description: desc, cover: formatDriveThumbnail(cover, "w1000"), genres: gens, createdAt: Timestamp.now() });
                
                if(jName && jsonMap[jName]) {
                    const jData = JSON.parse(await jsonMap[jName].text());
                    for(let cap of jData) {
                        const imgs = cap.links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u);
                        await addDoc(collection(db, "tomos"), { mangaId: mRef.id, number: String(cap.capitulo), cover: formatDriveThumbnail(cover, "w1000"), images: imgs, createdAt: Timestamp.now() });
                    }
                    stat.innerHTML += `<div style="color:#00ff88">✅ ${name} subido</div>`;
                }
            }
            stat.innerHTML += `<div style="color:yellow; font-weight:bold;">¡PROCESO FINALIZADO!</div>`;
        };
        reader.readAsArrayBuffer(exc);
    };

    // Display nombres archivos
    document.getElementById('fullJsonInput').onchange = (e) => document.getElementById('fullFileNameDisplay').innerText = e.target.files[0]?.name || "Ninguno";
  </script>
</body>
</html>
