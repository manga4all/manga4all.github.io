<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Subir Capítulos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 40px; }
    .form-container { max-width: 800px; margin: auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #1f1f1f; }
    h1 { margin-bottom: 25px; font-size: 1.8rem; color: #ff0055; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #bbb; font-size: 0.9rem; }
    input, textarea { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; 
      background: #1a1a1a; color: white; font-size: 16px; border: 1px solid transparent;
    }
    input:focus, textarea:focus { border-color: #ff0055; outline: none; }
    textarea { height: 150px; resize: vertical; font-family: monospace; font-size: 12px; }
    button { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; 
      background: #ff0055; color: white; font-size: 16px; cursor: pointer; 
      transition: 0.3s; font-weight: bold; margin-top: 10px;
    }
    button:hover { background: #ff2b72; transform: translateY(-2px); }
    .result { margin-top: 20px; text-align: center; font-weight: bold; }
    .success { color: #00ff88; }
    .error { color: #ff3333; }
    .info { color: #55aaff; font-size: 0.8rem; margin-top: 5px; }
  </style>
</head>

<body>

  <div class="form-container">
    <h1>🚀 Subir Nuevo Capítulo</h1>

    <div class="input-group">
      <label>ID del Manga (Document ID en Firestore)</label>
      <input type="text" id="mangaId" placeholder="Ej: MT1L5qCUnia0xFNv5Ldy">
    </div>

    <div class="input-group">
      <label>Número del Capítulo / Tomo</label>
      <input type="number" id="number" placeholder="Ej: 1">
    </div>

    <div class="input-group">
      <label>Link de la Portada (Google Drive)</label>
      <input type="text" id="cover" placeholder="https://drive.google.com/file/d/XXXXX/view">
    </div>

    <div class="input-group">
      <label>Lista de Links de Imágenes (Pega todos los links aquí)</label>
      <textarea id="imagesList" placeholder="Pega los links obtenidos del script, uno por línea..."></textarea>
      <p class="info">El sistema convertirá automáticamente los links de Drive a imágenes directas.</p>
    </div>

    <button id="uploadBtn">Publicar Capítulo</button>

    <div class="result" id="result"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, Timestamp 
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    // TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
      authDomain: "manga4all-f520f.firebaseapp.com",
      projectId: "manga4all-f520f",
      storageBucket: "manga4all-f520f.firebasestorage.app",
      messagingSenderId: "372561836700",
      appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const uploadBtn = document.getElementById("uploadBtn");
    const result = document.getElementById("result");

    // Función para extraer el ID de cualquier link de Drive
    function extractDriveId(url) {
      const match = url.match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      if (match) return match[1] || match[2];
      return null;
    }

    // Convierte un ID de Drive a un link directo que el navegador puede leer como imagen
    function makeDirectLink(id) {
      // Usamos el servidor de contenido lh3 que es el más rápido para imágenes
      return `https://lh3.googleusercontent.com/u/0/d/${id}`;
    }

    uploadBtn.addEventListener("click", async () => {
      result.innerHTML = "Procesando...";
      result.className = "result";

      try {
        const mangaId = document.getElementById("mangaId").value.trim();
        const number = parseInt(document.getElementById("number").value);
        const coverUrl = document.getElementById("cover").value.trim();
        const rawImages = document.getElementById("imagesList").value.trim();

        if (!mangaId || isNaN(number) || !coverUrl || !rawImages) {
          throw new Error("Por favor, completa todos los campos.");
        }

        // 1. Procesar Portada
        const coverId = extractDriveId(coverUrl);
        const finalCover = `https://drive.google.com/thumbnail?id=${coverId}&sz=w1000`;

        // 2. Procesar Lista de Imágenes
        const lines = rawImages.split('\n');
        const finalImagesArray = [];

        lines.forEach(line => {
          const id = extractDriveId(line.trim());
          if (id) {
            finalImagesArray.push(makeDirectLink(id));
          }
        });

        if (finalImagesArray.length === 0) {
          throw new Error("No se detectaron IDs válidos en la lista de imágenes.");
        }

        // 3. Subir a Firestore
        await addDoc(collection(db, "tomos"), {
          mangaId,
          number,
          cover: finalCover,
          images: finalImagesArray, // Guardamos como ARRAY de links directos
          createdAt: Timestamp.now()
        });

        result.innerHTML = `✅ ¡Éxito! Capítulo ${number} publicado con ${finalImagesArray.length} páginas.`;
        result.className = "result success";
        
        // Limpiar campos (opcional)
        document.getElementById("number").value = number + 1;
        document.getElementById("imagesList").value = "";

      } catch (error) {
        console.error(error);
        result.innerHTML = "❌ " + error.message;
        result.className = "result error";
      }
    });
  </script>
</body>
</html>
