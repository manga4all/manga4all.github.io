<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    /* ... (Mantenemos todos tus estilos anteriores intactos) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 20px; padding-bottom: 100px; }
    .admin-container { max-width: 900px; margin: auto; }
    h1 { margin-bottom: 20px; color: #ff0055; font-size: 1.8rem; }
    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #1f1f1f; padding-bottom: 10px; overflow-x: auto; }
    .tab-btn { background: #1a1a1a; color: #888; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; white-space: nowrap; }
    .tab-btn.active { background: #ff0055; color: white; }
    .tab-content { display: none; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #1f1f1f; }
    .tab-content.active { display: block; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { border-color: #ff0055; outline: none; background: #222; }
    textarea { height: 100px; resize: vertical; }
    .genres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .genre-item input { width: auto; cursor: pointer; accent-color: #ff0055; }
    .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }
    .file-input-wrapper { background: #1a1a1a; padding: 20px; border: 2px dashed #333; border-radius: 10px; text-align: center; margin-bottom: 18px; cursor: pointer; }
    .id-display { background: #000; border: 1px dashed #00ff88; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; }
    .id-display span { color: #00ff88; font-weight: bold; font-family: monospace; }
    .result-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .success { color: #00ff88; }
    .error { color: #ff3333; }
    .info { color: #00ccff; }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
      <button class="tab-btn" onclick="openTab('fullTab')">🚀 Todo en Uno</button>
      <button class="tab-btn" onclick="openTab('bulkTab')">📦 Carga Industrial</button>
      <button class="tab-btn" onclick="openTab('editTab')">✏️ Gestionar</button>
      <button class="tab-btn" onclick="openTab('singleTab')">📄 Capítulo</button>
      <button class="tab-btn" onclick="openTab('settingsTab')">⚙️ Géneros</button>
    </div>

    <div id="mangaTab" class="tab-content active"> </div>
    <div id="fullTab" class="tab-content"> </div>
    <div id="editTab" class="tab-content"> </div>
    <div id="settingsTab" class="tab-content"> </div>
    <div id="singleTab" class="tab-content"> </div>
    <div id="jsonTab" class="tab-content"> </div>

    <div id="bulkTab" class="tab-content">
      <h1>📦 Carga Industrial Automatizada</h1>
      <p style="color: #888; margin-bottom: 20px;">Sube un Excel con la info y una carpeta con los JSON correspondientes.</p>
      
      <div class="input-group">
        <label>1. Seleccionar archivo Excel (.xlsx o .csv)</label>
        <input type="file" id="bulkExcelInput" accept=".xlsx, .xls, .csv">
      </div>

      <div class="input-group">
        <label>2. Seleccionar carpeta que contiene los JSON</label>
        <div class="file-input-wrapper" style="border-color: #ff0055;">
            <input type="file" id="bulkFolderInput" webkitdirectory directory multiple>
            <p id="folderStatus" style="font-size: 0.8rem; color: #888; margin-top: 10px;">Haz clic para seleccionar la carpeta</p>
        </div>
      </div>

      <button class="primary-btn" id="startBulkBtn">🔥 Iniciar Carga Masiva</button>
      
      <div id="bulkStatus" class="result-msg" style="text-align: left; background: #000; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; display: none;"></div>
    </div>
  </div>

  <script type="module">
    // --- IMPORTACIONES ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, Timestamp, getDocs, doc, getDoc, updateDoc, onSnapshot, deleteDoc
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    // --- CONFIG FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ... (Mantener todas tus funciones de Géneros, Utilidades y Tabs que ya tenías) ...

    // --- LÓGICA CARGA INDUSTRIAL ---
    const bulkStatus = document.getElementById('bulkStatus');
    const folderInput = document.getElementById('bulkFolderInput');
    let jsonFilesMap = {}; // Mapa para guardar los archivos JSON de la carpeta

    // Detectar cuando se selecciona la carpeta
    folderInput.addEventListener('change', (e) => {
        const files = e.target.files;
        jsonFilesMap = {};
        for(let file of files) {
            if(file.name.endsWith('.json')) {
                jsonFilesMap[file.name] = file;
            }
        }
        document.getElementById('folderStatus').innerHTML = `✅ ${Object.keys(jsonFilesMap).length} archivos JSON detectados.`;
    });

    function logBulk(msg, type = 'info') {
        bulkStatus.style.display = "block";
        const color = type === 'error' ? '#ff3333' : (type === 'success' ? '#00ff88' : '#00ccff');
        bulkStatus.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
        bulkStatus.scrollTop = bulkStatus.scrollHeight;
    }

    document.getElementById('startBulkBtn').addEventListener('click', async () => {
        const excelFile = document.getElementById('bulkExcelInput').files[0];
        if(!excelFile || Object.keys(jsonFilesMap).length === 0) {
            alert("Selecciona el Excel y la carpeta de JSON.");
            return;
        }

        logBulk("Iniciando lectura de Excel...");
        const reader = new FileReader();
        
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

            logBulk(`Excel leído. Se procesarán ${rows.length} mangas.`);

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                // Mapeo de columnas: A: Nombre, B: Portada, C: Sinopsis, D: Géneros, E: JSON
                const nombre = row["Nombre"] || row["nombre"] || Object.values(row)[0];
                const portadaRaw = row["Portada"] || row["portada"] || Object.values(row)[1];
                const sinopsis = row["Sinopsis"] || row["sinopsis"] || Object.values(row)[2] || "";
                const generosRaw = row["Generos"] || row["generos"] || Object.values(row)[3] || "";
                const jsonName = row["JSON"] || row["json"] || Object.values(row)[4];

                logBulk(`[${i+1}/${rows.length}] Procesando: ${nombre}...`);

                try {
                    // 1. Formatear Géneros
                    const generos = generosRaw.split(',').map(g => g.trim()).filter(g => g !== "");

                    // 2. Formatear Portada
                    // Usamos tu función formatDriveThumbnail que ya existe en el código
                    const finalCover = formatDriveThumbnail(portadaRaw, "w1000");

                    // 3. Crear Manga en Firebase
                    const mangaRef = await addDoc(collection(db, "mangas"), {
                        title: nombre,
                        description: sinopsis,
                        cover: finalCover,
                        genres: generos,
                        createdAt: Timestamp.now()
                    });
                    const mangaId = mangaRef.id;

                    // 4. Buscar y procesar el JSON correspondiente
                    if(jsonName && jsonFilesMap[jsonName]) {
                        logBulk(`   - Leyendo JSON: ${jsonName}...`);
                        const chaptersData = await readJsonFile(jsonFilesMap[jsonName]);
                        
                        let capCount = 0;
                        for(const cap of chaptersData) {
                            const imgs = cap.links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u !== null);
                            await addDoc(collection(db, "tomos"), {
                                mangaId: mangaId,
                                number: String(cap.capitulo),
                                cover: finalCover,
                                images: imgs,
                                createdAt: Timestamp.now()
                            });
                            capCount++;
                        }
                        logBulk(`   ✅ Éxito: ${capCount} capítulos subidos.`, 'success');
                    } else {
                        logBulk(`   ⚠️ No se encontró el JSON "${jsonName}" en la carpeta.`, 'error');
                    }

                } catch (err) {
                    logBulk(`   ❌ Error procesando ${nombre}: ${err.message}`, 'error');
                }
            }
            logBulk("🔥 PROCESO INDUSTRIAL FINALIZADO.", 'success');
        };
        reader.readAsArrayBuffer(excelFile);
    });

    // Función auxiliar para leer el archivo JSON desde la carpeta
    function readJsonFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(JSON.parse(e.target.result));
            reader.onerror = reject;
            reader.readAsText(file);
        });
    }

    // --- REUTILIZAR UTILIDADES ---
    function formatDriveThumbnail(url, size = "w1600") {
      if(!url) return null;
      const match = url.match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      const id = match ? (match[1] || match[2]) : url;
      return id.startsWith('http') ? id : `https://drive.google.com/thumbnail?id=${id}&sz=${size}`;
    }

    // --- EL RESTO DE TUS FUNCIONES (openTab, cargarGeneros, etc.) ---
  </script>
</body>
</html>
