<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }

    /* --- LOGIN OVERLAY --- */
    #login-overlay {
        position: fixed; inset: 0; background: #070707; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
    }
    .login-box {
        background: #111; padding: 40px; border-radius: 20px; border: 1px solid #ff0055;
        width: 100%; max-width: 400px; text-align: center;
        box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
    }
    .login-box h2 { color: #ff0055; margin-bottom: 25px; }

    /* --- PANEL DE ADMIN --- */
    #admin-ui { display: none; width: 100%; }
    
    .sidebar { width: 260px; background: #111; border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
    .sidebar h2 { color: #ff0055; font-size: 1.4rem; margin-bottom: 30px; text-align: center; }
    
    .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 900px; }
    
    .tabs-header { display: flex; flex-direction: column; gap: 12px; }
    .tab-btn { background: #1a1a1a; color: #aaa; border: none; padding: 14px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: left; }
    .tab-btn:hover { background: #252525; color: white; transform: translateX(5px); }
    .tab-btn.active { background: #ff0055; color: white; }

    .tab-content { display: none; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #1f1f1f; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { border-color: #ff0055; outline: none; background: #222; }
    
    .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }

    .genres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .file-input-wrapper { background: #1a1a1a; padding: 25px; border: 2px dashed #333; border-radius: 12px; text-align: center; cursor: pointer; }
    
    .id-display { background: #000; border: 1px dashed #00ff88; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; }
    #bulkStatus { background:#000; padding:15px; border-radius:10px; font-family:monospace; font-size:0.8rem; margin-top:20px; display:none; max-height:250px; overflow-y:auto; border: 1px solid #333; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
        <h2>Acceso Restringido</h2>
        <div class="input-group">
            <input type="email" id="adminEmail" placeholder="Correo del Administrador">
        </div>
        <div class="input-group">
            <input type="password" id="adminPassword" placeholder="Contraseña">
        </div>
        <button class="primary-btn" id="loginBtn">Entrar al Panel</button>
        <p id="loginError" style="color: #ff3333; margin-top: 15px; font-size: 0.9rem;"></p>
    </div>
  </div>

  <div id="admin-ui">
    <aside class="sidebar">
      <h2>Manga 4 All</h2>
      <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
        <button class="tab-btn" onclick="openTab('fullTab')">🚀 Todo en Uno</button>
        <button class="tab-btn" onclick="openTab('bulkTab')">📦 Carga Industrial</button>
        <button class="tab-btn" onclick="openTab('editTab')">✏️ Gestionar</button>
        <button class="tab-btn" onclick="openTab('singleTab')">📄 Capítulo</button>
        <button class="tab-btn" onclick="openTab('jsonTab')">📂 JSON Solo</button>
        <button class="tab-btn" onclick="openTab('settingsTab')">⚙️ Géneros</button>
        <button class="tab-btn" onclick="openTab('nukeTab')" style="color:#ff3333; margin-top: 20px; border: 1px solid #300;">🧨 Limpieza</button>
        <button id="logoutBtn" style="margin-top: 15px; background: none; border: none; color: #555; cursor: pointer; font-size: 0.8rem; text-decoration: underline;">Cerrar Sesión</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="admin-container">

        <div id="mangaTab" class="tab-content active">
            <h1>Registrar Nueva Serie</h1>
            <div class="input-group"><label>Título</label><input type="text" id="mangaTitle"></div>
            <div class="input-group"><label>Descripción</label><textarea id="mangaDesc"></textarea></div>
            <div class="input-group"><label>Portada (Drive)</label><input type="text" id="mangaCover"></div>
            <div class="input-group"><label>Géneros</label><div class="genres-grid" id="genresGrid"></div></div>
            <button class="primary-btn" id="createMangaBtn">🚀 Crear Manga</button>
            <div id="mangaResult" class="id-display">ID: <span id="newMangaId"></span> <button onclick="window.copyId('newMangaId')" style="padding:4px 8px; cursor:pointer;">Copiar</button></div>
        </div>

        <div id="bulkTab" class="tab-content">
            <h1>📦 Carga Industrial</h1>
            <div class="input-group"><label>1. Excel</label><input type="file" id="bulkExcelInput" accept=".xlsx, .csv"></div>
            <div class="input-group">
                <label>2. Carpeta de JSONs</label>
                <div class="file-input-wrapper" onclick="document.getElementById('bulkFolderInput').click()">
                    📁 Seleccionar Carpeta
                    <input type="file" id="bulkFolderInput" webkitdirectory directory multiple style="display:none;">
                    <p id="folderStatus">No seleccionada</p>
                </div>
            </div>
            <button class="primary-btn" id="startBulkBtn">🔥 Iniciar Carga Masiva</button>
            <div id="bulkStatus"></div>
        </div>

        <div id="editTab" class="tab-content">
            <h1>✏️ Editar Manga</h1>
            <select id="editMangaSelector"><option value="">Cargando...</option></select>
            <div id="editForm" style="display:none; margin-top:20px;">
                <div class="input-group"><label>Título</label><input type="text" id="editTitle"></div>
                <div class="input-group"><label>Descripción</label><textarea id="editDesc"></textarea></div>
                <div class="input-group"><label>Portada</label><input type="text" id="editCover"></div>
                <div class="genres-grid" id="editGenresGrid"></div><br>
                <button class="primary-btn" id="updateMangaBtn">Guardar Cambios</button>
                <div id="editStatus" style="margin-top:10px; text-align:center;"></div>
            </div>
        </div>

        <div id="singleTab" class="tab-content">
            <h1>📄 Capítulo Individual</h1>
            <div class="input-group"><label>ID Manga</label><input type="text" id="singleMangaId"></div>
            <div class="input-group"><label>Capítulo #</label><input type="number" id="singleNum"></div>
            <div class="input-group"><label>Portada Cap</label><input type="text" id="singleCover"></div>
            <div class="input-group"><label>Links (uno por línea)</label><textarea id="singleImages" style="height:150px;"></textarea></div>
            <button class="primary-btn" id="uploadSingleBtn">Publicar</button>
        </div>

        <div id="jsonTab" class="tab-content">
            <h1>📂 JSON Solo</h1>
            <div class="input-group"><label>ID Manga</label><input type="text" id="targetMangaId"></div>
            <div class="input-group"><label>Archivo JSON</label><input type="file" id="jsonFileInput" accept=".json"></div>
            <button class="primary-btn" id="uploadJsonBtn">Subir Capítulos</button>
        </div>

        <div id="fullTab" class="tab-content">
            <h1>🚀 Todo en Uno</h1>
            <div class="input-group"><label>Título</label><input type="text" id="fullMangaTitle"></div>
            <div class="input-group"><label>Descripción</label><textarea id="fullMangaDesc"></textarea></div>
            <div class="input-group"><label>Portada Principal</label><input type="text" id="fullMangaCover"></div>
            <div class="input-group"><label>Géneros</label><div class="genres-grid" id="fullGenresGrid"></div></div>
            <div class="input-group">
                <label>JSON de Capítulos</label>
                <div class="file-input-wrapper" onclick="document.getElementById('fullJsonInput').click()">
                    📁 Seleccionar Archivo
                    <input type="file" id="fullJsonInput" accept=".json" style="display: none;">
                    <div id="fullFileNameDisplay" style="font-size: 0.8rem; color: #888; margin-top: 10px;">Ninguno</div>
                </div>
            </div>
            <button class="primary-btn" id="fullProcessBtn">🚀 Subir Todo</button>
            <div id="fullStatus" style="margin-top:15px; text-align:center;"></div>
        </div>

        <div id="settingsTab" class="tab-content">
            <h1>⚙️ Gestión de Géneros</h1>
            <div class="input-group"><input type="text" id="newGenreName" placeholder="Nombre del género"></div>
            <button class="primary-btn" id="addGenreBtn">➕ Añadir Género</button>
            <div id="genreListDisplay" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;"></div>
        </div>

        <div id="nukeTab" class="tab-content">
            <h1 style="color:#ff3333;">🧨 Limpieza de Emergencia</h1>
            <button class="primary-btn" id="nukeBtn" style="background:#900;">BORRAR ÚLTIMOS 30 REGISTROS</button>
            <div id="nukeStatus" style="margin-top:20px; text-align:center;"></div>
        </div>

      </div>
    </main>
  </div>

  <script>
    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      if(event) event.currentTarget.classList.add('active');
      if(tabName === 'editTab') window.dispatchEvent(new CustomEvent('refreshSelector'));
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, Timestamp, getDocs, doc, getDoc, updateDoc, onSnapshot, deleteDoc, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "brian.ag.cd2@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('admin-ui').style.display = "block";
            initAdminListeners();
        } else {
            document.getElementById('login-overlay').style.display = "flex";
            document.getElementById('admin-ui').style.display = "none";
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('adminEmail').value.trim();
        const pass = document.getElementById('adminPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            document.getElementById('loginError').innerText = "Acceso denegado.";
        }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    function initAdminListeners() {
        const extractDriveId = (url) => {
          if(!url) return null;
          const match = String(url).match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
          return match ? (match[1] || match[2]) : url;
        };
        const formatDriveThumbnail = (url, size = "w1600") => {
          const id = extractDriveId(url);
          return id ? (String(id).startsWith('http') ? id : `https://drive.google.com/thumbnail?id=${id}&sz=${size}`) : null;
        };
        window.copyId = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copiado"); };

        // Géneros
        onSnapshot(collection(db, "generos"), (snap) => {
            const gens = snap.docs.map(d => ({id: d.id, n: d.data().nombre})).sort((a,b) => a.n.localeCompare(b.n));
            ['genresGrid', 'fullGenresGrid', 'editGenresGrid'].forEach(id => {
                const c = document.getElementById(id);
                if(c) c.innerHTML = gens.map(g => `<label class="genre-item"><input type="checkbox" class="genre-checkbox-${id}" value="${g.n}"> ${g.n}</label>`).join('');
            });
            document.getElementById('genreListDisplay').innerHTML = gens.map(g => `<span style="background:#222; padding:5px 12px; border-radius:20px; border:1px solid #ff0055; margin:5px;">${g.n} <b onclick="window.delGen('${g.id}')" style="cursor:pointer; color:red;">×</b></span>`).join('');
        });
        document.getElementById('addGenreBtn').onclick = async () => {
            const n = document.getElementById('newGenreName').value.trim();
            if(n) await addDoc(collection(db, "generos"), { nombre: n });
            document.getElementById('newGenreName').value = "";
        };
        window.delGen = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "generos", id)); };

        // --- CARGA INDUSTRIAL ---
        let jsonFilesMap = {};
        document.getElementById('bulkFolderInput').onchange = (e) => {
            jsonFilesMap = {};
            for(let f of e.target.files) if(f.name.toLowerCase().endsWith('.json')) jsonFilesMap[f.name.toLowerCase().trim()] = f;
            document.getElementById('folderStatus').innerText = `✅ ${Object.keys(jsonFilesMap).length} JSONs listos`;
        };

        document.getElementById('startBulkBtn').onclick = async () => {
            const file = document.getElementById('bulkExcelInput').files[0];
            const status = document.getElementById('bulkStatus');
            if(!file) return alert("Sube el Excel");
            status.style.display = "block";
            status.innerHTML = "⏳ Iniciando carga industrial...<br>";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                    const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}); 
                    
                    for(let i = 1; i < data.length; i++) {
                        const row = data[i]; if (!row || row.length === 0 || !row[0]) continue;
                        const nombre = String(row[0] || "").trim();
                        const port = String(row[1] || "").trim();
                        const desc = String(row[2] || "").trim();
                        const gens = String(row[3] || "").split(',').map(x => x.trim()).filter(x => x);
                        const jName = String(row[4] || "").toLowerCase().trim();

                        status.innerHTML += `> Procesando: ${nombre}...<br>`;
                        status.scrollTop = status.scrollHeight;

                        try {
                            const cover = formatDriveThumbnail(port, "w1000");
                            const mRef = await addDoc(collection(db, "mangas"), { title: nombre, description: desc, cover, genres: gens, createdAt: Timestamp.now() });
                            
                            if(jsonFilesMap[jName]) {
                                const jData = JSON.parse(await jsonFilesMap[jName].text());
                                for(let cap of jData) {
                                    const imgs = cap.links.map(l => formatDriveThumbnail(l, "w1600")).filter(u => u);
                                    await addDoc(collection(db, "tomos"), { mangaId: mRef.id, number: String(cap.capitulo), cover, images: imgs, createdAt: Timestamp.now() });
                                }
                                status.innerHTML += `<span style="color:#0f8;">   ✅ ${nombre} subido con éxito.</span><br>`;
                            } else {
                                status.innerHTML += `<span style="color:#f80;">   ⚠️ ${nombre} subido (Sin capítulos: JSON no encontrado).</span><br>`;
                            }
                        } catch(err) { 
                            status.innerHTML += `<span style="color:red;">   ❌ Error en ${nombre}: ${err.message}</span><br>`;
                        }
                    }
                    status.innerHTML += "<br>⭐⭐ PROCESO TERMINADO ⭐⭐";
                } catch(exc) {
                    status.innerHTML += `<span style="color:red;">❌ ERROR CRÍTICO AL LEER EXCEL: ${exc.message}</span>`;
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // Otros (Editar, Individual, etc.) se mantienen igual
        window.addEventListener('refreshSelector', async () => {
            const snap = await getDocs(collection(db, "mangas"));
            const sorted = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.title.localeCompare(b.title));
            const sel = document.getElementById('editMangaSelector');
            sel.innerHTML = '<option value="">-- Seleccionar Manga --</option>' + sorted.map(m => `<option value="${m.id}">${m.title}</option>`).join('');
        });
        document.getElementById('editMangaSelector').onchange = async (e) => {
            const id = e.target.value; if(!id) return;
            const dSnap = await getDoc(doc(db, "mangas", id));
            const d = dSnap.data();
            document.getElementById('editForm').style.display = "block";
            document.getElementById('editTitle').value = d.title;
            document.getElementById('editDesc').value = d.description || "";
            document.getElementById('editCover').value = d.cover;
            document.querySelectorAll('.genre-checkbox-editGenresGrid').forEach(cb => cb.checked = d.genres?.includes(cb.value));
        };
        document.getElementById('updateMangaBtn').onclick = async () => {
            const id = document.getElementById('editMangaSelector').value;
            const finalCover = formatDriveThumbnail(document.getElementById('editCover').value, "w1000");
            await updateDoc(doc(db, "mangas", id), {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDesc').value,
                cover: finalCover,
                genres: Array.from(document.querySelectorAll('.genre-checkbox-editGenresGrid:checked')).map(cb => cb.value)
            });
            document.getElementById('editStatus').innerHTML = "✅ Guardado";
        };
        document.getElementById('uploadSingleBtn').onclick = async () => {
            const id = document.getElementById('singleMangaId').value;
            const num = document.getElementById('singleNum').value;
            const imgs = document.getElementById('singleImages').value.split('\n').map(l => formatDriveThumbnail(l.trim(), "w1600")).filter(u => u);
            await addDoc(collection(db, "tomos"), { mangaId: id, number: String(num), cover: formatDriveThumbnail(document.getElementById('singleCover').value, "w1000"), images: imgs, createdAt: Timestamp.now() });
            alert("Subido");
        };
        document.getElementById('nukeBtn').onclick = async () => {
            if(!confirm("¿Borrar últimos 30?")) return;
            const stat = document.getElementById('nukeStatus');
            stat.innerHTML = "⏳ Limpiando...";
            const q = query(collection(db, "mangas"), orderBy("createdAt", "desc"), limit(30));
            const snap = await getDocs(q);
            for(let mDoc of snap.docs) {
                const ts = await getDocs(query(collection(db, "tomos"), where("mangaId", "==", mDoc.id)));
                for(let tDoc of ts.docs) await deleteDoc(doc(db, "tomos", tDoc.id));
                await deleteDoc(doc(db, "mangas", mDoc.id));
            }
            stat.innerHTML = "✅ Limpieza completada.";
        };
    }
  </script>
</body>
</html>
