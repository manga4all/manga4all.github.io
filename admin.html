<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga4All - Consola de Admin Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #070707; color: white; padding: 20px; padding-bottom: 100px; }
    .admin-container { max-width: 900px; margin: auto; }

    h1 { margin-bottom: 20px; color: #ff0055; font-size: 1.8rem; }

    /* TABS */
    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #1f1f1f; padding-bottom: 10px; overflow-x: auto; }
    .tab-btn { 
      background: #1a1a1a; color: #888; border: none; padding: 12px 20px; 
      border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; white-space: nowrap;
    }
    .tab-btn.active { background: #ff0055; color: white; }
    .tab-content { display: none; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #1f1f1f; }
    .tab-content.active { display: block; }

    /* FORMULARIOS */
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, textarea, select { 
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
      background: #1a1a1a; color: white; font-size: 15px;
    }
    input:focus, textarea:focus { border-color: #ff0055; outline: none; background: #222; }
    textarea { height: 100px; resize: vertical; }

    /* GÉNEROS CHECKBOX GRID */
    .genres-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
      gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222;
    }
    .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .genre-item input { width: auto; cursor: pointer; accent-color: #ff0055; }

    .primary-btn { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; 
      background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .primary-btn:hover { background: #ff2b72; transform: translateY(-2px); }

    .file-input-wrapper {
      background: #1a1a1a; padding: 20px; border: 2px dashed #333; border-radius: 10px; 
      text-align: center; margin-bottom: 18px; cursor: pointer;
    }

    /* RESULTADOS */
    .id-display { 
      background: #000; border: 1px dashed #00ff88; padding: 15px; 
      border-radius: 10px; margin-top: 20px; display: none; text-align: center;
    }
    .id-display span { color: #00ff88; font-weight: bold; font-family: monospace; }
    .result-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .success { color: #00ff88; }
    .error { color: #ff3333; }
    .info { color: #00ccff; }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="openTab('mangaTab')">🆕 Crear Manga</button>
      <button class="tab-btn" onclick="openTab('fullTab')">🚀 Todo en Uno</button>
      <button class="tab-btn" onclick="openTab('singleTab')">📄 Capítulo Individual</button>
      <button class="tab-btn" onclick="openTab('jsonTab')">📂 Carga JSON (Masiva)</button>
    </div>

    <div id="mangaTab" class="tab-content active">
      <h1>Registrar Nueva Serie</h1>
      <div class="input-group">
        <label>Título del Manga</label>
        <input type="text" id="mangaTitle" placeholder="Ej: All You Need Is Kill">
      </div>
      <div class="input-group">
        <label>Descripción</label>
        <textarea id="mangaDesc" placeholder="Escribe la sinopsis aquí..."></textarea>
      </div>
      <div class="input-group">
        <label>Portada del Manga (Link de Google Drive)</label>
        <input type="text" id="mangaCover" placeholder="Pega el link de la imagen en Drive">
      </div>
      <div class="input-group">
        <label>Seleccionar Géneros</label>
        <div class="genres-grid" id="genresGrid"></div>
      </div>
      <button class="primary-btn" id="createMangaBtn">🚀 Crear Manga</button>
      <div id="mangaResult" class="id-display">
        <p>✅ Manga creado. ID único:</p>
        <span id="newMangaId">---</span><br><br>
        <button onclick="copyId('newMangaId')" style="padding:5px 10px; cursor:pointer;">Copiar ID</button>
      </div>
    </div>

    <div id="fullTab" class="tab-content">
      <h1>🚀 Crear Manga y Subir Capítulos</h1>
      <p style="color: #888; margin-bottom: 20px; font-size: 0.9rem;">Registra el manga y procesa el JSON automáticamente en un solo paso.</p>
      
      <div class="input-group">
        <label>Título del Manga</label>
        <input type="text" id="fullMangaTitle" placeholder="Título de la serie">
      </div>
      <div class="input-group">
        <label>Descripción</label>
        <textarea id="fullMangaDesc" placeholder="Sinopsis..."></textarea>
      </div>
      <div class="input-group">
        <label>Portada (Se usará también para los capítulos)</label>
        <input type="text" id="fullMangaCover" placeholder="Link de Google Drive">
      </div>
      <div class="input-group">
        <label>Seleccionar Géneros</label>
        <div class="genres-grid" id="fullGenresGrid"></div>
      </div>

      <div class="file-input-wrapper" onclick="document.getElementById('fullJsonInput').click()">
        <label style="color: #ff0055; cursor: pointer; display: block;">
          📁 Seleccionar archivo JSON de capítulos
          <input type="file" id="fullJsonInput" accept=".json" style="display: none;">
        </label>
        <div id="fullFileNameDisplay" style="margin-top: 10px; font-size: 0.8rem; color: #888;">Ningún archivo seleccionado</div>
      </div>

      <button class="primary-btn" id="fullProcessBtn">🚀 Iniciar Proceso Completo</button>
      <div id="fullStatus" class="result-msg"></div>
    </div>

    <div id="singleTab" class="tab-content">
      <h1>Publicar Capítulo Individual</h1>
      <div class="input-group">
        <label>ID del Manga</label>
        <input type="text" id="singleMangaId" placeholder="Ej: X5DmBqFlP...">
      </div>
      <div style="display: flex; gap: 15px;">
        <div class="input-group" style="flex: 1;">
          <label>Número de Capítulo</label>
          <input type="number" id="singleNum" placeholder="Ej: 1">
        </div>
        <div class="input-group" style="flex: 2;">
          <label>Portada del Capítulo (Link Drive)</label>
          <input type="text" id="singleCover" placeholder="Link de Drive">
        </div>
      </div>
      <div class="input-group">
        <label>Lista de Imágenes (Un link por línea)</label>
        <textarea id="singleImages" style="height: 150px;" placeholder="Pega todos los links de las páginas aquí..."></textarea>
      </div>
      <button class="primary-btn" id="uploadSingleBtn">Publicar Capítulo</button>
      <div id="singleStatus" class="result-msg"></div>
    </div>

    <div id="jsonTab" class="tab-content">
      <h1>Carga Masiva por JSON</h1>
      <div class="input-group">
        <label>ID del Manga</label>
        <input type="text" id="targetMangaId" placeholder="ID del manga donde se subirán">
      </div>
      <div class="input-group">
        <label>Portada Predeterminada para los tomos (Link Drive)</label>
        <input type="text" id="chapterCoverBase" placeholder="Opcional">
      </div>
      <div class="file-input-wrapper" onclick="document.getElementById('jsonFileInput').click()">
        <label style="color: #ff0055; cursor: pointer; display: block;">
          📁 Seleccionar archivo JSON
          <input type="file" id="jsonFileInput" accept=".json" style="display: none;">
        </label>
        <div id="fileNameDisplay" style="margin-top: 10px; font-size: 0.8rem; color: #888;">Ningún archivo seleccionado</div>
      </div>
      <button class="primary-btn" id="uploadJsonBtn">🚀 Iniciar Carga Masiva</button>
      <div id="jsonStatus" class="result-msg"></div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, Timestamp 
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listaGeneros = [
      "Acción", "Aventura", "Ciencia Ficción", "Comedia", "Drama", "Ecchi", "Isekai", "Mecha",
      "Recuentos de la vida", "Romance", "Seinen", "Shonen", 
      "Shojo", "Josei", "Terror", "Misterio", "Fantasía", "Sobrenatural"
    ];

    // Cargar Checkboxes en ambas pestañas
    function cargarGeneros(containerId) {
        const container = document.getElementById(containerId);
        listaGeneros.forEach(gen => {
            container.innerHTML += `
                <label class="genre-item">
                <input type="checkbox" class="genre-checkbox-${containerId}" value="${gen}"> ${gen}
                </label>
            `;
        });
    }
    cargarGeneros('genresGrid');
    cargarGeneros('fullGenresGrid');

    // --- UTILIDADES ---
    function extractDriveId(url) {
      if(!url) return null;
      const match = url.match(/\/d\/(.*?)\/|id=(.*?)($|&)/);
      return match ? (match[1] || match[2]) : null;
    }

    function formatDriveThumbnail(url, size = "w1600") {
      const id = extractDriveId(url);
      return id ? `https://drive.google.com/thumbnail?id=${id}&sz=${size}` : null;
    }

    // --- NAVEGACIÓN TABS ---
    window.openTab = (tabName) => {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    };

    window.copyId = (elementId) => {
      const id = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(id);
      alert("ID Copiado");
    };

    // Displays de nombre de archivo
    document.getElementById('jsonFileInput').addEventListener('change', (e) => {
      document.getElementById('fileNameDisplay').innerText = e.target.files[0] ? e.target.files[0].name : "Ninguno";
    });
    document.getElementById('fullJsonInput').addEventListener('change', (e) => {
      document.getElementById('fullFileNameDisplay').innerText = e.target.files[0] ? e.target.files[0].name : "Ninguno";
    });

    // --- ACCIÓN: CREAR MANGA SOLO ---
    document.getElementById('createMangaBtn').addEventListener('click', async () => {
      const title = document.getElementById('mangaTitle').value.trim();
      const description = document.getElementById('mangaDesc').value.trim();
      const coverUrl = document.getElementById('mangaCover').value.trim();
      const selectedGenres = Array.from(document.querySelectorAll('.genre-checkbox-genresGrid:checked')).map(cb => cb.value);

      if (!title || !coverUrl) { alert("Título y Portada obligatorios"); return; }

      try {
        const finalCover = formatDriveThumbnail(coverUrl, "w1000");
        const docRef = await addDoc(collection(db, "mangas"), {
          title, description, cover: finalCover, genres: selectedGenres, createdAt: Timestamp.now()
        });
        document.getElementById('mangaResult').style.display = "block";
        document.getElementById('newMangaId').innerText = docRef.id;
      } catch (e) { console.error(e); }
    });

    // --- ACCIÓN: TODO EN UNO (Manga + JSON) ---
    document.getElementById('fullProcessBtn').addEventListener('click', async () => {
        const title = document.getElementById('fullMangaTitle').value.trim();
        const description = document.getElementById('fullMangaDesc').value.trim();
        const coverUrl = document.getElementById('fullMangaCover').value.trim();
        const fileInput = document.getElementById('fullJsonInput');
        const status = document.getElementById('fullStatus');
        const selectedGenres = Array.from(document.querySelectorAll('.genre-checkbox-fullGenresGrid:checked')).map(cb => cb.value);

        if (!title || !coverUrl || !fileInput.files[0]) {
            status.innerHTML = "❌ Título, Portada y JSON son obligatorios";
            status.className = "result-msg error";
            return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const chaptersData = JSON.parse(e.target.result);
                status.innerHTML = "⏳ Paso 1: Creando Manga...";
                status.className = "result-msg info";

                // 1. Crear el Manga
                const finalCover = formatDriveThumbnail(coverUrl, "w1000");
                const docRef = await addDoc(collection(db, "mangas"), {
                    title, description, cover: finalCover, genres: selectedGenres, createdAt: Timestamp.now()
                });
                const newId = docRef.id;

                status.innerHTML = `✅ Manga creado (ID: ${newId}). <br> ⏳ Paso 2: Subiendo ${chaptersData.length} capítulos...`;

                // 2. Subir Capítulos
                let count = 0;
                for (const item of chaptersData) {
                    const transformedImages = item.links.map(link => formatDriveThumbnail(link, "w1600")).filter(u => u !== null);

                    await addDoc(collection(db, "tomos"), {
                        mangaId: newId,
                        number: String(item.capitulo),
                        cover: finalCover, // Usamos la misma portada del manga
                        images: transformedImages,
                        createdAt: Timestamp.now()
                    });
                    count++;
                    status.innerHTML = `⏳ Subiendo capítulos: ${count} / ${chaptersData.length}`;
                }

                status.innerHTML = `✅ ¡Todo listo! Manga creado e ID asociado a ${count} capítulos.`;
                status.className = "result-msg success";

            } catch (err) {
                status.innerHTML = "❌ Error en el proceso o JSON inválido";
                status.className = "result-msg error";
                console.error(err);
            }
        };
        reader.readAsText(fileInput.files[0]);
    });

    // --- ACCIÓN: SUBIR CAPÍTULO INDIVIDUAL ---
    document.getElementById('uploadSingleBtn').addEventListener('click', async () => {
      const mangaId = document.getElementById('singleMangaId').value.trim();
      const number = document.getElementById('singleNum').value.trim();
      const coverUrl = document.getElementById('singleCover').value.trim();
      const rawImages = document.getElementById('singleImages').value.trim();
      const status = document.getElementById('singleStatus');

      if (!mangaId || !number || !rawImages) { status.innerHTML = "❌ Faltan datos"; return; }

      try {
        status.innerHTML = "⏳ Subiendo...";
        const finalCover = formatDriveThumbnail(coverUrl, "w1000") || "";
        const imagesArray = rawImages.split('\n').map(line => formatDriveThumbnail(line.trim(), "w1600")).filter(url => url !== null);

        await addDoc(collection(db, "tomos"), {
          mangaId, number: String(number), cover: finalCover, images: imagesArray, createdAt: Timestamp.now()
        });

        status.innerHTML = `✅ Capítulo ${number} subido con éxito`;
        status.className = "result-msg success";
        document.getElementById('singleNum').value = Number(number) + 1;
      } catch (e) { status.innerHTML = "❌ Error"; }
    });

    // --- ACCIÓN: SUBIR JSON SOLO ---
    document.getElementById('uploadJsonBtn').addEventListener('click', async () => {
      const mangaId = document.getElementById('targetMangaId').value.trim();
      const coverUrlBase = document.getElementById('chapterCoverBase').value.trim();
      const fileInput = document.getElementById('jsonFileInput');
      const status = document.getElementById('jsonStatus');

      if (!mangaId || !fileInput.files[0]) { status.innerHTML = "❌ Manga ID y archivo JSON obligatorios"; return; }

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const chaptersData = JSON.parse(e.target.result);
          const finalChapterCover = formatDriveThumbnail(coverUrlBase, "w1000") || "";
          status.innerHTML = "⏳ Iniciando carga...";
          status.className = "result-msg info";

          let count = 0;
          for (const item of chaptersData) {
            const transformedImages = item.links.map(link => formatDriveThumbnail(link, "w1600")).filter(u => u !== null);
            await addDoc(collection(db, "tomos"), {
              mangaId, number: String(item.capitulo), cover: finalChapterCover, images: transformedImages, createdAt: Timestamp.now()
            });
            count++;
            status.innerHTML = `⏳ Cargando: ${count} / ${chaptersData.length}`;
          }
          status.innerHTML = `✅ Se subieron ${count} capítulos correctamente.`;
          status.className = "result-msg success";
        } catch (err) { status.innerHTML = "❌ JSON inválido"; }
      };
      reader.readAsText(fileInput.files[0]);
    });
  </script>
</body>
</html>
