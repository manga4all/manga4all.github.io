<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga 4 All | Inicio</title>
  <style>
    /* RESET Y BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #070707; color: white; line-height: 1.4; padding-top: 70px; }

    /* NAVBAR */
    nav { background: #111; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0055; position: fixed; top: 0; left: 0; width: 100%; height: 70px; z-index: 3000; }
    .logo { color: #ff0055; font-weight: bold; font-size: 1.7rem; text-decoration: none; }
    .nav-links { display: flex; gap: 35px; }
    .nav-links a { color: #ccc; text-decoration: none; transition: 0.3s; }
    .nav-links a:hover { color: #ff0055; }
    .search-container input { background: #1a1a1a; border: 1px solid #333; padding: 10px 18px; border-radius: 25px; color: white; outline: none; width: 280px; }

    /* HEADER */
    header { position: relative; height: 380px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
    .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
    .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #070707); z-index: 0; }
    .header-content { position: relative; z-index: 10; text-align: center; }
    .header-content h1 { font-size: 4rem; margin-bottom: 10px; }

    /* --- BARRA DE ACTUALIZACIONES (CARRUSEL) --- */
    .container { max-width: 1250px; margin: 0 auto; padding: 20px; }
    .section-title { font-size: 1.7rem; margin: 20px 0; border-left: 6px solid #ff0055; padding-left: 18px; }
    
    .updates-wrapper { width: 100%; overflow: hidden; padding: 10px 0; min-height: 350px; }
    .updates-track { display: flex; gap: 20px; width: max-content; animation: scroll-loop 40s linear infinite; }
    .updates-wrapper:hover .updates-track { animation-play-state: paused; }
    @keyframes scroll-loop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .update-item { 
        flex: 0 0 180px; 
        background: #111; 
        border-radius: 12px; 
        border: 1px solid #222; 
        padding: 10px; 
        text-decoration: none; 
        color: white; 
        display: flex; 
        flex-direction: column; 
        gap: 10px;
    }
    .update-cover-wrapper { width: 100%; height: 250px; overflow: hidden; border-radius: 8px; }
    .update-cover-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .update-info { text-align: center; }
    .update-info h3 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .update-info span { color: #ff0055; font-weight: bold; font-size: 0.8rem; }

    /* BOTÓN ROSADO */
    .btn { background: #ff0055; color: white; padding: 8px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 0.8rem; border: none; display: block; text-decoration: none; }

    /* GRID DESTACADOS */
    .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 35px; }
    .manga-card { position: relative; background: #111; border-radius: 12px; border: 1px solid #222; text-decoration: none; color: white; transition: 0.4s; overflow: visible; display: flex; flex-direction: column; }
    .manga-card:hover { transform: translateY(-10px); border-color: #ff0055; }
    .cover-container { width: 100%; aspect-ratio: 2 / 3; overflow: hidden; border-radius: 12px 12px 0 0; }
    .cover-container img { width: 100%; height: 100%; object-fit: cover; }
    .manga-info { padding: 15px; text-align: center; }
    .manga-info h3 { font-size: 1.1rem; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* TOOLTIP (DIRECTORIO) */
    .tooltip { position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%) translateY(10px); width: 260px; background: #1a1a1a; border: 1px solid #ff0055; color: #eee; padding: 15px; border-radius: 10px; font-size: 0.85rem; z-index: 5000; opacity: 0; visibility: hidden; transition: 0.3s ease; pointer-events: none; }
    .manga-card:hover .tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .tooltip p { display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }

    footer { text-align: center; padding: 50px; color: #444; border-top: 1px solid #111; margin-top: 40px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Buscar manga...">
    </div>
  </nav>

  <header>
    <img src="assets/banners/1299859.jpg" alt="Banner" class="banner-img">
    <div class="overlay"></div>
    <div class="header-content">
      <h1>Manga 4 All</h1>
      <p>Tu portal definitivo para sumergirte en el mundo del manga en español.</p>
    </div>
  </header>

  <div class="container">
      <h2 class="section-title">Últimas Actualizaciones</h2>
      <div class="updates-wrapper">
          <div id="updatesTrack" class="updates-track"></div>
      </div>

      <h2 class="section-title">Destacados</h2>
      <div id="mangaGrid" class="manga-grid"></div>
  </div>

  <footer>Manga 4 All © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    async function loadData() {
      const updatesTrack = document.getElementById("updatesTrack");
      const mangaGrid = document.getElementById("mangaGrid");

      try {
        // Query ultra-simple para evitar errores de Firebase
        const snap = await getDocs(query(collection(db, "mangas"), limit(20)));
        
        updatesTrack.innerHTML = "";
        mangaGrid.innerHTML = "";

        snap.forEach(docItem => {
          const m = docItem.data();
          const id = docItem.id;

          // 1. Barra de Actualizaciones (Carrusel)
          updatesTrack.innerHTML += `
            <div class="update-item">
              <div class="update-cover-wrapper">
                <img src="${m.cover}" alt="${m.title}">
              </div>
              <div class="update-info">
                <h3>${m.title}</h3>
                <span>Cap. ${m.lastChapter || 'Nuevo'}</span>
              </div>
              <a href="manga.html?id=${id}" class="btn">Leer</a>
            </div>`;

          // 2. Grid de Destacados
          mangaGrid.innerHTML += `
            <a href="manga.html?id=${id}" class="manga-card">
              <div class="tooltip"><p>${m.description || 'Sin descripción'}</p></div>
              <div class="cover-container">
                <img src="${m.cover}" alt="${m.title}">
              </div>
              <div class="manga-info">
                <h3>${m.title}</h3>
                <div class="btn">Leer ahora</div>
              </div>
            </a>`;
        });

        // Duplicar items para el efecto de scroll infinito si hay suficientes
        if(snap.size > 4) {
            updatesTrack.innerHTML += updatesTrack.innerHTML;
        }

      } catch (e) {
        console.error("Error cargando datos:", e);
      }
    }

    loadData();
  </script>
</body>
</html>
