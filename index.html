<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga 4 All | Inicio</title>
  <link rel="stylesheet" href="css/style.css?v=34">
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
    <div class="search-container"><input type="text" placeholder="Buscar manga..."></div>
  </nav>

  <header>
    <img src="assets/banners/1299859.jpg" alt="Banner" class="banner-img">
    <div class="overlay"></div>
    <div class="header-content"><h1>Manga 4 All</h1></div>
  </header>

  <div id="continue-container" class="container" style="display: none;">
      <h2 class="section-title">Continuar Leyendo</h2>
      <div id="continue-card-place"></div>
  </div>

  <div class="container">
      <h2 class="section-title">Últimas Actualizaciones</h2>
      <div class="updates-wrapper">
          <div id="updatesTrack" class="updates-track"></div>
      </div>

      <h2 class="section-title">Destacados</h2>
      <div id="mangaGrid" class="manga-grid"></div>
  </div>

  <footer>Manga 4 All © 2026</footer>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    async function load() {
      const track = document.getElementById("updatesTrack");
      const grid = document.getElementById("mangaGrid");

      try {
        const snap = await getDocs(query(collection(db, "mangas"), limit(20)));
        track.innerHTML = ""; grid.innerHTML = "";

        snap.forEach(docItem => {
          const m = docItem.data();
          const id = docItem.id;

          // Item Carrusel
          track.innerHTML += `
            <div class="update-item">
              <div class="update-cover-wrapper"><img src="${m.cover}"></div>
              <div class="update-info">
                <h3>${m.title}</h3>
                <span>Cap. Nuevo</span>
                <a href="manga.html?id=${id}" class="btn-update">Leer</a>
              </div>
            </div>`;

          // Item Grid
          grid.innerHTML += `
            <a href="manga.html?id=${id}" class="manga-card">
              <div class="cover-container"><img src="${m.cover}"></div>
              <div class="manga-info">
                <h3>${m.title}</h3>
                <div class="btn-card">Leer ahora</div>
              </div>
            </a>`;
        });
        
        // Duplicar para el bucle infinito sin huecos
        if(snap.size > 0) track.innerHTML += track.innerHTML;

      } catch (e) { console.error(e); }
    }
    load();

    // Historial
    const storage = localStorage.getItem("manga_last_seen");
    if (storage) {
      const m = JSON.parse(storage);
      document.getElementById("continue-container").style.display = "block";
      document.getElementById("continue-card-place").innerHTML = `
        <a href="reader.html?manga=${m.id}&number=${m.chapter}">
          <img src="${m.image}">
          <div>
            <span style="color: #ff0055; font-weight: bold; font-size: 0.7rem;">REANUDAR LECTURA</span>
            <h3 style="font-size: 1.3rem;">${m.title}</h3>
            <p style="color: #bbb;">Capítulo ${m.chapter}</p>
          </div>
        </a>`;
    }
  </script>
</body>
</html>
