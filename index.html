<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga 4 All | Inicio</title>
  <link rel="stylesheet" href="css/style.css?v=28">
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Buscar manga...">
    </div>
  </nav>

  <header>
    <img src="https://images.alphacoders.com/605/605592.jpg" alt="Banner" class="banner-img">
    <div class="overlay"></div>
    <div class="header-content">
      <h1>Manga 4 All</h1>
      <p>Tu portal definitivo para sumergirte en el mundo del manga en español.</p>
    </div>
  </header>

  <div id="continue-container" class="container" style="display: none;">
      <h2 class="section-title">Continuar Leyendo</h2>
      <div id="continue-card-place"></div>
  </div>

  <div class="container">
      <h2 class="section-title">Últimas Actualizaciones</h2>
      <div class="updates-wrapper">
          <div id="updatesTrack" class="updates-track"></div>
      </div>
  </div>

  <main class="container">
    <h2 class="section-title">Destacados</h2>
    <div id="mangaGrid" class="manga-grid"></div>
  </main>

  <footer>Manga 4 All © 2026</footer>

  <script src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, getDocs, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    async function load() {
      const updatesTrack = document.getElementById("updatesTrack");
      const mangaGrid = document.getElementById("mangaGrid");

      try {
        // 1. CARGAR ÚLTIMAS ACTUALIZACIONES
        const qUpdates = query(collection(db, "mangas"), orderBy("lastChapterDate", "desc"), limit(10));
        const snapUpdates = await getDocs(qUpdates);
        updatesTrack.innerHTML = "";
        
        snapUpdates.forEach(docItem => {
          const manga = docItem.data();
          
          updatesTrack.innerHTML += `
            <div class="update-item">
              <div class="update-cover-wrapper">
                <img src="${manga.cover}" alt="${manga.title}">
              </div>
              <div class="update-info">
                <h3>${manga.title}</h3>
                <span>Cap. ${manga.lastChapter || 'Nuevo'}</span>
                <a href="manga.html?id=${docItem.id}" class="btn">Leer</a>
              </div>
            </div>`;
        });

        // 2. CARGAR DESTACADOS
        const qManga = query(collection(db, "mangas"), limit(20));
        const querySnapshot = await getDocs(qManga);
        mangaGrid.innerHTML = "";

        querySnapshot.forEach((docItem) => {
          const manga = docItem.data();
          mangaGrid.innerHTML += `
            <a href="manga.html?id=${docItem.id}" class="manga-card">
              <div class="cover-container">
                <img src="${manga.cover}" alt="${manga.title}">
              </div>
              <div class="manga-info">
                <h3>${manga.title}</h3>
                <div class="btn">Leer ahora</div>
              </div>
            </a>`;
        });
      } catch (e) { console.error(e); }
    }
    load();

    // Historial
    const storage = localStorage.getItem("manga_last_seen");
    if (storage) {
      const m = JSON.parse(storage);
      document.getElementById("continue-container").style.display = "block";
      document.getElementById("continue-card-place").innerHTML = `
        <a href="reader.html?manga=${m.id}&number=${m.chapter}" style="display: flex; align-items: center; gap: 20px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #ff0055; text-decoration: none; color: white;">
          <img src="${m.image}" style="width: 70px; height: 100px; object-fit: cover; border-radius: 8px;">
          <div><span style="color: #ff0055; font-weight: bold; font-size: 0.7rem;">REANUDAR</span><h3>${m.title}</h3><p>Capítulo ${m.chapter}</p></div>
        </a>`;
    }
  </script>
</body>
</html>
