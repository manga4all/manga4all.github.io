<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga 4 All | Inicio</title>
  <link rel="stylesheet" href="css/style.css?v=24">
  <style>
    /* Ajustes de espacio específicos para esta página */
    .container { padding-top: 5px; padding-bottom: 5px; }
    .section-title { margin-top: 15px !important; margin-bottom: 15px !important; }
    header { margin-bottom: 10px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Buscar manga...">
    </div>
  </nav>

  <header>
    <img src="assets/banners/1299859.jpg" alt="Banner" class="banner-img">
    <div class="overlay"></div>
    <div class="header-content">
      <h1>Manga 4 All</h1>
      <p>Tu portal definitivo para sumergirte en el mundo del manga en español.</p>
    </div>
  </header>

  <div id="continue-container" class="container" style="display: none; margin-top: 0; margin-bottom: 10px;">
      <h2 class="section-title">Continuar Leyendo</h2>
      <div id="continue-card-place"></div>
  </div>

  <div class="container" style="margin-top: 0; margin-bottom: 10px;">
      <h2 class="section-title">Últimas Actualizaciones</h2>
      <div class="updates-wrapper" style="padding-top: 0;">
          <div id="updates-track" class="updates-track"></div>
      </div>
  </div>

  <main class="container" style="margin-top: 0;">
    <h2 class="section-title">Destacados</h2>
    <div id="manga-grid" class="manga-grid"></div>
  </main>

  <footer>Manga 4 All © 2026</footer>

  <script src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    async function loadHomePage() {
        const updatesTrack = document.getElementById("updates-track");
        const mangaGrid = document.getElementById("manga-grid");

        try {
            const querySnapshot = await getDocs(collection(db, "mangas"));
            
            updatesTrack.innerHTML = "";
            mangaGrid.innerHTML = "";

            querySnapshot.forEach((docItem) => {
                const manga = docItem.data();
                const id = docItem.id;

                // 1. RENDERIZAR EN ÚLTIMAS ACTUALIZACIONES (CARRUSEL)
                updatesTrack.innerHTML += `
                    <a href="manga.html?id=${id}" class="update-item">
                        <div class="update-cover-wrapper">
                            <img src="${manga.cover}" alt="${manga.title}">
                        </div>
                        <div class="update-info">
                            <h3>${manga.title}</h3>
                            <span>Cap. ${manga.lastChapter || 'Nuevo'}</span>
                        </div>
                    </a>
                `;

                // 2. RENDERIZAR EN DESTACADOS (GRID DE TARJETAS)
                mangaGrid.innerHTML += `
                    <a href="manga.html?id=${id}" class="manga-card">
                        <div class="cover-container">
                            <img src="${manga.cover}" alt="${manga.title}">
                        </div>
                        <div class="manga-info">
                            <h3>${manga.title}</h3>
                            <div class="btn">Leer ahora</div>
                        </div>
                    </a>
                `;
            });
        } catch (error) {
            console.error("Error cargando el inicio:", error);
        }
    }

    // Ejecutar carga
    loadHomePage();
  </script>

  <script>
    function renderHistorial() {
        const contenedor = document.getElementById("continue-container");
        const lugarCard = document.getElementById("continue-card-place");
        const storage = localStorage.getItem("manga_last_seen");

        if (storage && contenedor && lugarCard) {
            const m = JSON.parse(storage);
            contenedor.style.display = "block";
            
            lugarCard.innerHTML = `
                <a href="reader.html?manga=${m.id}&number=${m.chapter}" style="display: flex; align-items: center; gap: 25px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #ff0055; text-decoration: none; color: white; transition: 0.3s;">
                    <img src="${m.image}" style="width: 85px; height: 120px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                    <div style="flex: 1; text-align: left;">
                        <span style="color: #ff0055; font-weight: bold; font-size: 0.8rem; letter-spacing: 0.5px; display: block;">REANUDAR LECTURA</span>
                        <h3 style="margin: 3px 0; font-size: 1.4rem; line-height: 1.2;">${m.title}</h3>
                        <p style="color: #bbb; font-size: 1rem;">Capítulo ${m.chapter}</p>
                    </div>
                </a>
            `;
        }
    }
    window.addEventListener('load', renderHistorial);
  </script>
</body>
</html>
