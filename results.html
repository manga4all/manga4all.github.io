<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados de búsqueda | M4A</title>
  <link rel="stylesheet" href="css/style.css?v=15">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Asegurar que el contenedor principal respete el espacio del navbar fijo */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Maquetación limpia para la cuadrícula de resultados */
    .manga-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 30px;
      margin-top: 25px;
    }

    /* Fondo base de la página */
    body {
      background-color: #070707;
      color: white;
    }
  </style>
</head>
<body>

  <div id="main-navbar"></div>

  <script type="module" src="js/navbar.js"></script>

  <main class="container">
    <h1 class="section-title" id="search-title">Resultados para: ...</h1>
    <div id="results-grid" class="manga-grid">
      </div>
  </main>

  <footer>Manga 4 All © 2026</footer>

  <script type="module" src="js/results.js"></script>
</body>
</html>
