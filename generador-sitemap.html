<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Sitemap - Manga4All</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      background-color: #121212;
      color: #fff;
    }
    .card {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #333;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
    }
    button:hover { background-color: #2563eb; }
    button:disabled { background-color: #555; cursor: not-allowed; }
    #log {
      margin-top: 20px;
      padding: 12px;
      background: #000;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      color: #10b981;
      display: none;
      max-height: 250px;
      overflow-y: auto;
    }
    iframe {
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🗺️ Generar Sitemap</h2>
    <p>Renderiza <code>directory.html</code> en segundo plano y extrae todos los enlaces generados.</p>
    
    <button id="btn" onclick="iniciarGeneracion()">Generar y Descargar</button>
    <div id="log"></div>
  </div>

  <!-- Iframe oculto para cargar la página real con su JS ejecutado -->
  <iframe id="directoryFrame"></iframe>

  <script>
    const DOMAIN = "https://manga4all.com";
    const paginasEstaticas = ["", "directory.html"];

    function iniciarGeneracion() {
      const btn = document.getElementById("btn");
      const log = document.getElementById("log");
      const iframe = document.getElementById("directoryFrame");

      btn.disabled = true;
      btn.innerText = "Cargando directorio...";
      log.style.display = "block";
      log.innerHTML = "⏳ Cargando directory.html y ejecutando scripts...<br>";

      // Cargar directory.html en el iframe
      iframe.src = "/directory.html";

      iframe.onload = () => {
        log.innerHTML += "⏳ Esperando renderizado de enlaces (3 seg)...<br>";
        
        // Damos 3 segundos para que Firebase / JS renderice todos los mangas en el DOM
        setTimeout(() => {
          extraerYGenerar(iframe.contentDocument);
        }, 3000);
      };
    }

    function extraerYGenerar(doc) {
      const btn = document.getElementById("btn");
      const log = document.getElementById("log");

      try {
        const enlaces = doc.querySelectorAll("a[href]");
        const urlsEncontradas = new Set();

        // Agregar estáticas
        paginasEstaticas.forEach(p => urlsEncontradas.add(`${DOMAIN}/${p}`));

        let contadorMangas = 0;

        enlaces.forEach(a => {
          let href = a.getAttribute("href").trim();

          // Filtrar enlaces inválidos
          if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;

          // Convertir rutas relativas a absolutas limpias
          if (href.startsWith("./")) href = href.substring(2);
          if (href.startsWith("/")) href = href.substring(1);

          const fullUrl = href.startsWith("http") ? href : `${DOMAIN}/${href}`;
          
          // Solo agregar URLs de nuestro propio dominio
          if (fullUrl.startsWith(DOMAIN)) {
            urlsEncontradas.add(fullUrl);
            contadorMangas++;
          }
        });

        log.innerHTML += `✅ Enlaces extraídos del DOM con éxito.<br>`;
        log.innerHTML += `📄 Total de URLs en el sitemap: <b>${urlsEncontradas.size}</b>.<br>`;

        // Generar XML
        let xmlContent = `<?xml version="1.0" encoding="UTF-8"?>\n`;
        xmlContent += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

        urlsEncontradas.forEach(url => {
          const priority = url === `${DOMAIN}/` ? "1.0" : "0.7";
          xmlContent += `  <url>\n    <loc>${url}</loc>\n    <priority>${priority}</priority>\n  </url>\n`;
        });

        xmlContent += `</urlset>`;

        descargarArchivo(xmlContent, "sitemap.xml", "text/xml");

        log.innerHTML += `<br>🚀 <b>sitemap.xml</b> generado y descargado.`;
        btn.innerText = "¡Completado!";
        setTimeout(() => {
          btn.disabled = false;
          btn.innerText = "Generar y Descargar";
        }, 3000);

      } catch (error) {
        log.innerHTML += `<span style="color: #ef4444;">❌ Error: ${error.message}</span>`;
        btn.disabled = false;
        btn.innerText = "Reintentar";
      }
    }

    function descargarArchivo(contenido, nombreArchivo, tipoMime) {
      const blob = new Blob([contenido], { type: tipoMime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = nombreArchivo;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
