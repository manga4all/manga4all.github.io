<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Sitemap - Manga4All</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      background-color: #121212;
      color: #fff;
    }
    .card {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #333;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
    }
    button:hover { background-color: #2563eb; }
    button:disabled { background-color: #555; cursor: not-allowed; }
    #log {
      margin-top: 20px;
      padding: 12px;
      background: #000;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      color: #10b981;
      display: none;
      max-height: 250px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🗺️ Generar Sitemap</h2>
    <p>Escanea la carpeta <code>/manga/</code> del repositorio en GitHub y genera tu <code>sitemap.xml</code>.</p>
    
    <button id="btn" onclick="generarSitemap()">Generar y Descargar</button>
    <div id="log"></div>
  </div>

  <script>
    const DOMAIN = "https://manga4all.com";
    // Tu usuario y repositorio exactos de GitHub
    const GITHUB_USER = "manga4all"; 
    const GITHUB_REPO = "repo"; // Cambia 'repo' por el nombre exacto de tu repositorio si es distinto

    const paginasEstaticas = [
      "",               
      "directory.html"  
    ];

    async function generarSitemap() {
      const btn = document.getElementById("btn");
      const log = document.getElementById("log");
      
      btn.disabled = true;
      btn.innerText = "Consultando repositorio...";
      log.style.display = "block";
      log.innerHTML = "🔍 Obteniendo lista de mangas desde GitHub...<br>";

      try {
        const urlsEncontradas = new Set();
        paginasEstaticas.forEach(p => urlsEncontradas.add(`${DOMAIN}/${p}`));

        // Consultar la API pública de GitHub para ver el contenido de /manga/
        const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/manga`;
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
          throw new Error("No se pudo acceder a la carpeta /manga/ en GitHub. Revisa el nombre del repositorio.");
        }
        
        const archivos = await response.json();

        let contadorMangas = 0;
        archivos.forEach(item => {
          if (item.type === "file" && item.name.endsWith(".html")) {
            urlsEncontradas.add(`${DOMAIN}/manga/${item.name}`);
            contadorMangas++;
          }
        });

        log.innerHTML += `✅ Se encontraron <b>${contadorMangas}</b> mangas en /manga/.<br>`;
        log.innerHTML += `📄 Total de URLs en el sitemap: <b>${urlsEncontradas.size}</b>.<br>`;

        // Construir XML
        let xmlContent = `<?xml version="1.0" encoding="UTF-8"?>\n`;
        xmlContent += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

        urlsEncontradas.forEach(url => {
          const priority = url === `${DOMAIN}/` ? "1.0" : "0.7";
          xmlContent += `  <url>\n    <loc>${url}</loc>\n    <priority>${priority}</priority>\n  </url>\n`;
        });

        xmlContent += `</urlset>`;

        descargarArchivo(xmlContent, "sitemap.xml", "text/xml");

        log.innerHTML += `<br>🚀 <b>sitemap.xml</b> generado y descargado correctamente.`;
        btn.innerText = "¡Completado!";
        setTimeout(() => {
          btn.disabled = false;
          btn.innerText = "Generar y Descargar";
        }, 3000);

      } catch (error) {
        log.innerHTML += `<span style="color: #ef4444;">❌ Error: ${error.message}</span>`;
        btn.disabled = false;
        btn.innerText = "Reintentar";
      }
    }

    function descargarArchivo(contenido, nombreArchivo, tipoMime) {
      const blob = new Blob([contenido], { type: tipoMime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = nombreArchivo;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
