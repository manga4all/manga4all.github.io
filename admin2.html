<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4A - Generador JSON (imgBB)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #111; border-right: 1px solid #1f1f1f; padding: 20px; position: fixed; height: 100vh; }
    .sidebar h2 { color: #ff0055; margin-bottom: 30px; text-align: center; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 800px; }
    .tab-content { background: #111; padding: 35px; border-radius: 20px; border: 1px solid #1f1f1f; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
    .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
    .primary-btn:disabled { background: #444; cursor: not-allowed; }
    #downloadBtn { background: #0088ff; display: none; margin-top: 15px; text-align: center; text-decoration: none; }
    #uploadLog { background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.8rem; margin-top: 25px; max-height: 400px; overflow-y: auto; border: 1px solid #222; color: #0f0; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>Manga 4 All</h2>
    <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #0088ff33;">
        <p style="font-size: 0.75rem; color: #0088ff; font-weight: bold; text-align: center;">GENERADOR DE JSON</p>
        <p style="font-size: 0.7rem; color: #777; text-align: center; margin-top: 5px;">Sube a imgBB de forma masiva.</p>
    </div>
  </aside>

  <main class="main-content">
    <div class="admin-container">
        <div class="tab-content">
            <h1>📄 Crear JSON de Capítulos (imgBB)</h1>
            <div class="input-group">
                <label>Nombre del Manga</label>
                <input type="text" id="mangaTitle" placeholder="Ej: Dragon Ball">
            </div>
            <div class="input-group">
                <label>Seleccionar Carpeta del Manga</label>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>
            <button class="primary-btn" id="startProcess">🚀 INICIAR SUBIDA Y GENERAR JSON</button>
            <a id="downloadBtn" class="primary-btn">📥 DESCARGAR JSON LISTO</a>
            <div id="uploadLog">Esperando archivos...</div>
        </div>
    </div>
  </main>

  <script type="module">
    const IMGBB_API_KEY = "83edde6fcaeaf68780eae9957ff1eb1b"; 
    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function uploadToImgBB(file, customName, log) {
        const formData = new FormData();
        formData.append("image", file);
        formData.append("name", customName);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });

            const resData = await response.json();

            // CORRECCIÓN CRÍTICA: Detectar límite aunque el código sea 400 o 429
            if (response.status === 429 || (resData.error && resData.error.message.includes("Rate limit"))) {
                log.innerHTML += `<br><span style="color:yellow">⚠️ Límite alcanzado. Esperando 30 segundos para continuar...</span>`;
                log.scrollTop = log.scrollHeight;
                await delay(30000); // Espera de seguridad
                return uploadToImgBB(file, customName, log); // Reintentar la misma imagen
            }

            if (!response.ok) throw new Error(resData.error.message);
            
            return resData.data.url;

        } catch (err) {
            log.innerHTML += `<br><span style="color:orange">🔄 Fallo: ${err.message}. Reintentando en 5s...</span>`;
            log.scrollTop = log.scrollHeight;
            await delay(5000);
            return uploadToImgBB(file, customName, log);
        }
    }

    document.getElementById('startProcess').onclick = async function() {
        const title = document.getElementById('mangaTitle').value.trim();
        const files = Array.from(document.getElementById('folderInput').files);
        const log = document.getElementById('uploadLog');
        const dlBtn = document.getElementById('downloadBtn');

        if (!title || files.length === 0) return alert("Faltan datos.");

        this.disabled = true;
        dlBtn.style.display = "none";
        log.innerHTML = `=== PROCESANDO: ${title.toUpperCase()} ===<br>`;

        // 1. Agrupar carpetas
        const chaptersMap = {};
        files.forEach(file => {
            const pathParts = file.webkitRelativePath.split('/');
            if (pathParts.length >= 2) {
                const folder = pathParts[pathParts.length - 2];
                if (!chaptersMap[folder]) chaptersMap[folder] = [];
                chaptersMap[folder].push(file);
            }
        });

        const chapterFolders = Object.keys(chaptersMap).sort((a, b) => {
            const numA = parseFloat(a.replace(/^\D+/g, '')) || 0;
            const numB = parseFloat(b.replace(/^\D+/g, '')) || 0;
            return numA - numB;
        });

        let finalJsonData = [];

        try {
            for (let folderName of chapterFolders) {
                const chapterFiles = chaptersMap[folderName].sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                const capNumber = folderName.replace(/^\D+/g, '') || folderName;

                log.innerHTML += `<br><span style="color:cyan">🚀 Subiendo Cap ${capNumber}...</span> `;
                
                let chapterLinks = [];
                for (let i = 0; i < chapterFiles.length; i++) {
                    const smartName = `${title}_C${capNumber}_P${i+1}`;
                    const url = await uploadToImgBB(chapterFiles[i], smartName, log);
                    chapterLinks.push(url);
                    log.innerHTML += `.`; 
                    log.scrollTop = log.scrollHeight;
                }

                finalJsonData.push({
                    capitulo: capNumber,
                    links: chapterLinks
                });
                log.innerHTML += ` <span style="color:#0f0">OK</span>`;
            }

            const jsonString = JSON.stringify(finalJsonData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            dlBtn.href = URL.createObjectURL(blob);
            dlBtn.download = `${title.replace(/\s+/g,'_')}.json`;
            dlBtn.style.display = "block";
            log.innerHTML += `<br><br><span style="color:#0f0">✨ ¡PROCESO TERMINADO!</span>`;

        } catch (err) {
            log.innerHTML += `<br><span style="color:red">❌ ERROR: ${err.message}</span>`;
        } finally {
            this.disabled = false;
        }
    };
  </script>
</body>
</html>
