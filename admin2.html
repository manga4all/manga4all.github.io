<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>M4A - Uploader Industrial V6.5 (Final Boss Fix)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background: #111; border-right: 1px solid #1f1f1f; padding: 20px; position: fixed; height: 100vh; }
    .sidebar h2 { color: #ff0055; margin-bottom: 20px; text-align: center; }
    .main-content { flex: 1; margin-left: 280px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 850px; }
    .tab-content { background: #111; padding: 35px; border-radius: 20px; border: 1px solid #1f1f1f; }
    h1 { font-size: 1.4rem; margin-bottom: 15px; color: #fff; }
    .status-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; font-size: 0.85rem; border-left: 4px solid #ff0055; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #00d4ff; font-weight: bold; }
    input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
    textarea { height: 80px; font-family: monospace; font-size: 0.75rem; resize: none; border: 1px solid #00d4ff55; }
    .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
    .primary-btn:disabled { background: #444; cursor: not-allowed; }
    #downloadBtn { background: #0088ff; margin-top: 15px; display: none; text-align: center; text-decoration: none; }
    #uploadLog { background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.75rem; margin-top: 20px; height: 300px; overflow-y: auto; border: 1px solid #222; color: #0f0; line-height: 1.4; }
    .danger-btn { background: #ff4444; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
    .preview-box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 0.7rem; color: #888; margin-top: 10px; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>Manga 4 All</h2>
    <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #00d4ff;">
        <p style="font-size: 0.7rem; color: #00d4ff; font-weight: bold; text-align: center;">MODO INDUSTRIAL V6.5</p>
    </div>
    <button class="danger-btn" onclick="hardReset()">🗑️ REINICIAR TODO</button>
  </aside>

  <main class="main-content">
    <div class="admin-container">
        <div class="tab-content">
            <h1>📄 Uploader Pro (Fix Carpetas con Guion)</h1>
            
            <div id="cacheStatus" class="status-card">Carga un JSON para omitir capítulos.</div>

            <div class="input-group">
                <label>1. Cargar JSON Incompleto (Para omitir lo ya subido)</label>
                <input type="file" id="jsonInput" accept=".json">
            </div>

            <div class="input-group">
                <label>2. API Keys (Una por línea)</label>
                <textarea id="keysInput"></textarea>
            </div>

            <div class="input-group">
                <label>3. Nombre del Manga (Sin caracteres raros)</label>
                <input type="text" id="mangaTitle" placeholder="Ej: Kou-2 ni Time Leap">
            </div>

            <div class="input-group">
                <label>4. Seleccionar Carpeta del Manga</label>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
                <div id="preview" class="preview-box">Esperando selección...</div>
            </div>

            <button class="primary-btn" id="startProcess" disabled>🚀 INICIAR SUBIDA</button>
            <a id="downloadBtn" class="primary-btn">📥 DESCARGAR JSON FINAL</a>

            <div id="uploadLog">Listo para empezar.</div>
        </div>
    </div>
  </main>

  <script type="module">
    const delay = ms => new Promise(res => setTimeout(res, ms));
    const validExts = ['jpg', 'jpeg', 'png', 'webp'];
    const CACHE_KEY = "M4A_V65_FINAL";
    
    let finalJsonData = [];
    let apiKeys = [];
    let currentKeyIndex = 0;
    let chaptersMap = {};

    window.onload = () => {
        const saved = localStorage.getItem(CACHE_KEY);
        if (saved) {
            finalJsonData = JSON.parse(saved);
            actualizarBoton();
            document.getElementById('cacheStatus').innerHTML = `<span style="color:#ff0055">⚠️ Memoria: ${finalJsonData.length} capítulos listos.</span>`;
        }
        const lastKeys = localStorage.getItem("last_api_keys");
        if(lastKeys) document.getElementById('keysInput').value = lastKeys;
    };

    window.hardReset = () => {
        if(confirm("¿Borrar todo? Se limpiará la memoria por completo.")) {
            localStorage.clear();
            location.reload();
        }
    };

    // --- CARGAR JSON ---
    document.getElementById('jsonInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                finalJsonData = JSON.parse(event.target.result);
                localStorage.setItem(CACHE_KEY, JSON.stringify(finalJsonData));
                actualizarBoton();
                document.getElementById('cacheStatus').innerHTML = `<span style="color:#0f0">✅ JSON Cargado: Se omitirán capítulos ya presentes.</span>`;
            } catch (err) { alert("JSON inválido."); }
        };
        reader.readAsText(e.target.files[0]);
    };

    // --- DETECCIÓN CORREGIDA (BUSCA EL NÚMERO AL FINAL TRAS EL GUION BAJO) ---
    document.getElementById('folderInput').onchange = function(e) {
        const files = Array.from(e.target.files);
        chaptersMap = {};
        
        files.forEach(file => {
            const ext = file.name.split('.').pop().toLowerCase();
            if (validExts.includes(ext)) {
                const pathParts = file.webkitRelativePath.split('/');
                if (pathParts.length >= 2) {
                    const folderName = pathParts[pathParts.length - 2];
                    
                    // Lógica Maestra: Busca el número DESPUÉS del último "_" 
                    // Ejemplo: "Nombre_Manga_2_001" -> detecta "001"
                    let match = folderName.match(/_(\d+\.?\d*)$/);
                    let capKey = match ? match[1] : folderName.replace(/^\D+/g, '') || "1";

                    if (!chaptersMap[capKey]) chaptersMap[capKey] = [];
                    chaptersMap[capKey].push(file);
                }
            }
        });

        const sorted = Object.keys(chaptersMap).sort((a,b) => parseFloat(a) - parseFloat(b));
        if (sorted.length > 0) {
            document.getElementById('preview').innerHTML = `✅ Detectados: ${sorted.join(', ')}`;
            document.getElementById('startProcess').disabled = false;
        }
    };

    function actualizarBoton() {
        const dlBtn = document.getElementById('downloadBtn');
        const blob = new Blob([JSON.stringify(finalJsonData, null, 2)], { type: "application/json" });
        dlBtn.href = URL.createObjectURL(blob);
        dlBtn.download = (document.getElementById('mangaTitle').value || "manga_final") + ".json";
        dlBtn.style.display = "block";
    }

    async function uploadToImgBB(file, customName, log) {
        const key = apiKeys[currentKeyIndex];
        const formData = new FormData();
        formData.append("image", file);
        formData.append("name", customName);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${key}`, { method: "POST", body: formData });
            const resData = await response.json();

            if (response.status === 429 || (resData.error && resData.error.message.toLowerCase().includes("rate limit"))) {
                if (currentKeyIndex < apiKeys.length - 1) {
                    currentKeyIndex++;
                    return uploadToImgBB(file, customName, log);
                } else {
                    await delay(60000);
                    currentKeyIndex = 0;
                    return uploadToImgBB(file, customName, log);
                }
            }
            if (!response.ok) return null;
            return resData.data.url;
        } catch (err) {
            await delay(5000);
            return uploadToImgBB(file, customName, log);
        }
    }

    document.getElementById('startProcess').onclick = async function() {
        const rawKeys = document.getElementById('keysInput').value.trim();
        const titleRaw = document.getElementById('mangaTitle').value.trim();
        const log = document.getElementById('uploadLog');

        apiKeys = rawKeys.split('\n').map(k => k.trim()).filter(k => k !== "");
        localStorage.setItem("last_api_keys", rawKeys);
        
        const title = titleRaw.replace(/[^a-z0-9]/gi, '_');
        this.disabled = true;
        log.innerHTML = `=== INICIANDO SUBIDA ===<br>`;

        const sortedKeys = Object.keys(chaptersMap).sort((a,b) => parseFloat(a) - parseFloat(b));

        for (let cap of sortedKeys) {
            const numCap = parseFloat(cap);

            // COMPROBAR EN JSON Y MEMORIA
            if (finalJsonData.some(c => parseFloat(c.capitulo) === numCap)) {
                log.innerHTML += `<span style="color:#555">⏭️ Cap ${cap} saltado.</span><br>`;
                continue;
            }

            log.innerHTML += `<span style="color:cyan">🚀 Cap ${cap}:</span> `;
            const chapterFiles = chaptersMap[cap].sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            let links = [];
            
            for (let file of chapterFiles) {
                const url = await uploadToImgBB(file, `${title}_C${cap}`, log);
                if (url) { links.push(url); log.innerHTML += `.`; log.scrollTop = log.scrollHeight; }
            }
            
            if (links.length > 0) {
                finalJsonData.push({ capitulo: String(cap), links: links });
                finalJsonData.sort((a, b) => parseFloat(a.capitulo) - parseFloat(b.capitulo));
                localStorage.setItem(CACHE_KEY, JSON.stringify(finalJsonData));
                actualizarBoton();
                log.innerHTML += ` <span style="color:#0f0">OK</span><br>`;
            }
        }
        alert("¡Terminado exitosamente!");
        this.disabled = false;
    };
  </script>
</body>
</html>
