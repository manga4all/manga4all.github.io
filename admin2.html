<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4A - Generador JSON (imgBB)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }
    
    .sidebar { width: 260px; background: #111; border-right: 1px solid #1f1f1f; padding: 20px; position: fixed; height: 100vh; }
    .sidebar h2 { color: #ff0055; margin-bottom: 30px; text-align: center; }
    
    .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 800px; }

    .tab-content { background: #111; padding: 35px; border-radius: 20px; border: 1px solid #1f1f1f; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
    
    .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
    .primary-btn:disabled { background: #444; cursor: not-allowed; }

    #downloadBtn { background: #0088ff; display: none; margin-top: 15px; }

    #uploadLog { 
        background: #000; padding: 15px; border-radius: 10px; font-family: monospace; 
        font-size: 0.8rem; margin-top: 25px; max-height: 350px; overflow-y: auto; 
        border: 1px solid #222; color: #0f0; display: none;
    }
    .progress-wrapper { margin-top: 15px; background: #222; border-radius: 10px; overflow: hidden; display: none; height: 8px; }
    #progressBar { height: 100%; background: #ff0055; width: 0%; transition: 0.3s; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>Manga 4 All</h2>
    <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #0088ff33;">
        <p style="font-size: 0.75rem; color: #0088ff; font-weight: bold; text-align: center;">GENERADOR DE JSON</p>
        <p style="font-size: 0.7rem; color: #777; text-align: center; margin-top: 5px;">Sube a imgBB y descarga el archivo para tu Excel.</p>
    </div>
  </aside>

  <main class="main-content">
    <div class="admin-container">
        <div class="tab-content">
            <h1>📄 Crear JSON de Capítulos (imgBB)</h1>
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 25px;">
                Selecciona la carpeta del manga. Subiremos las fotos y te daremos el JSON listo para usar en tu Carga Industrial.
            </p>

            <div class="input-group">
                <label>Nombre del Manga (Para el nombre de las fotos)</label>
                <input type="text" id="mangaTitle" placeholder="Ej: Dragon Ball">
            </div>

            <div class="input-group">
                <label>Seleccionar Carpeta del Manga</label>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>

            <button class="primary-btn" id="startProcess">🚀 INICIAR SUBIDA Y GENERAR JSON</button>
            <a id="downloadBtn" class="primary-btn" style="text-align:center; text-decoration:none;">📥 DESCARGAR JSON LISTO</a>

            <div class="progress-wrapper" id="progressWrapper"><div id="progressBar"></div></div>
            <div id="uploadLog"></div>
        </div>
    </div>
  </main>

  <script type="module">
    // --- TU API KEY DE IMGBB ---
    const IMGBB_API_KEY = "TU_API_KEY_AQUI"; 

    async function uploadToImgBB(file, customName) {
        const formData = new FormData();
        formData.append("image", file);
        formData.append("name", customName);

        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: "POST",
            body: formData
        });

        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error.message);
        return resData.data.url;
    }

    document.getElementById('startProcess').onclick = async function() {
        const title = document.getElementById('mangaTitle').value.trim();
        const files = Array.from(document.getElementById('folderInput').files);
        
        if (!title || files.length === 0) return alert("Pon el nombre y selecciona la carpeta.");
        if (IMGBB_API_KEY === "TU_API_KEY_AQUI") return alert("Falta tu API Key.");

        this.disabled = true;
        const log = document.getElementById('uploadLog');
        const progress = document.getElementById('progressBar');
        const dlBtn = document.getElementById('downloadBtn');
        
        log.style.display = "block";
        document.getElementById('progressWrapper').style.display = "block";
        dlBtn.style.display = "none";
        
        log.innerHTML = `=== PROCESANDO: ${title.toUpperCase()} ===<br>`;

        // 1. AGRUPAR POR CARPETAS
        const chaptersMap = {};
        files.forEach(file => {
            const pathParts = file.webkitRelativePath.split('/');
            if (pathParts.length >= 3) {
                const folder = pathParts[pathParts.length - 2];
                if (!chaptersMap[folder]) chaptersMap[folder] = [];
                chaptersMap[folder].push(file);
            }
        });

        const chapterFolders = Object.keys(chaptersMap).sort((a, b) => {
            const numA = parseFloat(a.replace(/^\D+/g, '')) || 0;
            const numB = parseFloat(b.replace(/^\D+/g, '')) || 0;
            return numA - numB;
        });

        log.innerHTML += `> Detectados ${chapterFolders.length} capítulos.<br><br>`;

        let finalJsonData = [];

        try {
            for (let folderName of chapterFolders) {
                const chapterFiles = chaptersMap[folderName].sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                const capNumber = folderName.replace(/^\D+/g, '') || folderName;

                log.innerHTML += `<span style="color:cyan">🚀 Subiendo ${folderName}...</span><br>`;
                
                let chapterLinks = [];
                for (let i = 0; i < chapterFiles.length; i++) {
                    const file = chapterFiles[i];
                    const smartName = `${title.replace(/\s+/g,'_')}_Cap${capNumber}_P${i+1}`;
                    
                    const url = await uploadToImgBB(file, smartName);
                    chapterLinks.push(url);

                    log.innerHTML += `  <span style="color:#555">Pag ${i+1} OK</span> `;
                    log.scrollTop = log.scrollHeight;
                }

                // Estructura que entiende tu admin.html
                finalJsonData.push({
                    capitulo: capNumber,
                    links: chapterLinks
                });

                log.innerHTML += `<br><span style="color:#0f0">✅ ${folderName} completado.</span><br><br>`;
            }

            // 2. GENERAR ARCHIVO PARA DESCARGA
            const jsonString = JSON.stringify(finalJsonData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            dlBtn.href = url;
            dlBtn.download = `${title.replace(/\s+/g,'_')}.json`;
            dlBtn.style.display = "block";

            log.innerHTML += `<br><span style="color:#0f0; font-size:1.1rem;">✨ ¡JSON GENERADO EXITOSAMENTE!</span>`;
            alert("Proceso terminado. Ya puedes descargar tu JSON.");

        } catch (err) {
            log.innerHTML += `<br><span style="color:red">❌ ERROR: ${err.message}</span>`;
        } finally {
            this.disabled = false;
        }
    };
  </script>
</body>
</html>
