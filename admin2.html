<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M4A - Carga Industrial imgBB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #070707; color: white; display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #111; border-right: 1px solid #1f1f1f; padding: 20px; position: fixed; height: 100vh; }
    .sidebar h2 { color: #ff0055; margin-bottom: 30px; text-align: center; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
    .admin-container { width: 100%; max-width: 900px; }
    .tab-content { background: #111; padding: 35px; border-radius: 20px; border: 1px solid #1f1f1f; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
    .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #ff0055; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
    .primary-btn:disabled { background: #444; cursor: not-allowed; }
    #uploadLog { background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.8rem; margin-top: 25px; max-height: 400px; overflow-y: auto; border: 1px solid #222; color: #0f0; display: none; }
    .progress-wrapper { margin-top: 15px; background: #222; border-radius: 10px; overflow: hidden; display: none; height: 10px; }
    #progressBar { height: 100%; background: #ff0055; width: 0%; transition: 0.3s; }
    .folder-info { background: #1a1a1a; border: 1px dashed #444; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>Manga 4 All</h2>
    <p style="font-size: 0.7rem; color: #777; text-align: center;">MODO: CARGA MASIVA CARPETAS</p>
  </aside>

  <main class="main-content">
    <div class="admin-container">
        <div class="tab-content">
            <h1>📂 Subida por Carpeta (Full Manga)</h1>
            <p style="color: #888; font-size: 0.85rem; margin-bottom: 25px;">
                Selecciona la carpeta principal del manga. El sistema detectará los capítulos por las subcarpetas automáticamente.
            </p>

            <div class="input-group">
                <label>1. Seleccionar Manga en el Sistema</label>
                <select id="mangaSelector"><option value="">Cargando...</option></select>
            </div>

            <div class="input-group">
                <label>2. Seleccionar Carpeta del Manga (Contiene los capítulos)</label>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>

            <button class="primary-btn" id="startBulkBtn">🚀 INICIAR CARGA MASIVA DE CAPÍTULOS</button>

            <div class="progress-wrapper" id="progressWrapper"><div id="progressBar"></div></div>
            <div id="uploadLog"></div>
        </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo",
        authDomain: "manga4all-f520f.firebaseapp.com",
        projectId: "manga4all-f520f",
        storageBucket: "manga4all-f520f.firebasestorage.app",
        messagingSenderId: "372561836700",
        appId: "1:372561836700:web:cbb295bda656abd2ea0b59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_API_KEY = "TU_API_KEY_AQUI"; 

    // Cargar selector de mangas
    async function loadMangas() {
        const snap = await getDocs(collection(db, "mangas"));
        const sorted = snap.docs.map(d => ({id: d.id, title: d.data().title})).sort((a,b) => a.title.localeCompare(b.title));
        document.getElementById('mangaSelector').innerHTML = '<option value="">-- Selecciona --</option>' + 
            sorted.map(m => `<option value="${m.id}" data-title="${m.title}">${m.title}</option>`).join('');
    }
    loadMangas();

    async function uploadToImgBB(file, customName) {
        const formData = new FormData();
        formData.append("image", file);
        formData.append("name", customName);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error.message);
        return resData.data.url;
    }

    document.getElementById('startBulkBtn').onclick = async function() {
        const sel = document.getElementById('mangaSelector');
        const mangaId = sel.value;
        const mangaTitle = sel.options[sel.selectedIndex].getAttribute('data-title');
        const files = Array.from(document.getElementById('folderInput').files);
        
        if (!mangaId || files.length === 0) return alert("Selecciona el manga y la carpeta");
        if (IMGBB_API_KEY === "TU_API_KEY_AQUI") return alert("Falta API Key");

        this.disabled = true;
        const log = document.getElementById('uploadLog');
        const progress = document.getElementById('progressBar');
        log.style.display = "block";
        document.getElementById('progressWrapper').style.display = "block";

        // --- PASO 1: AGRUPAR POR CAPÍTULOS ---
        log.innerHTML = `=== ANALIZANDO CARPETA DE ${mangaTitle.toUpperCase()} ===<br>`;
        
        const chaptersMap = {};
        files.forEach(file => {
            // El path suele ser: Manga/Capitulo 01/imagen.jpg
            const pathParts = file.webkitRelativePath.split('/');
            if (pathParts.length >= 3) {
                const chapterFolder = pathParts[pathParts.length - 2]; // Toma el nombre de la carpeta anterior al archivo
                if (!chaptersMap[chapterFolder]) chaptersMap[chapterFolder] = [];
                chaptersMap[chapterFolder].push(file);
            }
        });

        const chapterFolders = Object.keys(chaptersMap).sort((a, b) => {
            const numA = parseFloat(a.replace(/^\D+/g, '')) || 0;
            const numB = parseFloat(b.replace(/^\D+/g, '')) || 0;
            return numA - numB;
        });

        log.innerHTML += `> Detectados ${chapterFolders.length} capítulos.<br><br>`;

        try {
            const mSnap = await getDoc(doc(db, "mangas", mangaId));
            const cover = mSnap.data().cover || "";

            // --- PASO 2: SUBIR CAPÍTULO POR CAPÍTULO ---
            for (let folderName of chapterFolders) {
                const chapterFiles = chaptersMap[folderName].sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                // Extraer solo el número del nombre de la carpeta (ej: "Capitulo 05" -> "05")
                const capNumber = folderName.replace(/^\D+/g, '') || folderName;

                log.innerHTML += `<span style="color:cyan">🚀 Subiendo ${folderName} (${chapterFiles.length} imágenes)...</span><br>`;
                
                let chapterLinks = [];
                for (let i = 0; i < chapterFiles.length; i++) {
                    const file = chapterFiles[i];
                    const cleanTitle = mangaTitle.replace(/\s+/g, '_');
                    const smartName = `${cleanTitle}_Cap${capNumber}_P${i+1}`;
                    
                    const url = await uploadToImgBB(file, smartName);
                    chapterLinks.push(url);

                    // Progreso general
                    progress.style.width = "50%"; // Solo visual
                }

                // Guardar capítulo en Firebase
                await addDoc(collection(db, "tomos"), {
                    mangaId: mangaId,
                    number: String(capNumber),
                    images: chapterLinks,
                    cover: cover,
                    createdAt: Timestamp.now()
                });

                log.innerHTML += `<span style="color:#0f0">✅ ${folderName} finalizado y publicado.</span><br><br>`;
                log.scrollTop = log.scrollHeight;
            }

            log.innerHTML += `=== CARGA COMPLETA: TODOS LOS CAPÍTULOS ESTÁN ONLINE ===`;
            alert("¡Felicidades! Todo el manga ha sido procesado.");

        } catch (err) {
            log.innerHTML += `<br><span style="color:red">❌ ERROR CRÍTICO: ${err.message}</span>`;
        } finally {
            this.disabled = false;
        }
    };
  </script>
</body>
</html>
